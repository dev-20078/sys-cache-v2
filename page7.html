<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Dev! - Flappy Custom</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #333;
            font-family: 'Comic Neue', cursive;
            user-select: none; /* Prevents text selection on tapping */
        }

        /* --- PRE-GAME RULES SCREEN --- */
        #rules-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; color: white;
            transition: opacity 0.5s ease-out;
        }

        .rules-title {
            font-family: 'Cinzel', serif; font-size: 3rem; color: #fdfd6f;
            text-shadow: 0 0 10px #fdfd6f, 0 0 20px #e6c13b;
            margin-bottom: 20px;
        }

        .rules-list {
            font-size: 1.5rem; line-height: 1.6; margin-bottom: 30px;
            max-width: 80%;
        }

        .rules-point { margin: 10px 0; }

        .rules-emoji { font-size: 2rem; }

        .save-me-text {
            font-family: 'Comic Neue', cursive; font-size: 2.5rem; color: #ff6666;
            margin-bottom: 30px; animation: pulseError 1s infinite;
        }

        @keyframes pulseError {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        #start-game-btn {
            padding: 15px 40px; font-size: 1.8rem; font-weight: bold;
            color: white; background: linear-gradient(45deg, #1d971d, #42f442);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px #42f442, 0 0 30px #1d971d;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        
        #start-game-btn:hover {
            box-shadow: 0 0 20px #42f442, 0 0 40px #1d971d;
        }

        #start-game-btn:active { transform: scale(0.95); }


        /* --- GAME CANVAS --- */
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: none; /* Hidden until game starts */
        }

        /* --- SCORE DISPLAY --- */
        #scoreBoard {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            font-family: 'Comic Neue', cursive; font-size: 3rem; color: white;
            text-shadow: 2px 2px 5px #000; z-index: 50;
            display: none; /* Hidden initially */
            pointer-events: none; /* Score text won't interfere with tapping */
        }

        /* --- WIN SCREEN OVERLAY --- */
        #win-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 100, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; color: white; display: none; /* Hidden until 10 points */
            text-align: center;
        }

        .win-title {
            font-family: 'Cinzel', serif; font-size: 4rem; color: #fdfd6f;
            text-shadow: 0 0 15px #fdfd6f, 0 0 30px #e6c13b;
            margin-bottom: 20px; animation: scaleWin 1s infinite alternate;
        }

        @keyframes scaleWin {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .win-message { font-size: 1.8rem; margin-bottom: 40px; }

        #next-page-btn {
            position: absolute; bottom: -100px; /* Hidden initially */
            left: 30px; padding: 15px 40px; font-size: 1.5rem;
            font-family: 'Cinzel', serif; font-weight: bold;
            color: white; background: linear-gradient(45deg, #007bff, #00d2ff);
            border: none; border-radius: 50px; text-decoration: none;
            box-shadow: 0 0 20px #00d2ff, 0 0 40px #007bff;
            z-index: 210;
            transition: bottom 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Responsive Text */
        @media (max-width: 768px) {
            .rules-title { font-size: 2.2rem; }
            .rules-list { font-size: 1.1rem; }
            .save-me-text { font-size: 1.8rem; }
            #scoreBoard { font-size: 2.2rem; }
            .win-title { font-size: 2.8rem; }
            .win-message { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <audio id="snd-bg" src="bg_music.mp3" loop preload="auto"></audio>
    <audio id="snd-start" src="game_start.mp3" preload="auto"></audio>
    <audio id="snd-jump" src="jump.mp3" preload="auto"></audio>
    <audio id="snd-hit" src="hit.mp3" preload="auto"></audio>
    <audio id="snd-gameover" src="game_over.mp3" preload="auto"></audio>

    <div id="rules-screen">
        <div class="rules-title">RULES TO BE FOLLOWED:</div>
        <div class="rules-list">
            <div class="rules-point">1) dev ko safe rakh na hai <span class="rules-emoji">🛡️</span></div>
            <div class="rules-point">2) kisi ko hit nai karna hai <span class="rules-emoji">🚫</span></div>
            <div class="rules-point">3) score 10 points to win <span class="rules-emoji">🏆</span></div>
        </div>
        <div class="save-me-text">PLEASE SAVE ME <span class="rules-emoji">🥺🆘</span></div>
        <button id="start-game-btn">START THE GAME</button>
    </div>

    <div id="scoreBoard">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

    <div id="win-overlay">
        <div class="win-title">CONGRATULATIONS!</div>
        <div class="win-message">YOU WON! You saved the dev! <span class="rules-emoji">🎉🥳</span></div>
    </div>
    
    <a id="next-page-btn" href="page8.html">NEXT</a>

    <script>
        // --- ASSET MANAGEMENT ---
        const IMAGE_SOURCES = {
            background: 'bg7.jpg',
            bird: 'bird.png',
            obstacles: [
                'person_0.png',
                'person_1.png',
                'person_2.png',
                'person_3.png',
                'person_4.png'
            ]
        };

        const SOUNDS = {
            bg: document.getElementById('snd-bg'),
            start: document.getElementById('snd-start'),
            jump: document.getElementById('snd-jump'),
            hit: document.getElementById('snd-hit'),
            gameover: document.getElementById('snd-gameover')
        };

        // Preload Images
        const images = {};
        let imagesLoaded = 0;
        const totalImages = 2 + IMAGE_SOURCES.obstacles.length; // Bg, Bird, and Obstacles

        function preloadImages() {
            // Load Background
            images.background = new Image();
            images.background.onload = checkLoaded;
            images.background.src = IMAGE_SOURCES.background;

            // Load Bird
            images.bird = new Image();
            images.bird.onload = checkLoaded;
            images.bird.src = IMAGE_SOURCES.bird;

            // Load Obstacles
            images.obstacles = [];
            IMAGE_SOURCES.obstacles.forEach((src, index) => {
                images.obstacles[index] = new Image();
                images.obstacles[index].onload = checkLoaded;
                images.obstacles[index].src = src;
            });
        }

        function checkLoaded() {
            imagesLoaded++;
            if (imagesLoaded === totalImages) {
                console.log("All assets loaded!");
                // Game is ready to start after assets are loaded
            }
        }
        preloadImages();


        // --- UI & STATE CONTROL ---
        const rulesScreen = document.getElementById('rules-screen');
        const startBtn = document.getElementById('start-game-btn');
        const winOverlay = document.getElementById('win-overlay');
        const scoreBoard = document.getElementById('scoreBoard');
        const nextBtn = document.getElementById('next-page-btn');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'ready'; // 'ready', 'playing', 'won', 'over'
        let score = 0;

        // Start Button Click Logic
        startBtn.addEventListener('click', startGame);

        function startGame() {
            if (gameState !== 'ready') return;
            gameState = 'playing';

            // 1. Play Start Sound
            SOUNDS.start.play().catch(e => console.log("Start sound blocked"));

            // 2. Hide Rules, Show Game
            rulesScreen.style.opacity = '0';
            setTimeout(() => {
                rulesScreen.style.display = 'none';
                canvas.style.display = 'block';
                scoreBoard.style.display = 'block';
                initializeGame();
                
                // 3. Play Background Music (Delay slightly for start sound)
                setTimeout(() => {
                    SOUNDS.bg.play().catch(e => console.log("BG music blocked"));
                }, 500);
            }, 500);
        }

        function winGame() {
            gameState = 'won';
            SOUNDS.bg.pause();
            
            // 1. Show Win Screen (Pause game)
            scoreBoard.style.display = 'none';
            winOverlay.style.display = 'flex';

            // 2. Show Next Button after 2 seconds
            setTimeout(() => {
                nextBtn.style.bottom = '30px';
            }, 2000);
        }

        function gameOver() {
            gameState = 'over';
            SOUNDS.bg.pause();
            SOUNDS.hit.play().catch(e => console.log("Hit sound blocked"));
            
            setTimeout(() => {
                SOUNDS.gameover.play().catch(e => console.log("GameOver sound blocked"));
            }, 300);

            // Restart on tap
            setTimeout(() => {
                alert(`Game Over! Final Score: ${score}. Tap to retry.`);
                restartGame();
            }, 1000);
        }

        function restartGame() {
            gameState = 'ready';
            score = 0;
            scoreBoard.innerText = 'Score: 0';
            scoreBoard.style.display = 'none';
            winOverlay.style.display = 'none';
            nextBtn.style.bottom = '-100px';
            canvas.style.display = 'none';
            rulesScreen.style.display = 'flex';
            rulesScreen.style.opacity = '1';
        }


        // --- GAME MECHANICS ---
        
        // Settings for "Thoroughly Difficult" Game
        const GAME_CONFIG = {
            gravity: 0.8,         // Increased from ~0.5 (fast fall)
            jumpForce: -13,       // Stronger jump to fight gravity
            pipeSpeed: 6,         // Faster pipes
            pipeGap: 180,         // Tighter gap (difficult!)
            pipeSpawnRate: 75,    // Pipes appear more frequently (frames)
            birdX: 100,
            birdSize: 45
        };

        // Resize Canvas dynamically
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let bird, pipes, frames;

        function initializeGame() {
            bird = {
                y: canvas.height / 2,
                velocity: 0,
                size: GAME_CONFIG.birdSize
            };
            pipes = [];
            frames = 0;
            requestAnimationFrame(gameLoop);
        }

        // --- GAME LOOP ---
        function gameLoop() {
            if (gameState !== 'playing') return;
            frames++;

            update();
            draw();

            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Apply Gravity
            bird.velocity += GAME_CONFIG.gravity;
            bird.y += bird.velocity;

            // Handle Input (Jump on Tap/Click)
            const handleJump = () => {
                if (gameState === 'playing') {
                    bird.velocity = GAME_CONFIG.jumpForce;
                    SOUNDS.jump.currentTime = 0; // Restart sound
                    SOUNDS.jump.play().catch(e => console.log("Jump sound blocked"));
                }
            };
            // Prevent multiple listeners during gaming
            if (frames === 1) {
                window.addEventListener('mousedown', handleJump);
                window.addEventListener('touchstart', handleJump);
            }

            // Check Bird out of bounds
            if (bird.y + bird.size / 2 >= canvas.height || bird.y - bird.size / 2 <= 0) {
                gameOver();
                return;
            }

            // Spawn Pipes (Custom Stretched obstacles)
            if (frames % GAME_CONFIG.pipeSpawnRate === 0) {
                const pipeHeight = Math.random() * (canvas.height - GAME_CONFIG.pipeGap - 100) + 50;
                
                // Pick a random person photo for this pipe pair
                const randomIndex = Math.floor(Math.random() * images.obstacles.length);
                const randomPersonImage = images.obstacles[randomIndex];
                
                pipes.push({
                    x: canvas.width,
                    y: pipeHeight,
                    width: 90, // Custom pipe width
                    passed: false,
                    photo: randomPersonImage // Assign custom image
                });
            }

            // Move Pipes & Check Score/Collision
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= GAME_CONFIG.pipeSpeed;

                // --- STRETCHING LOGIC (Using drawImage scaling) ---
                // Drawing happens in draw() function, stretching is handled there dynamically.

                // Scoring
                if (!pipes[i].passed && pipes[i].x + pipes[i].width < bird.birdX + bird.size) {
                    score++;
                    pipes[i].passed = true;
                    scoreBoard.innerText = 'Score: ' + score;
                    
                    // WIN Condition (10 points)
                    if (score >= 10) {
                        winGame();
                        return;
                    }
                }

                // Collision Detection
                // Using rect collision for simplicity, can use circle/rect hybrid for better precision
                const b = bird;
                const p = pipes[i];

                // Upper Pipe collision (Stretched Photo)
                const upperX = p.x;
                const upperY = 0;
                const upperH = p.y;
                if (b.birdX + b.size > upperX && b.birdX < upperX + p.width && b.birdY < upperH) {
                    gameOver();
                    return;
                }

                // Lower Pipe collision (Stretched Photo)
                const lowerX = p.x;
                const lowerY = p.y + GAME_CONFIG.pipeGap;
                const lowerH = canvas.height - lowerY;
                if (b.birdX + b.size > lowerX && b.birdX < lowerX + p.width && b.birdY + b.size > lowerY) {
                    gameOver();
                    return;
                }

                // Remove Pipes off-screen
                if (pipes[i].x + pipes[i].width < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function draw() {
            // 1. Draw Background
            if (images.background.complete) {
                ctx.drawImage(images.background, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height); // Fallback
            }

            // 2. Draw Bird
            if (images.bird.complete) {
                ctx.drawImage(images.bird, GAME_CONFIG.birdX, bird.y - bird.size / 2, bird.size, bird.size);
            } else {
                ctx.fillStyle = '#f99'; ctx.fillRect(GAME_CONFIG.birdX, bird.y - bird.size / 2, bird.size, bird.size); // Fallback
            }

            // 3. Draw Pipes (Custom Stretched Obstacles)
            pipes.forEach(pipe => {
                // Stretching is handled by `ctx.drawImage` parameters: (img, sx, sy, sw, sh, x, y, w, h)
                // We provide custom destination width and height to stretch the image.

                // Draw Upper Pipe (Custom photo stretched from y=0 to gap start)
                if (pipe.photo.complete) {
                    ctx.drawImage(pipe.photo, pipe.x, 0, pipe.width, pipe.y);
                } else {
                    ctx.fillStyle = '#6f6'; ctx.fillRect(pipe.x, 0, pipe.width, pipe.y); // Fallback Green
                }

                // Draw Lower Pipe (Same custom photo stretched from gap end to bottom)
                if (pipe.photo.complete) {
                    ctx.drawImage(pipe.photo, pipe.x, pipe.y + GAME_CONFIG.pipeGap, pipe.width, canvas.height - (pipe.y + GAME_CONFIG.pipeGap));
                } else {
                    ctx.fillStyle = '#6f6'; ctx.fillRect(pipe.x, pipe.y + GAME_CONFIG.pipeGap, pipe.width, canvas.height - (pipe.y + GAME_CONFIG.pipeGap)); // Fallback Green
                }
            });
        }
    </script>
</body>
  </html>
