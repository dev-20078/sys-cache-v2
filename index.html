<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#000;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
color:#d4af37;
overflow:hidden;
}

/* Logo */

.logo{
font-size:42px;
letter-spacing:5px;
margin-bottom:30px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:0.5}
to{opacity:1}
}

/* Spinner */

.loader{
border:4px solid #222;
border-top:4px solid #d4af37;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* canvas gesture */

canvas{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<div class="logo">MALOOTE</div>

<div class="loader"></div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let drawing=false;
let points=[];

canvas.addEventListener("touchstart",()=>{
drawing=true;
points=[];
});

canvas.addEventListener("touchmove",(e)=>{

if(!drawing) return;

let t=e.touches[0];

points.push({x:t.clientX,y:t.clientY});

ctx.lineWidth=3;
ctx.strokeStyle="#d4af37";
ctx.lineTo(t.clientX,t.clientY);
ctx.stroke();

});

canvas.addEventListener("touchend",()=>{

drawing=false;

checkPattern();

ctx.clearRect(0,0,canvas.width,canvas.height);

});

function checkPattern(){

if(points.length<20) return;

let vertical=Math.abs(points[0].y-points[points.length-1].y);
let horizontal=Math.abs(points[0].x-points[points.length-1].x);

if(vertical>200 && horizontal>150){

window.location="password.html";

}

}

</script>

</body>
</html>
