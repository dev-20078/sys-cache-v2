<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun 😏</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Segoe UI;
overflow:hidden;
background:url("bg4.jpg") no-repeat center center/cover;
}

/* TITLE */
.title{
font-size:40px;
font-weight:900;
color:black;
text-shadow:
0 0 5px gold,
0 0 15px gold,
0 0 25px gold;
}

/* SUBTEXT */
.sub{
margin-top:10px;
font-size:16px;
color:black;
text-shadow:
0 0 5px gold,
0 0 10px gold;
}

/* BUTTONS */
.btn{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:all 0.3s ease;
}

/* YES */
#yes{
background:linear-gradient(45deg,green,lightgreen);
box-shadow:0 0 15px green;
}

/* NO */
#no{
background:linear-gradient(45deg,red,orange);
box-shadow:0 0 15px red;
position:absolute;
}

/* FLOATING EMOJIS */
.emoji{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}
</style>
</head>

<body onclick="startMusic()">

<div class="title">ARE YOU ENJOYING ?</div>
<div class="sub">(Click NO for more fun until it's visible)</div>

<button id="yes" class="btn" onclick="goNext()">YES</button>
<button id="no" class="btn">NO</button>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="fun.mp3" type="audio/mpeg">
</audio>

<script>

let noClicks = 0;
let yesSize = 1;
let musicStarted = false;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

/* initial position */
noBtn.style.top = "60%";
noBtn.style.left = "40%";

/* NO CLICK LOGIC */
noBtn.addEventListener("click", () => {
  noClicks++;

  // YES grows
  yesSize += 0.3;
  yesBtn.style.transform = "scale(" + yesSize + ")";

  // NO shrinks
  let noScale = Math.max(0.5, 1 - noClicks * 0.2);
  noBtn.style.transform = "scale(" + noScale + ")";

  // random movement after 3 clicks
  if(noClicks >= 3){
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }
});

/* MUSIC START */
function startMusic(){
  if(!musicStarted){
    document.getElementById("bgMusic").play();
    musicStarted = true;
  }
}

/* YES CLICK */
function goNext(){
  document.getElementById("bgMusic").pause();
  window.location.href = "page5.html";
}

/* FLOATING EMOJIS */
const emojis = ["🫠","🙃","🤭","🫣","🙄","😮‍💨","😂"];

for(let i=0;i<25;i++){
  let e = document.createElement("div");
  e.className = "emoji";
  e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

  e.style.left = Math.random()*100 + "%";
  e.style.animationDuration = (3 + Math.random()*5) + "s";

  document.body.appendChild(e);
}

</script>

</body>
</html>
