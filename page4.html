<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
overflow:hidden;
background:url("bg4.jpg") no-repeat center/cover;
}

/* TITLE */
.title{
font-size:36px;
font-weight:bold;
color:black;
text-shadow:0 0 15px gold;
}

/* BUTTONS */
.btns{
display:flex;
gap:20px;
margin-top:30px;
z-index:2;
}

button{
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

/* YES */
#yes{
background:green;
color:white;
box-shadow:0 0 15px green;
}

/* NO */
#no{
background:red;
color:white;
box-shadow:0 0 15px red;
position:relative;
}

/* EMOJIS */
.emoji{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-20vh);}
}
</style>
</head>

<body>

<div class="title">ARE YOU ENJOYING ?</div>

<div class="btns">
<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<script>

let noClicks = 0;
let yesSize = 1;

const yes = document.getElementById("yes");
const no = document.getElementById("no");

/* YES CLICK */
yes.onclick = function(){
window.location.href = "page5.html";
}

/* NO CLICK */
no.onclick = function(){

noClicks++;

/* TEXT CHANGE */
if(noClicks==1){
no.innerText="SERIOUSLY";
}
else if(noClicks==2){
no.innerText="PLEASE";
}

/* YES GROW */
yesSize += 0.3;
yes.style.transform = "scale(" + yesSize + ")";

/* NO SHRINK */
let scale = Math.max(0.5, 1 - noClicks*0.2);
no.style.transform = "scale(" + scale + ")";

/* RUN AWAY */
if(noClicks>=3){
no.style.position="absolute";

let x = Math.random()*(window.innerWidth-100);
let y = Math.random()*(window.innerHeight-50);

no.style.left = x+"px";
no.style.top = y+"px";
}

}

/* EMOJIS */
let emojis = ["😂","🙃","🤭","🫠"];

for(let i=0;i<25;i++){
let e = document.createElement("div");
e.className="emoji";
e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

e.style.left = Math.random()*100+"%";
e.style.animationDuration = (4+Math.random()*4)+"s";

document.body.appendChild(e);
}

</script>

</body>
</html>
