<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
overflow:hidden;
background:url("bg4.jpg") no-repeat center/cover;
}

/* TITLE */
.title{
font-size:38px;
font-weight:bold;
color:black;
text-shadow:0 0 8px gold,0 0 15px gold;
}

/* BUTTONS */
.btns{
display:flex;
gap:20px;
margin-top:30px;
z-index:2;
}

button{
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:transform 0.2s ease;
}

/* YES */
#yes{
background:linear-gradient(45deg,green,lightgreen);
box-shadow:0 0 10px green,0 0 15px lightgreen;
}

/* NO */
#no{
background:linear-gradient(45deg,red,orange);
box-shadow:0 0 10px red,0 0 15px orange;
position:relative;
}

/* EMOJIS (optimized) */
.emoji{
position:absolute;
font-size:18px;
animation:float 8s linear infinite;
pointer-events:none;
z-index:0;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-20vh);}
}
</style>
</head>

<body onclick="startMusic()">

<div class="title">ARE YOU ENJOYING ?</div>

<div class="btns">
<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<audio id="music" loop>
<source src="fun.mp3" type="audio/mpeg">
</audio>

<script>

let noClicks = 0;
let yesSize = 1;
let started = false;

const yes = document.getElementById("yes");
const no = document.getElementById("no");

/* MUSIC */
function startMusic(){
if(!started){
document.getElementById("music").play();
started = true;
}
}

/* YES */
yes.onclick = function(){
document.getElementById("music").pause();
window.location.href = "page5.html";
}

/* NO */
no.onclick = function(){

noClicks++;

if(noClicks==1){
no.innerText="SERIOUSLY";
}
else if(noClicks==2){
no.innerText="PLEASE";
}

yesSize += 0.25;
yes.style.transform = "scale(" + yesSize + ")";

let scale = Math.max(0.5, 1 - noClicks*0.15);
no.style.transform = "scale(" + scale + ")";

if(noClicks>=3){
requestAnimationFrame(()=>{
let x = Math.random()*(window.innerWidth-100);
let y = Math.random()*(window.innerHeight-50);

no.style.position="absolute";
no.style.left = x+"px";
no.style.top = y+"px";
});
}

}

/* EMOJIS (reduced) */
let emojis = ["😂","🙃","🤭","🫠"];

for(let i=0;i<15;i++){
let e = document.createElement("div");
e.className="emoji";
e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

e.style.left = Math.random()*100+"%";
e.style.animationDuration = (5+Math.random()*5)+"s";

document.body.appendChild(e);
}

</script>

</body>
</html>
