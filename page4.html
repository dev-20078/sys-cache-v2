<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
overflow:hidden;
background:url("bg4.jpg") no-repeat center/cover;
}

/* TITLE */
.title{
font-size:38px;
font-weight:bold;
color:black;
text-shadow:0 0 10px gold,0 0 20px gold,0 0 30px gold;
}

/* BUTTON CONTAINER */
.btns{
display:flex;
gap:20px;
margin-top:30px;
z-index:2;
}

/* BUTTONS */
button{
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

/* YES BUTTON */
#yes{
background:linear-gradient(45deg,green,lightgreen);
color:#000;
box-shadow:0 0 10px green,0 0 20px green,0 0 30px lightgreen;
}

/* NO BUTTON */
#no{
background:linear-gradient(45deg,red,orange);
color:#000;
box-shadow:0 0 10px red,0 0 20px red,0 0 30px orange;
position:relative;
}

/* EMOJIS */
.emoji{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-20vh);}
}
</style>
</head>

<body onclick="startMusic()">

<div class="title">ARE YOU ENJOYING ?</div>

<div class="btns">
<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="fun.mp3" type="audio/mpeg">
</audio>

<script>

let noClicks = 0;
let yesSize = 1;
let started = false;

const yes = document.getElementById("yes");
const no = document.getElementById("no");

/* MUSIC START */
function startMusic(){
if(!started){
document.getElementById("music").play();
started = true;
}
}

/* YES CLICK */
yes.onclick = function(){
document.getElementById("music").pause();
window.location.href = "page5.html";
}

/* NO CLICK */
no.onclick = function(){

noClicks++;

/* TEXT CHANGE */
if(noClicks==1){
no.innerText="SERIOUSLY";
}
else if(noClicks==2){
no.innerText="PLEASE";
}

/* YES GROW */
yesSize += 0.3;
yes.style.transform = "scale(" + yesSize + ")";

/* NO SHRINK */
let scale = Math.max(0.5, 1 - noClicks*0.2);
no.style.transform = "scale(" + scale + ")";

/* RUN AWAY */
if(noClicks>=3){
no.style.position="absolute";

let x = Math.random()*(window.innerWidth-100);
let y = Math.random()*(window.innerHeight-50);

no.style.left = x+"px";
no.style.top = y+"px";
}

}

/* EMOJIS */
let emojis = ["😂","🙃","🤭","🫠","😮‍💨"];

for(let i=0;i<30;i++){
let e = document.createElement("div");
e.className="emoji";
e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

e.style.left = Math.random()*100+"%";
e.style.animationDuration = (4+Math.random()*5)+"s";

document.body.appendChild(e);
}

</script>

</body>
</html>
