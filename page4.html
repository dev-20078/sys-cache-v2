<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun 😏</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Segoe UI;
overflow:hidden;

/* BACKGROUND */
background:url("bg4.jpg") no-repeat center center/cover;
}

/* TITLE */
.title{
font-size:38px;
font-weight:900;
background:linear-gradient(45deg,#00c3ff,gold);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 20px gold;
}

/* SUBTEXT */
.sub{
margin-top:10px;
font-size:16px;
background:linear-gradient(45deg,pink,gold);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 10px pink;
}

/* BUTTONS */
.btn{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
position:relative;
}

/* YES */
#yes{
background:linear-gradient(45deg,green,lightgreen);
box-shadow:0 0 15px green;
}

/* NO */
#no{
background:linear-gradient(45deg,red,orange);
box-shadow:0 0 15px red;
position:absolute;
}

/* animation glow */
button{
transition:all 0.3s ease;
}
</style>
</head>

<body>

<div class="title">ARE YOU ENJOYING ?</div>
<div class="sub">(Click NO for more fun until it's visible)</div>

<button id="yes" class="btn" onclick="goNext()">YES</button>
<button id="no" class="btn">NO</button>

<script>

let noClicks = 0;
let yesSize = 1;

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

/* initial position */
noBtn.style.top = "60%";
noBtn.style.left = "40%";

noBtn.addEventListener("click", () => {
  noClicks++;

  // increase YES size
  yesSize += 0.3;
  yesBtn.style.transform = "scale(" + yesSize + ")";

  // decrease NO size
  let noScale = Math.max(0.5, 1 - noClicks * 0.2);
  noBtn.style.transform = "scale(" + noScale + ")";

  // after 3rd click → random movement
  if(noClicks >= 3){
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }
});

/* YES click */
function goNext(){
  window.location.href = "page5.html";
}

</script>

</body>
</html>
