<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
font-family:Arial;
}

.box{
text-align:center;
}

.title{
font-size:48px;
color:#ffd700;
font-family:Georgia,serif;
}

.subtitle{
margin-bottom:20px;
}

input{
padding:12px;
border:none;
border-radius:8px;
width:220px;
}

button{
margin-top:10px;
padding:12px 30px;
border:none;
background:#ffd700;
border-radius:8px;
font-weight:bold;
}

#error{
margin-top:10px;
color:red;
display:none;
}

</style>
</head>

<body>

<div class="box">

<div class="title">MALOOTE</div>
<div class="subtitle">enter the password please</div>

<input type="password" id="pass">

<br>

<button onclick="check()">Unlock</button>

<div id="error">ACCESS DENIED</div>

</div>

<script>

async function sha256(str){
const buf=new TextEncoder().encode(str);
const digest=await crypto.subtle.digest("SHA-256",buf);
return Array.from(new Uint8Array(digest))
.map(b=>b.toString(16).padStart(2,"0"))
.join("");
}

async function check(){

let input=document.getElementById("pass").value;

let hash=await sha256(input);

if(hash==="a0e5b9f7a6cbb7c5e3e5e4b52b3e2c65d7f4a9c9e54d1a4b2e3d3c6f9f0f3e7b"){

sessionStorage.setItem("unlock","maloote");

window.location="page3.html";

}else{

document.getElementById("error").style.display="block";

}

}

</script>

</body>
</html>
