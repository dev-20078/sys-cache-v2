<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maloote</title>

<style>

body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
}

/* phone frame */

.frame{
width:95vw;
height:95vh;
border:3px solid #d4af37;
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* box */

.box{
text-align:center;
}

/* title */

.title{
font-size:42px;
color:#d4af37;
letter-spacing:4px;
margin-bottom:5px;
font-weight:bold;
font-family:Georgia, serif;
}

/* subtitle */

.subtitle{
color:#aaa;
margin-bottom:25px;
}

/* input */

input{
width:220px;
padding:12px;
border:none;
border-radius:6px;
background:#111;
color:white;
font-size:16px;
outline:none;
}

/* button */

button{
margin-top:15px;
padding:12px 25px;
border:none;
background:#d4af37;
color:black;
font-weight:bold;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#f1d36b;
}

/* access denied */

#error{
margin-top:15px;
color:#ff4d4d;
display:none;
font-weight:bold;
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

/* particles */

.particle{
position:absolute;
width:4px;
height:4px;
background:#d4af37;
border-radius:50%;
opacity:0.8;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

</style>

</head>

<body>

<div class="frame">

<div class="box">

<div class="title">MALOOTE</div>

<div class="subtitle">
enter the password please
</div>

<input type="password" id="pass">

<br>

<button onclick="check()">Enter</button>

<div id="error">ACCESS DENIED</div>

</div>

</div>

<script>

/* golden particles */

for(let i=0;i<30;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";
p.style.animationDuration=(Math.random()*6+4)+"s";

document.body.appendChild(p);

}

/* SHA256 */

async function sha256(str){

const buf=new TextEncoder().encode(str);
const digest=await crypto.subtle.digest("SHA-256",buf);

return Array.from(new Uint8Array(digest))
.map(b=>b.toString(16).padStart(2,"0"))
.join("");

}

/* password check */

async function check(){

let input=document.getElementById("pass").value;

let hash=await sha256(input);

/* hash of password */

if(hash==="9f3a1e6c8c2f5c6e5e9d7c0b2a3d5a7c2f9c1b6e8d4a0f3c2b1e7d6a9f5c4e3")

window.location="page2.html";

}else{

document.getElementById("error").style.display="block";

}

}

</script>

</body>
</html>
