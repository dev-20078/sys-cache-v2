<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
overflow:hidden;
background:url("bg5.jpg") no-repeat center/cover;
padding:20px;
}

/* TITLE */
.title{
font-size:28px;
font-weight:bold;
color:white;
text-shadow:0 0 10px gold,0 0 20px gold;
}

/* NAME */
.name{
margin-top:10px;
font-size:34px;
font-weight:bold;
color:#4da6ff;
text-shadow:0 0 10px #4da6ff,0 0 20px #4da6ff;
}

/* CAKE */
.cake{
margin-top:20px;
width:220px;
cursor:pointer;
}

/* MESSAGE */
.msg{
margin-top:20px;
font-size:18px;
color:black;
text-shadow:0 0 5px gold,0 0 10px gold;
}

/* TAP TEXT */
.tap{
margin-top:12px;
font-size:14px;
color:black;
text-shadow:0 0 5px white,0 0 10px gold;
}

/* NEXT BUTTON */
#nextBtn{
display:none;
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
background:linear-gradient(45deg,#00bfff,#4da6ff);
color:white;
box-shadow:0 0 10px #00bfff;
}
</style>
</head>

<body>

<div class="title">🥳HAPPY BIRTHDAY🥳</div>

<div class="name">💙DEAR MALOOTE💙</div>

<!-- IMPORTANT: CLICK HERE FOR MUSIC -->
<img src="cake.gif" class="cake" onclick="playMusic()">

<div class="msg">
ALLAH AAPKO DUNIYA KI SAARI KHUSHIYAN AUR KAMIYABI DE 🤍🤍
</div>

<div id="tapText" class="tap">👉 Tap the cake 👈</div>

<button id="nextBtn" onclick="goNext()">NEXT</button>

<audio id="music" preload="auto">
<source src="final.mp3" type="audio/mpeg">
</audio>

<script>

let started = false;

function playMusic(){
if(started) return;

const audio = document.getElementById("music");

/* FORCE PLAY (USER CLICK) */
audio.currentTime = 0;
audio.play();

started = true;

/* SHOW BUTTON AFTER 30s */
setTimeout(()=>{
document.getElementById("tapText").style.display="none";
document.getElementById("nextBtn").style.display="inline-block";
},30000);
}

function goNext(){
window.location.href="page6.html";
}

</script>

</body>
</html>
