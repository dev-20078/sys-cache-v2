<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
background:url("bg5.jpg") no-repeat center/cover;
}

#main{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
width:100%;
}

.corner{
position:absolute;
top:10px;
right:10px;
width:80px;
}

.title{
font-size:28px;
color:white;
text-shadow:0 0 10px gold;
}

.name{
font-size:38px;
font-family:'Great Vibes', cursive;
color:#0033cc;
text-shadow:0 0 10px #3399ff,0 0 20px #66ccff;
}

.cake{
width:220px;
margin-top:20px;
}

.msg{
margin-top:15px;
font-size:18px;
color:black;
text-shadow:0 0 5px gold;
}

#tapText{
margin-top:15px;
font-size:30px;
font-weight:bold;
color:black;
text-shadow:0 0 5px gold,0 0 10px gold;
animation:blink 1s infinite;
}

#countdown{
display:none;
margin-top:10px;
font-size:50px;
font-weight:bold;
color:black;
text-shadow:0 0 5px gold;
}

#nextBtn{
display:none;
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00bfff,#4da6ff);
color:white;
font-weight:bold;
box-shadow:0 0 10px #00bfff,0 0 20px #00bfff;
}

/* VIDEO */
#videoContainer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:1000;
}

#closeVideo{
position:absolute;
top:15px;
right:15px;
font-size:30px;
color:white;
z-index:2000;
cursor:pointer;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}
</style>
</head>

<body onclick="startCountdown()">

<div id="main">

<img src="corner.png" class="corner">

<div class="title">🥳HAPPY BIRTHDAY🥳</div>
<div class="name">💙DEAR MALOOTE💙</div>

<img src="cake.gif" class="cake">

<div class="msg">
ALLAH AAPKO DUNIYA KI SAARI KHUSHIYAN AUR KAMIYABI DE 🤍🤍
</div>

<div id="tapText">TAP THE SCREEN</div>
<div id="countdown">15</div>

<button id="nextBtn" onclick="goNext()">NEXT</button>

</div>

<div id="videoContainer">
<div id="closeVideo" onclick="closeVideo()">✖</div>
<video id="video" controls playsinline></video>
</div>

<audio id="music" src="final.mp3"></audio>

<script>

let started = false;
let time = 15;

let videos = [
"part1.mp4",
"part2.mp4",
"part3.mp4",
"part4.mp4",
"part5.mp4",
"part6.mp4",
"part7.mp4"
];

let index = 0;
let video = document.getElementById("video");

function startCountdown(){

if(started) return;
started = true;

document.getElementById("music").play();

document.getElementById("tapText").style.display="none";
document.getElementById("countdown").style.display="block";

let interval = setInterval(()=>{
time--;
document.getElementById("countdown").innerText = time;

if(time<=0){
clearInterval(interval);
startVideo();
}
},1000);
}

function startVideo(){
document.getElementById("videoContainer").style.display="block";
video.src = videos[index];
video.play();
}

video.onended = function(){

index++;

if(index < videos.length){
video.src = videos[index];
video.play();
}else{
document.getElementById("videoContainer").style.display="none";
document.getElementById("nextBtn").style.display="block";
}

}

function closeVideo(){
video.pause();
document.getElementById("videoContainer").style.display="none";
document.getElementById("nextBtn").style.display="block";
}

function goNext(){
window.location.href="page6.html";
}

</script>

</body>
  </html>
