<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Stylish Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
background:url("bg5.jpg") no-repeat center/cover;
}

/* TITLE */
.title{
font-size:28px;
color:white;
text-shadow:0 0 10px gold,0 0 20px gold;
}

/* NAME */
.name{
font-size:38px;
font-family:'Great Vibes', cursive;
color:#0033cc;
text-shadow:
0 0 5px #0033cc,
0 0 10px #0066ff,
0 0 20px #3399ff,
0 0 30px #66ccff;
}

/* CAKE */
.cake{
width:220px;
margin-top:20px;
cursor:pointer;
}

/* TAP TEXT (BLACK + GOLD GLOW) */
#tapText{
margin-top:12px;
font-size:16px;
font-weight:bold;
color:black;
text-shadow:
0 0 5px gold,
0 0 10px gold,
0 0 20px gold;
animation:blink 1.2s infinite;
}

/* BLINK */
@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* MESSAGE */
.msg{
margin-top:15px;
font-size:18px;
color:black;
text-shadow:0 0 5px gold,0 0 10px gold;
}

/* BUTTON */
#nextBtn{
display:none;
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00bfff,#4da6ff);
color:white;
font-weight:bold;
box-shadow:0 0 10px #00bfff,0 0 20px #00bfff;
}
</style>
</head>

<body>

<div class="title">🥳HAPPY BIRTHDAY🥳</div>

<div class="name">💙DEAR MALOOTE💙</div>

<img src="cake.gif" class="cake" onclick="startAll()">

<div id="tapText">👉 Tap the cake 👈</div>

<div class="msg">
ALLAH AAPKO DUNIYA KI SAARI KHUSHIYAN AUR KAMIYABI DE 🤍🤍
</div>

<button id="nextBtn" onclick="goNext()">NEXT</button>

<!-- AUDIO -->
<audio id="music" src="final.mp3"></audio>

<script>

let started = false;

function startAll(){
if(started) return;

let audio = document.getElementById("music");

/* DIRECT PLAY */
audio.play();

started = true;

/* 30 sec delay */
setTimeout(()=>{
document.getElementById("tapText").style.display="none";
document.getElementById("nextBtn").style.display="block";
},30000);
}

function goNext(){
window.location.href="page6.html";
}

</script>

</body>
</html>
