<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💛</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Segoe UI;
overflow:hidden;
background:url("bg5.jpg") no-repeat center center/cover;
}

/* TITLE */
.title{
font-size:38px;
font-weight:900;
color:#00bfff;
text-shadow:0 0 15px #00bfff, 0 0 30px #00bfff;
}

/* SIDE */
.side{
margin-top:10px;
font-size:20px;
color:white;
text-shadow:0 0 10px white;
}

/* NAME */
.name{
margin-top:10px;
font-size:26px;
font-weight:bold;
color:#4da6ff;
text-shadow:0 0 15px #4da6ff;
}

/* CAKE */
.cake{
margin-top:20px;
font-size:80px;
cursor:pointer;
position:relative;
}

/* TAP TEXT */
.tap{
font-size:14px;
color:gold;
text-shadow:0 0 10px gold;
animation:blink 1s infinite;
margin-top:5px;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

/* MESSAGE */
.message{
margin-top:20px;
font-size:18px;
color:silver;
text-shadow:0 0 10px silver, 0 0 20px white;
padding:10px;
}

/* CONTINUE BUTTON */
#continueBtn{
display:none;
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,green,lightgreen);
color:#000;
font-weight:bold;
font-size:16px;
box-shadow:0 0 15px green;
}
</style>

</head>

<body>

<div class="title">HAPPY BIRTHDAY</div>

<div class="side">🥳HAPPY BIRTHDAY🥳</div>

<div class="name">💙DEAR MALOOTE💙</div>

<!-- CAKE -->
<div class="cake" onclick="startMusic()">
🎂🎂🎂<br>
🍓🎂🍓<br>
🐰🎂🐰
</div>

<div class="tap">✨ Tap the cake ✨</div>

<div class="message">
Allah aapko duniya ki saari khushiyan aur kamyabi de 🤍🤍
</div>

<!-- CONTINUE -->
<button id="continueBtn" onclick="nextPage()">CONTINUE</button>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="final.mp3" type="audio/mpeg">
</audio>

<script>

let started = false;

function startMusic(){
  if(!started){
    document.getElementById("music").play();
    started = true;

    // show continue button
    document.getElementById("continueBtn").style.display="inline-block";
  }
}

function nextPage(){
  window.location.href="page6.html";
}

</script>

</body>
</html>
