<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
background:url("bg5.jpg") no-repeat center/cover;
}

/* TITLE */
.title{
font-size:28px;
color:white;
text-shadow:0 0 10px gold;
}

/* NAME */
.name{
font-size:38px;
font-family:'Great Vibes', cursive;
color:#0033cc;
text-shadow:0 0 10px #3399ff,0 0 20px #66ccff;
}

/* CAKE */
.cake{
width:220px;
margin-top:20px;
cursor:pointer;
}

/* MESSAGE */
.msg{
margin-top:20px;
font-size:18px;
color:black;
text-shadow:0 0 5px gold;
}

/* BUTTON */
#nextBtn{
display:none;
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#00bfff;
color:white;
}
</style>
</head>

<body>

<div class="title">🥳HAPPY BIRTHDAY🥳</div>

<div class="name">💙DEAR MALOOTE💙</div>

<img src="cake.gif" class="cake" onclick="startAll()">

<div class="msg">
ALLAH AAPKO DUNIYA KI SAARI KHUSHIYAN AUR KAMIYABI DE 🤍🤍
</div>

<button id="nextBtn" onclick="goNext()">NEXT</button>

<audio id="music" src="final.mp3"></audio>

<script>

let started = false;

function startAll(){
if(started) return;

let audio = document.getElementById("music");

/* DIRECT PLAY (USER CLICK = ALWAYS WORKS) */
audio.play();

started = true;

/* SHOW BUTTON AFTER 30s */
setTimeout(()=>{
document.getElementById("nextBtn").style.display="block";
},30000);
}

function goNext(){
window.location.href="page6.html";
}

</script>

</body>
</html>
