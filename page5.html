<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
background:url("bg5.jpg") no-repeat center/cover;
}

#main{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
width:100%;
}

.corner{
position:absolute;
top:10px;
right:10px;
width:80px;
}

.title{
font-size:28px;
color:white;
text-shadow:0 0 10px gold;
}

.name{
font-size:38px;
font-family:'Great Vibes', cursive;
color:#0033cc;
text-shadow:0 0 10px #3399ff,0 0 20px #66ccff;
}

.cake{
width:220px;
margin-top:20px;
}

.msg{
margin-top:15px;
font-size:18px;
color:black;
text-shadow:0 0 5px gold;
}

#tapText{
margin-top:15px;
font-size:30px;
font-weight:bold;
color:black;
text-shadow:0 0 5px gold,0 0 10px gold;
animation:blink 1s infinite;
}

#countdown{
display:none;
margin-top:10px;
font-size:50px;
font-weight:bold;
color:black;
text-shadow:0 0 5px gold;
}

#nextBtn{
display:none;
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00bfff,#4da6ff);
color:white;
font-weight:bold;
box-shadow:0 0 10px #00bfff,0 0 20px #00bfff;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}
</style>
</head>

<body>

<div id="main" onclick="startCountdown()">

<img src="corner.png" class="corner">

<div class="title">🥳HAPPY BIRTHDAY🥳</div>
<div class="name">💙DEAR MALOOTE💙</div>

<img src="cake.gif" class="cake">

<div class="msg">
ALLAH AAPKO DUNIYA KI SAARI KHUSHIYAN AUR KAMIYABI DE 🤍🤍
</div>

<div id="tapText">TAP THE SCREEN</div>
<div id="countdown">15</div>

<button id="nextBtn" onclick="goNext()">NEXT</button>

</div>

<audio id="music" preload="auto">
<source src="final.mp3" type="audio/mpeg">
</audio>

<script>
let started=false;
let time=15;

function startCountdown(){

if(started) return;
started=true;

let music=document.getElementById("music");

/* FORCE UNLOCK AUDIO */
music.pause();
music.currentTime=0;
let playPromise = music.play();

if(playPromise !== undefined){
playPromise.catch(()=>{
document.addEventListener("click",()=>{
music.play();
},{once:true});
});
}

document.getElementById("tapText").style.display="none";
document.getElementById("countdown").style.display="block";

let interval=setInterval(()=>{
time--;
document.getElementById("countdown").innerText=time;

if(time<=0){
clearInterval(interval);
document.getElementById("nextBtn").style.display="block";
}
},1000);
}

function goNext(){
window.location.href="page6.html";
}
</script>

</body>
</html>
