<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Page</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
--pink-glow:#ff007f;
--blue-glow:#00d2ff;
--bg-dark:#050505;
}

body{
margin:0;
padding:0;
background-color:var(--bg-dark);
color:#fff;
font-family:'Montserrat',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

#intro-screen{
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
}

.shiny-text{
font-family:'Dancing Script',cursive;
font-size:4rem;
text-shadow:0 0 10px var(--pink-glow),
0 0 20px var(--pink-glow),
0 0 30px #ff66b2;
margin-bottom:40px;
}

.play-btn{
background:transparent;
color:#fff;
border:2px solid var(--pink-glow);
padding:12px 40px;
font-size:1.2rem;
border-radius:50px;
cursor:pointer;
box-shadow:0 0 15px var(--pink-glow);
}

#lyrics-screen{
display:none;
width:100%;
height:100%;
justify-content:center;
align-items:center;
}

.lyrics-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
max-width:90%;
}

.element-box{
width:95px;
height:110px;
border:2px solid var(--blue-glow);
border-radius:12px;
position:relative;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 0 15px var(--blue-glow);
animation:slideUp .4s ease;
}

@keyframes slideUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.atomic-num{
position:absolute;
top:5px;
left:6px;
font-size:10px;
color:var(--blue-glow);
}

.atomic-mass{
position:absolute;
top:5px;
right:6px;
font-size:10px;
}

.symbol{
font-size:24px;
font-weight:bold;
}

.el-name{
font-size:9px;
text-align:center;
}

.word{
font-size:9px;
opacity:.7;
}

/* rotate overlay */

#rotate-screen{
position:fixed;
inset:0;
background:#03040a;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
}

.phone{
width:90px;
height:150px;
border:3px solid #00d2ff;
border-radius:16px;
animation:rot 2s infinite ease-in-out;
box-shadow:0 0 20px #00d2ff;
}

@keyframes rot{
0%{transform:rotate(0)}
50%{transform:rotate(90deg)}
100%{transform:rotate(0)}
}

.rotate-text{
margin-top:20px;
letter-spacing:2px;
color:#00d2ff;
}

</style>
</head>

<body>

<audio id="bg-audio" src="mec.mp3"></audio>

<div id="intro-screen">
<div class="shiny-text">AAP KELIYE EK SURPRISE HAI</div>
<button class="play-btn" id="start-trigger">click here</button>
</div>

<div id="lyrics-screen">
<div class="lyrics-container" id="lyrics-display"></div>
</div>

<div id="rotate-screen">
<div class="phone"></div>
<div class="rotate-text">Rotate for best experience</div>
</div>

<script>

const audio=document.getElementById("bg-audio")
const trigger=document.getElementById("start-trigger")
const display=document.getElementById("lyrics-display")
const rotate=document.getElementById("rotate-screen")

const phrases=[
{
time:9.1,
items:[
{n:12,m:"24.31",s:"Mg",name:"Magnesium",w:"Main"},
{n:79,m:"196.97",s:"Au",name:"Gold",w:"Avaan"},
{n:92,m:"238.03",s:"U",name:"Uranium",w:"Ud"},
{n:19,m:"39.09",s:"K",name:"Potassium",w:"Ke"},
{n:57,m:"138.91",s:"La",name:"Lanthanum",w:"Le"},
{s:"J",name:"Joule",w:"Jawan"},
{n:11,m:"22.99",s:"Na",name:"Sodium",w:"Nal"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"}
]
},
{
time:13.9,
items:[
{n:12,m:"24.31",s:"Mg",name:"Magnesium",w:"Main"},
{n:79,m:"196.97",s:"Au",name:"Gold",w:"Avaan"},
{n:92,m:"238.03",s:"U",name:"Uranium",w:"Ud"},
{n:19,m:"39.09",s:"K",name:"Potassium",w:"Ke"},
{n:57,m:"138.91",s:"La",name:"Lanthanum",w:"Le"},
{s:"J",name:"Joule",w:"Jawan"},
{n:11,m:"22.99",s:"Na",name:"Sodium",w:"Nal"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"}
]
}
/* add rest same */
]

let index=0

trigger.onclick=()=>{
audio.play()
document.getElementById("intro-screen").style.display="none"
document.getElementById("lyrics-screen").style.display="flex"
rotate.style.display="flex"
requestAnimationFrame(loop)
}

audio.addEventListener("timeupdate",()=>{
if(audio.currentTime>=9.1){
rotate.style.display="none"
}
})

function loop(){

const t=audio.currentTime

if(index<phrases.length && t>=phrases[index].time){
render(phrases[index])
index++
}

requestAnimationFrame(loop)
}

function render(p){

fade()

setTimeout(()=>{

p.items.forEach(x=>{

const div=document.createElement("div")
div.className="element-box"

div.innerHTML=`
<div class="atomic-num">${x.n||""}</div>
<div class="atomic-mass">${x.m||""}</div>
<div class="symbol">${x.s}</div>
<div class="el-name">${x.name}</div>
<div class="word">${x.w}</div>
`

display.appendChild(div)

})

},350)

}

function fade(){

const boxes=document.querySelectorAll(".element-box")

boxes.forEach(b=>{
b.style.transition=".3s"
b.style.opacity="0"
b.style.filter="blur(6px)"
})

setTimeout(()=>display.innerHTML="",300)

}

</script>
</body>
                                                    </html>
