<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Page</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
--pink-glow: #ff007f;
--blue-glow: #00d2ff;
--bg-dark: #050505;
}

body {
margin: 0;
padding: 0;
background-color: var(--bg-dark);
color: #ffffff;
font-family: 'Montserrat', sans-serif;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100vh;
overflow: hidden;
}

#intro-screen {
text-align: center;
transition: all 1s ease;
display: flex;
flex-direction: column;
align-items: center;
}

.shiny-text {
font-family: 'Dancing Script', cursive;
font-size: 4rem;
color: #fff;
text-align: center;
text-shadow: 0 0 10px var(--pink-glow),
0 0 20px var(--pink-glow),
0 0 30px #ff66b2;
animation: breathe 2s infinite alternate;
margin-bottom: 40px;
line-height: 1.2;
padding: 0 20px;
}

@keyframes breathe {
from { opacity: 0.8; transform: scale(0.98); }
to { opacity: 1; transform: scale(1.03); }
}

.play-btn {
background: transparent;
color: #fff;
border: 2px solid var(--pink-glow);
padding: 12px 40px;
font-size: 1.2rem;
font-family: 'Montserrat', sans-serif;
font-weight: 600;
border-radius: 50px;
cursor: pointer;
box-shadow: 0 0 15px var(--pink-glow);
transition: 0.3s;
}

.play-btn:hover {
background: var(--pink-glow);
box-shadow: 0 0 30px var(--pink-glow);
transform: translateY(-3px);
}

#lyrics-screen {
display: none;
width: 100%;
height: 100%;
flex-direction: column;
align-items: center;
justify-content: center;
}

.lyrics-container {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 15px;
max-width: 90%;
padding: 20px;
}

.element-box {
width: 95px;
height: 110px;
background: rgba(10, 10, 15, 0.9);
border: 2px solid var(--blue-glow);
border-radius: 12px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
box-shadow: 0 0 15px var(--blue-glow), inset 0 0 8px var(--blue-glow);
animation: entry 0.45s ease forwards;
position: relative;
}

@keyframes entry {
from {
opacity: 0;
transform: translateY(15px) scale(0.85);
}
to {
opacity: 1;
transform: translateY(0) scale(1);
}
}

.el-num {
position: absolute;
top: 5px;
left: 8px;
font-size: 0.65rem;
color: var(--blue-glow);
font-weight: bold;
}

.el-sym {
font-size: 2.5rem;
font-weight: bold;
font-family: 'Montserrat', sans-serif;
color: #fff;
text-shadow: 0 0 8px #ffffff;
}

.el-name {
font-size: 0.55rem;
text-transform: uppercase;
letter-spacing: 1px;
color: #ccc;
margin-top: 5px;
text-align: center;
}

#final-btn {
position: absolute;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
padding: 12px 30px;
background: transparent;
border: 2px solid var(--blue-glow);
color: #fff;
font-family: 'Montserrat', sans-serif;
font-weight: bold;
border-radius: 8px;
cursor: pointer;
display: none;
box-shadow: 0 0 15px var(--blue-glow), inset 0 0 5px var(--blue-glow);
transition: 0.3s;
z-index: 100;
}

#final-btn:hover {
background: var(--blue-glow);
color: #000;
box-shadow: 0 0 25px var(--blue-glow);
}
</style>
</head>

<body>

<audio id="bg-audio" src="mec.mp3"></audio>

<div id="intro-screen">
<div class="shiny-text">AAP KELIYE EK SURPRISE HAI</div>
<button class="play-btn" id="start-trigger">click here</button>
</div>

<div id="lyrics-screen">
<div class="lyrics-container" id="lyrics-display"></div>
</div>

<button id="final-btn" onclick="location.href='final_page.html'">FINAL PAGE</button>

<script>

];

let index = 0;

trigger.addEventListener('click', () => {

audio.play();

document.getElementById('intro-screen').style.opacity = '0';

setTimeout(() => {
document.getElementById('intro-screen').style.display = 'none';
document.getElementById('lyrics-screen').style.display = 'flex';
startSync();
}, 500);

setTimeout(() => {
finalBtn.style.display = 'block';
setTimeout(() => finalBtn.style.opacity = '1', 50);
}, 10000);

});

function startSync(){
requestAnimationFrame(update);
}

function update(){
const currentTime = audio.currentTime;

while(index < songData.length && currentTime >= songData[index].time - 0.05){

if(songData[index].clear){
fadeClear();
}else{
createBox(songData[index]);
}

index++;
}

requestAnimationFrame(update);
}

function fadeClear(){
const boxes = document.querySelectorAll('.element-box');

boxes.forEach(box=>{
box.style.transition="0.4s";
box.style.opacity="0";
box.style.transform="translateY(-10px) scale(0.9)";
});

setTimeout(()=>{
display.innerHTML='';
},400);
}

function createBox(data){
const div=document.createElement('div');

div.className='element-box';

div.innerHTML=`
<div class="el-num">${data.n || ""}</div>
<div class="el-sym">${data.sym}</div>
<div class="el-name">${data.name}</div>
`;

display.appendChild(div);
}
</script>

</body>
  </html>
