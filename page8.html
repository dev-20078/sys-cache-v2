<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #87CEEB; /* Bright Sky Blue Fallback */
            font-family: 'Cinzel', serif; user-select: none;
        }

        /* --- PHASE 1 --- */
        #surprise-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020205; /* Keeps Phase 1 dark for the neon surprise effect */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; color: white;
            transition: opacity 1.5s ease-out;
        }

        .surprise-text {
            font-family: 'Dancing Script', cursive; font-size: 5rem; 
            color: #fff; 
            text-shadow: 0 0 10px #ff99cc, 0 0 20px #ff66b2, 0 0 40px #ff1493, 0 0 80px #ff1493;
            margin-bottom: 50px; padding: 0 20px; letter-spacing: 2px;
            animation: fadeInGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes fadeInGlow {
            from { opacity: 0.8; text-shadow: 0 0 10px #ff99cc, 0 0 20px #ff66b2; }
            to { opacity: 1; text-shadow: 0 0 20px #ff99cc, 0 0 40px #ff1493, 0 0 80px #ff1493, 0 0 120px #ff1493; }
        }

        .neon-btn {
            padding: 15px 50px; font-size: 1.5rem; font-weight: bold; font-family: inherit;
            color: #fff; background: transparent; 
            border: 2px solid #ff1493; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px #ff1493, inset 0 0 15px #ff1493;
            text-shadow: 0 0 10px #ff66b2;
            transition: all 0.3s ease; animation: pinkPulse 2s infinite;
        }
        
        @keyframes pinkPulse {
            0% { transform: scale(1); box-shadow: 0 0 15px #ff1493, inset 0 0 15px #ff1493; }
            50% { transform: scale(1.05); box-shadow: 0 0 30px #ff1493, inset 0 0 30px #ff1493; }
            100% { transform: scale(1); box-shadow: 0 0 15px #ff1493, inset 0 0 15px #ff1493; }
        }

        /* --- PHASE 3: BRIGHT GARDEN UI --- */
        #space-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 5; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; pointer-events: none; }

        #walk-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); pointer-events: auto;
            border-color: #00d2ff; color: #fff; background: rgba(0, 210, 255, 0.2);
            box-shadow: 0 0 15px #00d2ff, inset 0 0 15px #00d2ff;
            text-shadow: 0 0 10px #00d2ff; animation: bluePulse 2s infinite;
        }
        #walk-btn:active { background: rgba(0, 210, 255, 0.5); transform: translateX(-50%) scale(0.95); }

        @keyframes bluePulse {
            0%, 100% { box-shadow: 0 0 15px #00d2ff, inset 0 0 15px #00d2ff; }
            50% { box-shadow: 0 0 30px #00d2ff, inset 0 0 30px #00d2ff; }
        }

        /* FINAL BLUE GLOWING BUTTON */
        #final-page-btn {
            position: absolute; bottom: 40px; left: -300px; /* Hidden initially */
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Cinzel', serif; font-weight: bold;
            color: #fff; background: transparent; 
            border: 2px solid #00d2ff; border-radius: 50px; text-decoration: none;
            box-shadow: 0 0 20px #00d2ff, inset 0 0 20px #00d2ff;
            text-shadow: 0 0 10px #00d2ff;
            z-index: 210; transition: left 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .surprise-text { font-size: 3rem; }
            .neon-btn, #final-page-btn { font-size: 1.1rem; padding: 12px 30px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="surprise.mp3" loop preload="auto"></audio>

    <div id="surprise-screen">
        <div class="surprise-text">Aap ke liye ek surprise hai...</div>
        <button class="neon-btn" id="click-me-btn">Ise Click Karo ✨</button>
    </div>

    <div id="space-screen"></div>
    <div id="ui-container">
        <button id="walk-btn">HOLD TO WALK</button>
        <a id="final-page-btn" href="page9.html">FINAL PAGE</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const surpriseScreen = document.getElementById('surprise-screen');
        const clickMeBtn = document.getElementById('click-me-btn');
        const spaceScreen = document.getElementById('space-screen');
        const uiContainer = document.getElementById('ui-container');
        const walkBtn = document.getElementById('walk-btn');
        const finalPageBtn = document.getElementById('final-page-btn');

        // Bright Daytime Flower Colors
        const flowerColors = [
            '#FF1493', // Deep Pink Rose
            '#FF69B4', // Hot Pink
            '#FFB6C1', // Light Pink Lotus
            '#FF4500', // Orange Red
            '#FFD700', // Yellow Marigold
            '#87CEFA'  // Light Sky Blue
        ];

        // --- TRANSITION: Phase 1 direct to Phase 3 ---
        clickMeBtn.addEventListener('click', () => {
            bgMusic.play().catch(e => console.log(e));
            surpriseScreen.style.opacity = '0';
            setTimeout(() => {
                surpriseScreen.style.display = 'none';
                spaceScreen.style.display = 'block';
                uiContainer.style.display = 'block';
                initBrightGarden();
                
                // Show final blue button strictly after 10 seconds
                setTimeout(() => {
                    finalPageBtn.style.left = '20px';
                }, 10000);
            }, 1000);
        });

        // ==========================================
        // PHASE 3: BRIGHT SUNNY DAY, INFINITE GARDEN (NO LAG)
        // ==========================================
        function initBrightGarden() {
            const scene = new THREE.Scene();
            // Bright Sunny Sky Background & Fog
            const skyColor = 0x87CEEB; 
            scene.background = new THREE.Color(skyColor);
            scene.fog = new THREE.FogExp2(skyColor, 0.002); // Light fog for depth

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 20, 0); 

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            spaceScreen.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.enableZoom = false; controls.enablePan = false;
            // Allow looking slightly up to see the sun, but not under the ground
            controls.maxPolarAngle = Math.PI / 2 + 0.05; 
            controls.minPolarAngle = Math.PI / 4;
            controls.target.set(0, 20, -1); 

            // THE SUN ☀️
            const sunGeo = new THREE.SphereGeometry(40, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFFFAA, fog: false });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            sun.position.set(200, 300, -800); // Positioned high in the sky
            scene.add(sun);

            // Sun Glow
            const glowGeo = new THREE.PlaneGeometry(300, 300);
            const glowMat = new THREE.MeshBasicMaterial({ 
                color: 0xFFFF00, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, fog: false, side: THREE.DoubleSide
            });
            const sunGlow = new THREE.Mesh(glowGeo, glowMat);
            sunGlow.position.copy(sun.position);
            sunGlow.lookAt(camera.position);
            scene.add(sunGlow);

            // Bright Green Grass Ground
            const groundGeo = new THREE.PlaneGeometry(10000, 10000);
            const groundMat = new THREE.MeshBasicMaterial({ color: 0x32CD32, side: THREE.DoubleSide }); // Lime Green
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Create Flower Textures
            function createTexture(color) {
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.translate(64, 64);
                for (let i = 0; i < 8; i++) {
                    ctx.rotate((Math.PI * 2) / 8);
                    ctx.beginPath(); ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(40, -20, 60, -10, 60, 0);
                    ctx.bezierCurveTo(60, 10, 40, 20, 0, 0);
                    const grad = ctx.createRadialGradient(0, 0, 0, 30, 0, 60);
                    grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, color); grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad; ctx.fill();
                }
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fillStyle = '#FFD700'; ctx.fill(); // Yellow center
                ctx.fillStyle = '#006400'; ctx.fillRect(-2, 0, 4, 64); // Dark green stem
                return new THREE.CanvasTexture(canvas);
            }

            const textures = flowerColors.map(c => createTexture(c));
            
            const material = new THREE.MeshBasicMaterial({ 
                map: textures[0], transparent: true, alphaTest: 0.1, side: THREE.DoubleSide 
            });

            // ULTIMATE INFINITE SHADER (GPU handles movement, ZERO LAG)
            material.onBeforeCompile = (shader) => {
                shader.uniforms.time = { value: 0 };
                shader.uniforms.camPos = { value: new THREE.Vector3() };
                material.userData.shader = shader;
                shader.vertexShader = `
                  uniform float time;
                  uniform vec3 camPos;
                  ${shader.vertexShader}
                `.replace(
                  `#include <project_vertex>`,
                  `
                  vec4 mvPosition = vec4( transformed, 1.0 );
                  #ifdef USE_INSTANCING
                      mat4 im = instanceMatrix;
                      
                      // INFINITE WRAP TRICK
                      float fieldSize = 600.0;
                      float halfSize = 300.0;
                      im[3][0] = mod(im[3][0] - camPos.x + halfSize, fieldSize) - halfSize + camPos.x;
                      im[3][2] = mod(im[3][2] - camPos.z + halfSize, fieldSize) - halfSize + camPos.z;

                      // Gentle wind
                      float wind = sin(time * 2.0 + im[3][0] * 0.05 + im[3][2] * 0.05) * 2.0;
                      mvPosition.x += wind * (position.y / 12.0);

                      mvPosition = im * mvPosition;
                  #endif
                  mvPosition = modelViewMatrix * mvPosition;
                  gl_Position = projectionMatrix * mvPosition;
                  `
                );
            };

            // 20,000 flowers combined with infinite wrap = 1 Crore Feel with 0 Lag!
            const FLOWER_COUNT = 20000;
            const FIELD_SIZE = 600; 
            const geometry = new THREE.PlaneGeometry(15, 15);
            geometry.translate(0, 7.5, 0); 
            
            const instancedMesh = new THREE.InstancedMesh(geometry, material, FLOWER_COUNT);
            instancedMesh.frustumCulled = false; // Prevents clipping issues with infinite shader
            const dummy = new THREE.Object3D();
            
            for(let i=0; i<FLOWER_COUNT; i++) {
                const x = Math.random() * FIELD_SIZE - FIELD_SIZE/2;
                const z = Math.random() * FIELD_SIZE - FIELD_SIZE/2;
                dummy.position.set(x, 0, z);
                dummy.rotation.y = Math.random() * Math.PI;
                const scale = Math.random() * 0.5 + 0.5; // Good variation
                dummy.scale.set(scale, scale, scale);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(instancedMesh);

            // Walking mechanics
            let isWalking = false;
            const walkSpeed = 2.0; // Slightly faster walk for the big field
            const direction = new THREE.Vector3();

            walkBtn.addEventListener('mousedown', () => isWalking = true);
            walkBtn.addEventListener('mouseup', () => isWalking = false);
            walkBtn.addEventListener('mouseleave', () => isWalking = false);
            walkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isWalking = true; }, {passive:false});
            walkBtn.addEventListener('touchend', () => isWalking = false);

            const clock = new THREE.Clock();

            function animate3D() {
                requestAnimationFrame(animate3D);
                const time = clock.getElapsedTime();
                
                if (isWalking) {
                    camera.getWorldDirection(direction);
                    direction.y = 0; direction.normalize();
                    camera.position.addScaledVector(direction, walkSpeed);
                    controls.target.addScaledVector(direction, walkSpeed);
                    
                    // Keep Sun relative to camera so it stays in the sky
                    sun.position.x = camera.position.x + 200;
                    sun.position.z = camera.position.z - 800;
                    sunGlow.position.copy(sun.position);
                    sunGlow.lookAt(camera.position);
                }

                if (material.userData.shader) {
                    material.userData.shader.uniforms.time.value = time;
                    material.userData.shader.uniforms.camPos.value.copy(camera.position);
                }

                controls.update();
                renderer.render(scene, camera);
            }
            animate3D();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
  </html>
