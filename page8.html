<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-glow: #ff007f;
            --blue-glow: #00d2ff;
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #intro-screen {
            text-align: center;
            transition: all 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .shiny-text {
            font-family: 'Dancing Script', cursive; 
            font-size: 4rem;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 10px var(--pink-glow), 
                         0 0 20px var(--pink-glow), 
                         0 0 30px #ff66b2;
            animation: breathe 2s infinite alternate;
            margin-bottom: 40px;
            line-height: 1.2;
            padding: 0 20px;
        }

        @keyframes breathe {
            from { opacity: 0.8; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.03); }
        }

        .play-btn {
            background: transparent;
            color: #fff;
            border: 2px solid var(--pink-glow);
            padding: 12px 40px;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--pink-glow);
            transition: 0.3s;
        }

        .play-btn:hover {
            background: var(--pink-glow);
            box-shadow: 0 0 30px var(--pink-glow);
            transform: translateY(-3px);
        }

        #lyrics-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyrics-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 90%;
            padding: 20px;
        }

        .element-box {
            width: 95px;
            height: 110px;
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid var(--blue-glow);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--blue-glow), inset 0 0 8px var(--blue-glow);
            animation: entry 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
        }

        @keyframes entry {
            from { opacity: 0; transform: translateY(20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .el-num {
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 0.65rem;
            color: var(--blue-glow);
            font-weight: bold;
        }

        .el-sym {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            text-shadow: 0 0 8px #ffffff;
        }

        .el-name {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccc;
            margin-top: 5px;
            text-align: center;
        }

        #final-btn {
            position: absolute;
            bottom: 30px; 
            left: 50%;
            transform: translateX(-50%); 
            padding: 12px 30px;
            background: transparent;
            border: 2px solid var(--blue-glow);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none; 
            box-shadow: 0 0 15px var(--blue-glow), inset 0 0 5px var(--blue-glow);
            transition: 0.3s;
            z-index: 100; 
        }

        #final-btn:hover {
            background: var(--blue-glow);
            color: #000;
            box-shadow: 0 0 25px var(--blue-glow);
        }

    </style>
</head>
<body>

    <audio id="bg-audio" src="mec.mp3"></audio>

    <div id="intro-screen">
        <div class="shiny-text">AAP KELIYE EK SURPRISE HAI</div>
        <button class="play-btn" id="start-trigger">click here</button>
    </div>

    <div id="lyrics-screen">
        <div class="lyrics-container" id="lyrics-display"></div>
    </div>

    <button id="final-btn" onclick="location.href='final_page.html'">FINAL PAGE</button>

    <script>
        const audio = document.getElementById('bg-audio');
        const trigger = document.getElementById('start-trigger');
        const display = document.getElementById('lyrics-display');
        const finalBtn = document.getElementById('final-btn');

        // Deep mapping for 55 seconds of "Khayaal"
        const songData = [
            // 0-5s: Zulfaan de jaal tere tere
            { time: 0.5, sym: "Zn", n: "30", name: "Zinc (Zulfaan)" },
            { time: 1.5, sym: "Δ", n: "Math", name: "Delta (De)" },
            { time: 2.2, sym: "J", n: "Unit", name: "Joule (Jaal)" },
            { time: 3.0, sym: "Te", n: "52", name: "Tellurium (Tere)" },
            { time: 4.0, sym: "Re", n: "75", name: "Rhenium (Re)" },
            { time: 5.0, clear: true },

            // 6-10s: Main aawan udd ke
            { time: 6.0, sym: "Mg", n: "12", name: "Magnesium (Main)" },
            { time: 7.0, sym: "Au", n: "79", name: "Gold (Aawan)" },
            { time: 8.0, sym: "U", n: "92", name: "Uranium (Udd)" },
            { time: 9.0, sym: "K", n: "19", name: "Potassium (Ke)" },
            { time: 10.0, clear: true },

            // 11-14s: Lai jaawan naal tainu
            { time: 10.5, sym: "La", n: "57", name: "Lanthanum (Lai)" },
            { time: 11.5, sym: "J", n: "Unit", name: "Joule (Jaawan)" },
            { time: 12.5, sym: "Na", n: "11", name: "Sodium (Naal)" },
            { time: 13.5, sym: "Ta", n: "73", name: "Tantalum (Tainu)" },
            { time: 14.5, clear: true },

            // 15-20s: Je na tu aayi khayaal aune mainu
            { time: 15.0, sym: "J", n: "Unit", name: "Joule (Je)" },
            { time: 15.5, sym: "Na", n: "11", name: "Sodium (Na)" },
            { time: 16.5, sym: "Tm", n: "69", name: "Thulium (Tu)" },
            { time: 17.5, sym: "I", n: "53", name: "Iodine (Aayi)" },
            { time: 18.5, sym: "K", n: "19", name: "Potassium (Khayaal)" },
            { time: 19.5, sym: "Mn", n: "25", name: "Manganese (Mainu)" },
            { time: 20.5, clear: true },

            // 21-25s: Tainu main je dil ditta
            { time: 21.0, sym: "Ta", n: "73", name: "Tantalum (Tainu)" },
            { time: 22.0, sym: "Mg", n: "12", name: "Magnesium (Main)" },
            { time: 23.0, sym: "J", n: "Unit", name: "Joule (Je)" },
            { time: 24.0, sym: "D", n: "Math", name: "Deriv (Dil)" },
            { time: 25.0, sym: "Δt", n: "Math", name: "Time (Ditta)" },
            { time: 26.0, clear: true },

            // 27-30s: Sambhal laingi ennu
            { time: 26.5, sym: "Sm", n: "62", name: "Samarium (Sambhal)" },
            { time: 27.5, sym: "La", n: "57", name: "Lanthanum (Laingi)" },
            { time: 28.5, sym: "In", n: "49", name: "Indium (Ennu)" },
            { time: 30.0, clear: true },

            // 31-35s: Ni je dil ditta
            { time: 31.0, sym: "Ni", n: "28", name: "Nickel (Ni)" },
            { time: 32.0, sym: "J", n: "Unit", name: "Joule (Je)" },
            { time: 33.0, sym: "D", n: "Math", name: "Deriv (Dil)" },
            { time: 34.0, sym: "Δt", n: "Math", name: "Time (Ditta)" },
            { time: 35.0, clear: true },

            // 36-40s: Sambhal laingi ennu
            { time: 36.0, sym: "Sm", n: "62", name: "Samarium (Sambhal)" },
            { time: 37.0, sym: "La", n: "57", name: "Lanthanum (Laingi)" },
            { time: 38.0, sym: "In", n: "49", name: "Indium (Ennu)" },
            { time: 40.0, clear: true },

            // 41-45s: Je yaari todi
            { time: 41.0, sym: "J", n: "Unit", name: "Joule (Je)" },
            { time: 42.0, sym: "Y", n: "39", name: "Yttrium (Yaari)" },
            { time: 43.5, sym: "τ", n: "Math", name: "Tau (Todi)" },
            { time: 45.0, clear: true },

            // 46-50s: Khayaal aune tainu
            { time: 46.0, sym: "K", n: "19", name: "Potassium (Khayaal)" },
            { time: 47.5, sym: "Au", n: "79", name: "Gold (Aune)" },
            { time: 49.0, sym: "Ta", n: "73", name: "Tantalum (Tainu)" },
            { time: 50.0, clear: true },

            // 51-55s: Tainu main tera hoya
            { time: 51.0, sym: "Ta", n: "73", name: "Tantalum (Tainu)" },
            { time: 52.0, sym: "Mg", n: "12", name: "Magnesium (Main)" },
            { time: 53.0, sym: "Te", n: "52", name: "Tellurium (Tera)" },
            { time: 54.0, sym: "Ho", n: "67", name: "Holmium (Hoya)" },
            { time: 55.0, clear: true }
        ];

        let index = 0;

        trigger.addEventListener('click', () => {
            audio.play().catch(e => console.error("Audio failed:", e));
            
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('lyrics-screen').style.display = 'flex';
                startSync();
            }, 500);

            // Button shows at 10 seconds exactly like before
            setTimeout(() => {
                finalBtn.style.display = 'block';
                setTimeout(() => finalBtn.style.opacity = '1', 50);
            }, 10000);
        });

        function startSync() {
            requestAnimationFrame(update);
        }

        function update() {
            const currentTime = audio.currentTime;

            if (index < songData.length) {
                if (currentTime >= songData[index].time) {
                    if (songData[index].clear) {
                        display.innerHTML = '';
                    } else {
                        createBox(songData[index]);
                    }
                    index++;
                }
            }
            requestAnimationFrame(update);
        }

        function createBox(data) {
            const div = document.createElement('div');
            div.className = 'element-box';
            div.innerHTML = `
                <div class="el-num">${data.n}</div>
                <div class="el-sym">${data.sym}</div>
                <div class="el-name">${data.name}</div>
            `;
            display.appendChild(div);
        }
    </script>
</body>
  </html>
