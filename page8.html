<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-glow: #ff007f;
            --blue-glow: #00d2ff;
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Intro Screen --- */
        #intro-screen {
            text-align: center;
            transition: all 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .shiny-text {
            font-family: 'Dancing Script', cursive; /* Romantic Font */
            font-size: 4rem;
            color: #fff;
            text-align: center;
            /* Beautiful Pink Glow */
            text-shadow: 0 0 10px var(--pink-glow), 
                         0 0 20px var(--pink-glow), 
                         0 0 30px #ff66b2;
            animation: breathe 2s infinite alternate;
            margin-bottom: 40px;
            line-height: 1.2;
            padding: 0 20px;
        }

        @keyframes breathe {
            from { opacity: 0.8; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.03); }
        }

        .play-btn {
            background: transparent;
            color: #fff;
            border: 2px solid var(--pink-glow);
            padding: 12px 40px;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--pink-glow);
            transition: 0.3s;
        }

        .play-btn:hover {
            background: var(--pink-glow);
            box-shadow: 0 0 30px var(--pink-glow);
            transform: translateY(-3px);
        }

        /* --- Lyrics Screen --- */
        #lyrics-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyrics-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 90%;
            padding: 20px;
        }

        /* --- Beautiful Element Boxes --- */
        .element-box {
            width: 80px;
            height: 100px;
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid var(--blue-glow);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--blue-glow), inset 0 0 8px var(--blue-glow);
            animation: entry 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative;
        }

        @keyframes entry {
            from { opacity: 0; transform: translateY(20px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .el-num {
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 0.65rem;
            color: var(--blue-glow);
            font-weight: bold;
        }

        .el-sym {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            text-shadow: 0 0 8px #ffffff;
        }

        .el-name {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccc;
            margin-top: 5px;
        }

        /* --- Final Button Fix --- */
        #final-btn {
            position: absolute;
            bottom: 30px; /* Thoda upar kiya taaki screen se bahar na jaye */
            left: 50%;
            transform: translateX(-50%); /* Ekdum center me */
            padding: 12px 30px;
            background: transparent;
            border: 2px solid var(--blue-glow);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* Initially hidden */
            box-shadow: 0 0 15px var(--blue-glow), inset 0 0 5px var(--blue-glow);
            transition: 0.3s;
            z-index: 100; /* Taaki hamesha upar dikhe */
        }

        #final-btn:hover {
            background: var(--blue-glow);
            color: #000;
            box-shadow: 0 0 25px var(--blue-glow);
        }

    </style>
</head>
<body>

    <audio id="bg-audio" src="mec.mp3"></audio>

    <div id="intro-screen">
        <div class="shiny-text">AAP KELIYE EK SURPRISE HAI</div>
        <button class="play-btn" id="start-trigger">click here</button>
    </div>

    <div id="lyrics-screen">
        <div class="lyrics-container" id="lyrics-display"></div>
    </div>

    <button id="final-btn" onclick="location.href='final_page.html'">FINAL PAGE</button>

    <script>
        const audio = document.getElementById('bg-audio');
        const trigger = document.getElementById('start-trigger');
        const display = document.getElementById('lyrics-display');
        const finalBtn = document.getElementById('final-btn');

        // New Mapping: Starts immediately from 0.5s for the trimmed audio
        const songData = [
            // "Zulfaan de jaal tere tere"
            { time: 0.5, sym: "Zn", n: "30", name: "Zinc" },      
            { time: 1.5, sym: "Δ", n: "Math", name: "Delta" },    
            { time: 2.2, sym: "J", n: "Unit", name: "Joule" },    
            { time: 3.0, sym: "Te", n: "52", name: "Tellurium" }, 
            { time: 4.0, sym: "Te", n: "52", name: "Tellurium" }, 
            
            { time: 5.5, clear: true },

            // "Main aawan udd ke"
            { time: 6.0, sym: "Mg", n: "12", name: "Magnesium" }, 
            { time: 7.0, sym: "Au", n: "79", name: "Gold" },      
            { time: 8.0, sym: "U", n: "92", name: "Uranium" },    
            { time: 9.0, sym: "K", n: "19", name: "Potassium" },  

            { time: 10.0, clear: true },

            // "Lai jaawan naal tainu"
            { time: 10.5, sym: "La", n: "57", name: "Lanthanum" }, 
            { time: 11.5, sym: "J", n: "Unit", name: "Joule" },    
            { time: 12.5, sym: "Na", n: "11", name: "Sodium" },    
            { time: 13.5, sym: "Ta", n: "73", name: "Tantalum" },  

            { time: 14.5, clear: true },

            // "Je na tu aayi khayaal"
            { time: 15.0, sym: "Ge", n: "32", name: "Germanium" }, 
            { time: 16.0, sym: "Na", n: "11", name: "Sodium" },    
            { time: 17.0, sym: "Tm", n: "69", name: "Thulium" },   
            { time: 18.0, sym: "I", n: "53", name: "Iodine" },     
            { time: 19.0, sym: "K", n: "19", name: "Potassium" },  

            { time: 21.0, clear: true }
        ];

        let index = 0;

        trigger.addEventListener('click', () => {
            // Play audio
            audio.play().catch(e => console.error("Audio failed:", e));
            
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('lyrics-screen').style.display = 'flex';
                startSync();
            }, 500); // Intro screen fade out time reduced to show lyrics faster

            // 10 Seconds Fade-in for Final Button (centered at bottom)
            setTimeout(() => {
                finalBtn.style.display = 'block';
                setTimeout(() => finalBtn.style.opacity = '1', 50);
            }, 10000);
        });

        function startSync() {
            requestAnimationFrame(update);
        }

        function update() {
            const currentTime = audio.currentTime;

            if (index < songData.length) {
                if (currentTime >= songData[index].time) {
                    if (songData[index].clear) {
                        display.innerHTML = '';
                    } else {
                        createBox(songData[index]);
                    }
                    index++;
                }
            }
            requestAnimationFrame(update);
        }

        function createBox(data) {
            const div = document.createElement('div');
            div.className = 'element-box';
            div.innerHTML = `
                <div class="el-num">${data.n}</div>
                <div class="el-sym">${data.sym}</div>
                <div class="el-name">${data.name}</div>
            `;
            display.appendChild(div);
        }
    </script>
</body>
  </html>
