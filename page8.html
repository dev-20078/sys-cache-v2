<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Page</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --pink-glow: #ff007f;
  --blue-glow: #00d2ff;
  --bg-dark: #050505;
}

body {
  margin: 0;
  padding: 0;
  background: var(--bg-dark);
  color: white;
  font-family: Montserrat;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  flex-direction: column;
}

#intro-screen {
  text-align: center;
  z-index: 20;
}

.shiny-text {
  font-family: 'Dancing Script', cursive;
  font-size: 4rem;
  text-shadow: 0 0 20px #ff007f;
  margin-bottom: 40px;
}

.play-btn {
  background: #ff007f;
  color: white;
  border: none;
  padding: 14px 40px;
  border-radius: 40px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.play-btn:hover {
  box-shadow: 0 0 15px #ff007f;
  transform: scale(1.05);
}

/* Rotate Phone Animation Screen */
#rotate-screen {
  display: none;
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
  background: var(--bg-dark);
  transition: opacity 0.3s ease;
}

.phone-icon {
  width: 50px;
  height: 100px;
  border: 4px solid var(--blue-glow);
  border-radius: 10px;
  position: relative;
  box-shadow: 0 0 15px var(--blue-glow);
  animation: spinPhone 2s ease-in-out infinite;
}

.phone-icon::after {
  content: '';
  position: absolute;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  width: 12px;
  height: 3px;
  background: var(--blue-glow);
  border-radius: 5px;
}

.rotate-text {
  margin-top: 30px;
  font-size: 1.2rem;
  letter-spacing: 2px;
  color: var(--blue-glow);
  animation: pulse 1.5s infinite;
}

@keyframes spinPhone {
  0%, 10% { transform: rotate(0deg); }
  40%, 60% { transform: rotate(90deg); }
  90%, 100% { transform: rotate(0deg); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Lyrics Screen */
#lyrics-screen {
  display: none;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  position: absolute;
  z-index: 5;
}

.lyrics-container {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  max-width: 95%;
}

.element-box {
  width: 110px;
  height: 130px;
  border: 2px solid var(--blue-glow);
  border-radius: 12px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 15px var(--blue-glow);
  animation: pop .4s ease forwards;
}

@keyframes pop {
  from { opacity: 0; transform: scale(.7); }
  to { opacity: 1; transform: scale(1); }
}

.atomic-num { position: absolute; top: 4px; left: 6px; font-size: 11px; color: #00d2ff; }
.atomic-mass { position: absolute; top: 4px; right: 6px; font-size: 11px; }
.symbol { font-size: 30px; font-weight: bold; }
.el-title { font-size: 11px; }
.word { font-size: 10px; opacity: .7; text-transform: uppercase; margin-top: 4px; color: #ff007f; font-weight: bold;}

</style>
</head>

<body>

<div id="rotate-screen">

</div>

<div id="lyrics-screen">
  <div class="lyrics-container" id="lyrics-display"></div>
</div>

let index = 0;
let rotateHidden = false;

trigger.onclick = () => {
  audio.play();
  document.getElementById("intro-screen").style.display = "none";
  rotateScreen.style.display = "flex"; 
  document.getElementById("lyrics-screen").style.display = "flex";
  requestAnimationFrame(loop);
};

function loop() {
  const t = audio.currentTime;

  // 8.8 sec pe hide start hoga taaki 9.1 tak poora gayab ho jaye
  if (t >= 8.8 && !rotateHidden) {
    rotateHidden = true;
    rotateScreen.style.opacity = "0";
    setTimeout(() => { rotateScreen.style.display = "none"; }, 300);
  }

  if (index < phrases.length && t >= phrases[index].time) {
    showPhrase(phrases[index]);
    index++;
  }

  requestAnimationFrame(loop);
}

function showPhrase(p) {
  if (display.innerHTML.trim() !== "") {
    fadeClear(() => {
      createTiles(p);
    });
  } else {
    createTiles(p);
  }
}

function createTiles(p) {
  p.items.forEach(x => {
    const d = document.createElement("div");
    d.className = "element-box";
    d.innerHTML = `
      <div class="atomic-num">${x.n || ""}</div>
      <div class="atomic-mass">${x.m || ""}</div>
      <div class="symbol">${x.s}</div>
      <div class="el-title">${x.name || ""}</div>
      <div class="word">${x.w}</div>
    `;
    display.appendChild(d);
  });
}

function fadeClear(callback) {
  const b = document.querySelectorAll(".element-box");
  b.forEach(e => {
    e.style.transition = ".3s ease";
    e.style.opacity = "0";
    e.style.filter = "blur(6px)";
    e.style.transform = "scale(0.8)";
  });

  setTimeout(() => {
    display.innerHTML = "";
    if (callback) callback();
  }, 300);
}
