<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Initial Screen Styling */
        #intro-screen {
            text-align: center;
            transition: opacity 1s ease;
        }

        .stylish-text {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .play-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Poppins', sans-serif;
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        /* Lyrics Screen Styling */
        #lyrics-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyrics-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 80%;
        }

        /* Periodic Table Box Styling */
        .element-box {
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px;
            width: 80px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #111;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .el-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: #888;
        }

        .el-symbol {
            font-size: 2.5rem;
            font-weight: 600;
            font-family: 'Cinzel', serif;
        }

        .el-name {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccc;
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Final Page Glowing Button */
        #final-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: transparent;
            border: 2px solid #00d2ff;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px #00d2ff, inset 0 0 10px #00d2ff;
            text-shadow: 0 0 5px #00d2ff;
            display: none; /* Hidden initially */
            opacity: 0;
            transition: opacity 1s ease;
        }

        #final-btn:hover {
            background: #00d2ff;
            color: black;
            box-shadow: 0 0 30px #00d2ff;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" src="mec.mp3"></audio>

    <div id="intro-screen">
        <div class="stylish-text">AAP KE LIYE EK SURPRISE</div>
        <button class="play-btn" onclick="startSurprise()">click hear ha</button>
    </div>

    <div id="lyrics-screen">
        <div class="lyrics-container" id="lyrics-display"></div>
    </div>

    <button id="final-btn" onclick="goToFinalPage()">FINAL PAGE</button>

    <script>
        // Yahan par aapko apne gaane ke hisaab se mapping aur time set karna hai.
        // time = kis second par dikhana hai
        // symbol = Periodic table ka letter ya math symbol
        // number = Atomic number (optional)
        // name = Element ka full name
        const lyricsData = [
            { time: 1.0, symbol: "Mo", number: "42", name: "Molybdenum" },
            { time: 1.5, symbol: "H", number: "1", name: "Hydrogen" },
            { time: 2.0, symbol: "Am", number: "95", name: "Americium" },
            { time: 2.5, symbol: "Me", number: "∞", name: "Math Symbol" }, // Example of Math symbol
            { time: 3.0, symbol: "D", number: "Δ", name: "Delta" },
            
            // Ye data aage clear karne ke liye
            { time: 4.5, clear: true }, 

            { time: 5.0, symbol: "Na", number: "11", name: "Sodium" },
            { time: 5.5, symbol: "Bi", number: "83", name: "Bismuth" },
            { time: 6.0, symbol: "Na", number: "11", name: "Sodium" }
        ];

        let currentLyricIndex = 0;
        let animationFrameId;

        function startSurprise() {
            const audio = document.getElementById('bg-audio');
            const introScreen = document.getElementById('intro-screen');
            const lyricsScreen = document.getElementById('lyrics-screen');
            const finalBtn = document.getElementById('final-btn');

            // Hide intro, show lyrics
            introScreen.style.display = 'none';
            lyricsScreen.style.display = 'flex';

            // Play audio
            audio.play();

            // 10 Seconds Logic - Show Final Button
            setTimeout(() => {
                finalBtn.style.display = 'block';
                // Choti si delay de rahe hain taaki CSS transition kaam kare
                setTimeout(() => finalBtn.style.opacity = '1', 10);
            }, 10000);

            // Start syncing
            requestAnimationFrame(syncLyrics);
        }

        function syncLyrics() {
            const audio = document.getElementById('bg-audio');
            const display = document.getElementById('lyrics-display');

            if (currentLyricIndex < lyricsData.length) {
                const currentData = lyricsData[currentLyricIndex];

                if (audio.currentTime >= currentData.time) {
                    
                    if(currentData.clear) {
                        display.innerHTML = ''; // Screen clear karne ke liye
                    } else {
                        // Naya element box banana
                        const box = document.createElement('div');
                        box.className = 'element-box';
                        box.innerHTML = `
                            <div class="el-top">
                                <span>${currentData.number || ''}</span>
                            </div>
                            <div class="el-symbol">${currentData.symbol}</div>
                            <div class="el-name">${currentData.name}</div>
                        `;
                        display.appendChild(box);
                    }
                    currentLyricIndex++;
                }
            }
            animationFrameId = requestAnimationFrame(syncLyrics);
        }

        function goToFinalPage() {
            // Yahan par aap apne agle page ka link daal sakte hain
            window.location.href = "page9.html"; // Change this
        }
    </script>
</body>
  </html>
