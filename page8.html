<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a202c; /* Cloudy dark weather */
            font-family: 'Cinzel', serif; user-select: none;
        }

        /* --- PHASE 1 --- */
        #surprise-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020205; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; color: white;
            transition: opacity 1.5s ease-out;
        }

        .surprise-text {
            font-family: 'Dancing Script', cursive; font-size: 5rem; 
            color: #ffb3d9; /* Base color is now pinkish */
            /* ULTRA NEON PINK GLOW */
            text-shadow: 
                0 0 10px #ff66b2, 
                0 0 20px #ff1493, 
                0 0 40px #ff1493, 
                0 0 80px #ff007f,
                0 0 120px #ff007f;
            margin-bottom: 50px; padding: 0 20px; letter-spacing: 2px;
            animation: fadeInGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes fadeInGlow {
            from { opacity: 0.8; text-shadow: 0 0 15px #ff66b2, 0 0 30px #ff1493, 0 0 50px #ff007f; }
            to { opacity: 1; text-shadow: 0 0 20px #ff66b2, 0 0 40px #ff1493, 0 0 80px #ff007f, 0 0 130px #ff007f; }
        }

        .neon-btn {
            padding: 15px 50px; font-size: 1.5rem; font-weight: bold; font-family: inherit;
            color: #fff; background: transparent; 
            border: 2px solid #ff1493; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px #ff1493, inset 0 0 15px #ff1493;
            text-shadow: 0 0 10px #ff66b2;
            transition: all 0.3s ease; animation: pinkPulse 2s infinite;
        }
        
        @keyframes pinkPulse {
            0% { transform: scale(1); box-shadow: 0 0 15px #ff1493, inset 0 0 15px #ff1493; }
            50% { transform: scale(1.05); box-shadow: 0 0 30px #ff1493, inset 0 0 30px #ff1493; }
            100% { transform: scale(1); box-shadow: 0 0 15px #ff1493, inset 0 0 15px #ff1493; }
        }

        /* --- PHASE 3: RAINY GARDEN UI --- */
        #space-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 5; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; pointer-events: none; }

        /* BUTTON MOVED TO RIGHT BOTTOM */
        #walk-btn {
            position: absolute; bottom: 40px; right: 20px; pointer-events: auto; z-index: 210;
            border-color: #00d2ff; color: #fff; background: rgba(0, 210, 255, 0.2);
            box-shadow: 0 0 15px #00d2ff, inset 0 0 15px #00d2ff;
            text-shadow: 0 0 10px #00d2ff; animation: bluePulse 2s infinite;
        }
        #walk-btn:active { background: rgba(0, 210, 255, 0.5); transform: scale(0.95); }

        @keyframes bluePulse {
            0%, 100% { box-shadow: 0 0 15px #00d2ff, inset 0 0 15px #00d2ff; }
            50% { box-shadow: 0 0 30px #00d2ff, inset 0 0 30px #00d2ff; }
        }

        /* FINAL BLUE GLOWING BUTTON (LEFT BOTTOM) */
        #final-page-btn {
            position: absolute; bottom: 40px; left: -300px; /* Hidden initially */
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Cinzel', serif; font-weight: bold;
            color: #fff; background: transparent; 
            border: 2px solid #00d2ff; border-radius: 50px; text-decoration: none;
            box-shadow: 0 0 20px #00d2ff, inset 0 0 20px #00d2ff;
            text-shadow: 0 0 10px #00d2ff;
            z-index: 210; transition: left 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .surprise-text { font-size: 3rem; }
            .neon-btn, #final-page-btn { font-size: 1.1rem; padding: 12px 30px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="surprise.mp3" loop preload="auto"></audio>

    <div id="surprise-screen">
        <div class="surprise-text">Aapko phool pasand hai ?</div>
        <button class="neon-btn" id="click-me-btn">Ise Click Karo ✨</button>
    </div>

    <div id="space-screen"></div>
    <div id="ui-container">
        <button id="walk-btn" class="neon-btn">HOLD TO WALK</button>
        <a id="final-page-btn" href="page9.html">FINAL PAGE</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const surpriseScreen = document.getElementById('surprise-screen');
        const clickMeBtn = document.getElementById('click-me-btn');
        const spaceScreen = document.getElementById('space-screen');
        const uiContainer = document.getElementById('ui-container');
        const walkBtn = document.getElementById('walk-btn');
        const finalPageBtn = document.getElementById('final-page-btn');

        // Elegant Neon Floral Colors
        const flowerColors = [
            { core: '#ffb3d9', glow: '#FF1493' }, // Intense Pink
            { core: '#ffe6cc', glow: '#FF8C00' }, // Peach
            { core: '#b3e6ff', glow: '#00BFFF' }  // Blue
        ];

        // --- TRANSITION ---
        clickMeBtn.addEventListener('click', () => {
            bgMusic.play().catch(e => console.log(e));
            surpriseScreen.style.opacity = '0';
            setTimeout(() => {
                surpriseScreen.style.display = 'none';
                spaceScreen.style.display = 'block';
                uiContainer.style.display = 'block';
                initRainyGarden();
                
                // Show final blue button on the left after 10 seconds
                setTimeout(() => {
                    finalPageBtn.style.left = '20px';
                }, 10000);
            }, 1000);
        });

        // ==========================================
        // PHASE 3: REALISTIC RAINY WEATHER INFINITE GARDEN
        // ==========================================
        function initRainyGarden() {
            const scene = new THREE.Scene();
            // Dark, moody cloudy sky color
            const skyColor = 0x1a252c; 
            scene.background = new THREE.Color(skyColor);
            scene.fog = new THREE.FogExp2(skyColor, 0.0035); // Dense fog for rain vibe

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 20, 0); 

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            spaceScreen.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.enableZoom = false; controls.enablePan = false;
            controls.maxPolarAngle = Math.PI / 2 + 0.05; 
            controls.minPolarAngle = Math.PI / 4;
            controls.target.set(0, 20, -1); 

            // Darker Wet Grass
            const groundGeo = new THREE.PlaneGeometry(10000, 10000);
            const groundMat = new THREE.MeshBasicMaterial({ color: 0x0f2a14, side: THREE.DoubleSide }); 
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // --- REALISTIC RAIN SYSTEM ---
            const rainCount = 15000;
            const rainGeo = new THREE.BufferGeometry();
            const rainPos = new Float32Array(rainCount * 3);
            for(let i=0; i<rainCount*3; i+=3) {
                rainPos[i] = Math.random() * 800 - 400; // x
                rainPos[i+1] = Math.random() * 400;     // y height
                rainPos[i+2] = Math.random() * 800 - 400; // z
            }
            rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
            const rainMat = new THREE.PointsMaterial({ 
                color: 0xaaaaaa, size: 0.5, transparent: true, opacity: 0.6 
            });
            const rainSystem = new THREE.Points(rainGeo, rainMat);
            scene.add(rainSystem);

            // --- REALISTIC FLOWER TEXTURE GENERATOR ---
            function createTexture(colorTheme) {
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.translate(64, 64);
                
                // Draw multiple overlapping layers for realistic petals
                const layers = 3;
                for(let l = 0; l < layers; l++) {
                    const radius = 60 - (l * 15);
                    const petalCount = 8 + (l * 4);
                    for (let i = 0; i < petalCount; i++) {
                        ctx.rotate((Math.PI * 2) / petalCount + (l * 0.2));
                        ctx.beginPath(); ctx.moveTo(0, 0);
                        ctx.bezierCurveTo(radius/2, -radius/3, radius, -radius/6, radius, 0);
                        ctx.bezierCurveTo(radius, radius/6, radius/2, radius/3, 0, 0);
                        
                        const grad = ctx.createRadialGradient(0, 0, 0, radius/2, 0, radius);
                        grad.addColorStop(0, '#fff'); 
                        grad.addColorStop(0.3, colorTheme.core); 
                        grad.addColorStop(1, colorTheme.glow);
                        
                        ctx.fillStyle = grad; 
                        // Only add shadow to the bottom layer to maintain shape clarity
                        if(l === 0) {
                            ctx.shadowColor = colorTheme.glow; 
                            ctx.shadowBlur = 10;
                        } else {
                            ctx.shadowBlur = 0;
                        }
                        ctx.fill();
                        
                        // Thin dark stroke for realistic petal separation
                        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
                
                // Center detail
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); 
                ctx.fillStyle = '#ffcc00'; ctx.fill(); 
                // Stamen dots
                for(let i=0; i<10; i++) {
                    ctx.beginPath();
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * 8;
                    ctx.arc(Math.cos(angle)*r, Math.sin(angle)*r, 1.5, 0, Math.PI*2);
                    ctx.fillStyle = '#fff'; ctx.fill();
                }

                ctx.fillStyle = '#0a3a1a'; ctx.fillRect(-2, 0, 4, 64); // Dark stem
                return new THREE.CanvasTexture(canvas);
            }

            const textures = flowerColors.map(c => createTexture(c));
            
            const material = new THREE.MeshBasicMaterial({ 
                map: textures[0], transparent: true, alphaTest: 0.1, side: THREE.DoubleSide 
            });

            // ULTIMATE INFINITE SHADER
            material.onBeforeCompile = (shader) => {
                shader.uniforms.time = { value: 0 };
                shader.uniforms.camPos = { value: new THREE.Vector3() };
                material.userData.shader = shader;
                shader.vertexShader = `
                  uniform float time;
                  uniform vec3 camPos;
                  ${shader.vertexShader}
                `.replace(
                  `#include <project_vertex>`,
                  `
                  vec4 mvPosition = vec4( transformed, 1.0 );
                  #ifdef USE_INSTANCING
                      mat4 im = instanceMatrix;
                      
                      // INFINITE WRAP TRICK
                      float fieldSize = 600.0;
                      float halfSize = 300.0;
                      im[3][0] = mod(im[3][0] - camPos.x + halfSize, fieldSize) - halfSize + camPos.x;
                      im[3][2] = mod(im[3][2] - camPos.z + halfSize, fieldSize) - halfSize + camPos.z;

                      // Gentle wind
                      float wind = sin(time * 2.0 + im[3][0] * 0.05 + im[3][2] * 0.05) * 2.0;
                      mvPosition.x += wind * (position.y / 12.0);

                      mvPosition = im * mvPosition;
                  #endif
                  mvPosition = modelViewMatrix * mvPosition;
                  gl_Position = projectionMatrix * mvPosition;
                  `
                );
            };

            const FLOWER_COUNT = 20000;
            const FIELD_SIZE = 600; 
            const geometry = new THREE.PlaneGeometry(15, 15);
            geometry.translate(0, 7.5, 0); 
            
            const instancedMesh = new THREE.InstancedMesh(geometry, material, FLOWER_COUNT);
            instancedMesh.frustumCulled = false; 
            const dummy = new THREE.Object3D();
            
            for(let i=0; i<FLOWER_COUNT; i++) {
                const x = Math.random() * FIELD_SIZE - FIELD_SIZE/2;
                const z = Math.random() * FIELD_SIZE - FIELD_SIZE/2;
                dummy.position.set(x, 0, z);
                dummy.rotation.y = Math.random() * Math.PI;
                const scale = Math.random() * 0.5 + 0.5; 
                dummy.scale.set(scale, scale, scale);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            scene.add(instancedMesh);

            // Walking mechanics
            let isWalking = false;
            const walkSpeed = 2.0; 
            const direction = new THREE.Vector3();

            walkBtn.addEventListener('mousedown', () => isWalking = true);
            walkBtn.addEventListener('mouseup', () => isWalking = false);
            walkBtn.addEventListener('mouseleave', () => isWalking = false);
            walkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isWalking = true; }, {passive:false});
            walkBtn.addEventListener('touchend', () => isWalking = false);

            const clock = new THREE.Clock();

            function animate3D() {
                requestAnimationFrame(animate3D);
                const time = clock.getElapsedTime();
                
                if (isWalking) {
                    camera.getWorldDirection(direction);
                    direction.y = 0; direction.normalize();
                    camera.position.addScaledVector(direction, walkSpeed);
                    controls.target.addScaledVector(direction, walkSpeed);
                }

                // Animate Rain Dynamics
                const positions = rainSystem.geometry.attributes.position.array;
                for(let i=1; i<rainCount*3; i+=3) {
                    positions[i] -= 4.0; // Fall speed
                    if (positions[i] < 0) {
                        positions[i] = 400; // Reset height
                        // Follow camera so rain is always around player
                        positions[i-1] = camera.position.x + (Math.random() * 800 - 400); 
                        positions[i+1] = camera.position.z + (Math.random() * 800 - 400);
                    }
                }
                rainSystem.geometry.attributes.position.needsUpdate = true;

                if (material.userData.shader) {
                    material.userData.shader.uniforms.time.value = time;
                    material.userData.shader.uniforms.camPos.value.copy(camera.position);
                }

                controls.update();
                renderer.render(scene, camera);
            }
            animate3D();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
  </html>
