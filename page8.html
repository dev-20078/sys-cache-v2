<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #050510; /* Dark night theme */
            font-family: 'Cinzel', serif; user-select: none;
        }

        /* --- PHASE 1: SURPRISE TEXT SCREEN --- */
        #surprise-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; color: white;
            transition: opacity 1s ease-out;
        }

        .surprise-text {
            font-family: 'Dancing Script', cursive; font-size: 3.5rem; 
            color: #ff99cc; text-shadow: 0 0 15px #ff99cc, 0 0 30px #ff66b2;
            margin-bottom: 40px; padding: 0 20px;
        }

        #click-me-btn {
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; font-family: inherit;
            color: white; background: transparent; 
            border: 2px solid #00d2ff; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px #00d2ff inset, 0 0 20px #00d2ff;
            transition: all 0.3s ease; animation: pulseBtn 1.5s infinite;
        }
        
        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 15px #00d2ff inset, 0 0 20px #00d2ff; }
            50% { transform: scale(1.05); box-shadow: 0 0 25px #00d2ff inset, 0 0 40px #00d2ff; }
            100% { transform: scale(1); box-shadow: 0 0 15px #00d2ff inset, 0 0 20px #00d2ff; }
        }

        /* --- PHASE 2: 2D INTERACTIVE FLOWERS --- */
        #flower-canvas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: none;
        }

        #next-phase-btn {
            position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; font-family: 'Cinzel', serif;
            color: white; background: linear-gradient(45deg, #ff66b2, #ff99cc); 
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px #ff66b2; z-index: 50;
            transition: bottom 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* --- PHASE 3: INFINITE 3D SPACE --- */
        #space-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 5;
        }

        #hint-text {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-size: 1.2rem; color: rgba(255,255,255,0.7); letter-spacing: 2px;
            z-index: 20; display: none; animation: pulseHint 2s infinite; pointer-events: none;
        }

        @keyframes pulseHint { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @media (max-width: 768px) {
            .surprise-text { font-size: 2.5rem; }
            #click-me-btn, #next-phase-btn { font-size: 1.2rem; padding: 12px 30px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="surprise.mp3" loop></audio>

    <div id="surprise-screen">
        <div class="surprise-text">Aap ke liye ek surprise hai...</div>
        <button id="click-me-btn">Ise Click Karo ✨</button>
    </div>

    <div id="flower-canvas-container">
        <canvas id="interactiveCanvas"></canvas>
    </div>
    <button id="next-phase-btn">Aap Ke Liye Kuch Phool 🌸</button>

    <div id="space-screen"></div>
    <div id="hint-text">PLAY WITH THE UNIVERSE</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const surpriseScreen = document.getElementById('surprise-screen');
        const clickMeBtn = document.getElementById('click-me-btn');
        const canvasContainer = document.getElementById('flower-canvas-container');
        const nextPhaseBtn = document.getElementById('next-phase-btn');
        const spaceScreen = document.getElementById('space-screen');
        const hintText = document.getElementById('hint-text');

        // Color Palette (Peach, Blue, Pink)
        const flowerColors = ['#FFCBA4', '#FFB7B2', '#87CEEB', '#6495ED', '#FFC0CB', '#FF69B4'];

        // --- PHASE 1 -> PHASE 2 LOGIC ---
        clickMeBtn.addEventListener('click', () => {
            bgMusic.play().catch(e => console.log("Music blocked", e));
            
            surpriseScreen.style.opacity = '0';
            setTimeout(() => {
                surpriseScreen.style.display = 'none';
                canvasContainer.style.display = 'block';
                initInteractiveFlowers();
                
                // Show "Aap ke liye kuch phool" button after 8 seconds
                setTimeout(() => {
                    nextPhaseBtn.style.bottom = '40px';
                }, 8000);
            }, 1000);
        });

        // --- PHASE 2 -> PHASE 3 LOGIC ---
        nextPhaseBtn.addEventListener('click', () => {
            canvasContainer.style.opacity = '0';
            nextPhaseBtn.style.bottom = '-100px';
            
            setTimeout(() => {
                canvasContainer.style.display = 'none';
                spaceScreen.style.display = 'block';
                hintText.style.display = 'block';
                initInfiniteSpace();
            }, 1000);
        });


        // ==========================================
        // 2D INTERACTIVE GROWING FLOWERS (PHASE 2)
        // ==========================================
        function initInteractiveFlowers() {
            const canvas = document.getElementById('interactiveCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const flowers = [];

            class Flower {
                constructor(x, y) {
                    this.x = x;
                    this.y = y + 200; // Start lower
                    this.targetY = y; // Grow to this height
                    this.color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                    this.size = 0;
                    this.maxSize = Math.random() * 15 + 20; // Radius 20-35
                    this.stemHeight = 0;
                    this.maxStemHeight = 200;
                    this.sway = Math.random() * 100; // For wind effect
                }

                grow() {
                    if (this.stemHeight < this.maxStemHeight) this.stemHeight += 2;
                    if (this.size < this.maxSize) this.size += 0.2;
                    this.sway += 0.02; // Wind speed
                }

                draw() {
                    const swayOffset = Math.sin(this.sway) * 20;
                    
                    // Draw Stem
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.maxStemHeight);
                    ctx.quadraticCurveTo(this.x + swayOffset/2, this.y + this.maxStemHeight/2, this.x + swayOffset, this.y + this.maxStemHeight - this.stemHeight);
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#228B22'; // Green stem
                    ctx.stroke();

                    // Only draw petals if stem is fully grown
                    if (this.stemHeight >= this.maxStemHeight) {
                        const currentX = this.x + swayOffset;
                        const currentY = this.y;

                        // Petals
                        ctx.fillStyle = this.color;
                        for (let i = 0; i < 6; i++) {
                            const angle = (i * Math.PI * 2) / 6 + this.sway;
                            const px = currentX + Math.cos(angle) * this.size;
                            const py = currentY + Math.sin(angle) * this.size;
                            
                            ctx.beginPath();
                            ctx.arc(px, py, this.size * 0.8, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        
                        // Center
                        ctx.fillStyle = '#FFD700'; // Yellow center
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, this.size * 0.6, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // Spawn initial flowers
            for(let i=0; i<8; i++) {
                setTimeout(() => {
                    flowers.push(new Flower(Math.random() * canvas.width, canvas.height/2 + Math.random() * 100));
                }, i * 500);
            }

            // Interaction: Tap to spawn
            window.addEventListener('click', (e) => {
                if(canvasContainer.style.display === 'block') {
                    flowers.push(new Flower(e.clientX, e.clientY - 200));
                }
            });
            window.addEventListener('touchstart', (e) => {
                if(canvasContainer.style.display === 'block') {
                    flowers.push(new Flower(e.touches[0].clientX, e.touches[0].clientY - 200));
                }
            });

            function animate2D() {
                if(canvasContainer.style.display === 'none') return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                flowers.forEach(flower => {
                    flower.grow();
                    flower.draw();
                });
                requestAnimationFrame(animate2D);
            }
            animate2D();
        }

        // ==========================================
        // 3D INFINITE FLOWER SPACE (PHASE 3)
        // ==========================================
        function initInfiniteSpace() {
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.0006); // Dark foggy space

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
            camera.position.z = 400;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            spaceScreen.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true; 
            controls.autoRotateSpeed = 1.0;
            controls.minDistance = 50;  
            controls.maxDistance = 1000;

            // Helper to generate a Flower Texture dynamically! (No external images needed)
            function generateFlowerTexture(colorHex) {
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                
                // Glow effect
                ctx.shadowColor = colorHex;
                ctx.shadowBlur = 15;
                ctx.fillStyle = colorHex;

                const cx = 64, cy = 64;
                const size = 20;

                // Draw 6 petals
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI * 2) / 6;
                    const px = cx + Math.cos(angle) * size;
                    const py = cy + Math.sin(angle) * size;
                    ctx.beginPath();
                    ctx.arc(px, py, 15, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Yellow Center
                ctx.fillStyle = '#fff'; // Bright center
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.fill();

                return new THREE.CanvasTexture(canvas);
            }

            // Generate Materials for Peach, Blue, Pink
            const materials = flowerColors.map(color => {
                const texture = generateFlowerTexture(color);
                return new THREE.SpriteMaterial({ map: texture, color: 0xffffff, transparent: true });
            });

            const flowerGroup = new THREE.Group();
            
            // Create 3000 Infinite Flowers
            for (let i = 0; i < 3000; i++) { 
                const randomMaterial = materials[Math.floor(Math.random() * materials.length)];
                const sprite = new THREE.Sprite(randomMaterial);
                
                // Spread infinitely in 3D Space
                sprite.position.x = THREE.MathUtils.randFloatSpread(3000); 
                sprite.position.y = THREE.MathUtils.randFloatSpread(3000); 
                sprite.position.z = THREE.MathUtils.randFloatSpread(3000); 
                
                const scale = THREE.MathUtils.randFloat(10, 40);
                sprite.scale.set(scale, scale, 1);
                
                flowerGroup.add(sprite);
            }
            scene.add(flowerGroup);

            // Add some glowing stars for atmosphere
            const starGeo = new THREE.BufferGeometry();
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 2, transparent: true, opacity: 0.8 });
            const starVertices = [];
            for(let i=0; i<5000; i++) {
                starVertices.push(THREE.MathUtils.randFloatSpread(4000), THREE.MathUtils.randFloatSpread(4000), THREE.MathUtils.randFloatSpread(4000));
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            scene.add(new THREE.Points(starGeo, starMat));

            function animate3D() {
                requestAnimationFrame(animate3D);
                controls.update();

                // Make the whole galaxy of flowers slowly rotate and drift
                flowerGroup.rotation.y += 0.001;
                flowerGroup.rotation.z += 0.0005;

                renderer.render(scene, camera);
            }
            animate3D();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
  </html>
