<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Dot Matrix Image</title>
    <style>
        body {
            background-color: #000000; /* Pure black background */
            margin: 0;
            overflow: hidden; /* Scrollbars hataane ke liye */
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Glowing Blue Button ki Styling */
        #nextPageBtn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            padding: 12px 24px;
            background-color: #000000;
            color: #00e5ff; /* Cyan/Blue color */
            border: 2px solid #00e5ff;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #00e5ff, inset 0 0 10px #00e5ff; /* Glowing effect */
            transition: all 0.3s ease;
            z-index: 10;
        }
        #nextPageBtn:hover {
            background-color: #00e5ff;
            color: #000000;
            box-shadow: 0 0 25px #00e5ff, inset 0 0 20px #00e5ff;
        }
    </style>
</head>
<body>

    <canvas id="dotCanvas"></canvas>

    <button id="nextPageBtn" onclick="window.location.href='page9.html'">Next Page</button>

    <script>
        const canvas = document.getElementById('dotCanvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas ko puri screen ka size dena
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const img = new Image();
        // DHYAAN DEIN: Image ka naam bilkul yahi hona chahiye
        img.src = 'IMG-20260410-WA0001.jpg'; 

        // Aapke pasand ke colors
        const colors = ['#FFDAB9', '#4169E1', '#FFC0CB', '#FFD700', '#FF0000'];
        let particles = [];

        img.onload = function() {
            // Image ko screen ke hisaab se scale karna taaki center mein dikhe
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height) * 0.9;
            const newWidth = img.width * scale;
            const newHeight = img.height * scale;
            
            const offsetX = (canvas.width - newWidth) / 2;
            const offsetY = (canvas.height - newHeight) / 2;

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = img.width;
            tempCanvas.height = img.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, 0, 0);

            const imageData = tempCtx.getImageData(0, 0, img.width, img.height);
            const data = imageData.data;

            const step = 4; // Dots kitne paas paas honge

            for (let y = 0; y < img.height; y += step) {
                for (let x = 0; x < img.width; x += step) {
                    const index = (y * img.width + x) * 4;
                    const r = data[index];
                    const g = data[index + 1];
                    const b = data[index + 2];
                    
                    // White background ko thoda ignore karna taaki shape clear ho
                    const brightness = (r + g + b) / 3;

                    if (brightness < 240) { 
                        particles.push({
                            x: offsetX + (x * scale),
                            y: offsetY + (y * scale),
                            color: colors[Math.floor(Math.random() * colors.length)],
                            size: Math.random() * 1.5 + 1 // Dot ka size
                        });
                    }
                }
            }
            animate();
        };

        function animate() {
            // Trail effect ke liye black background ko halka transparent draw karna
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                // Twinkle effect: Color change hone ka chance
                if (Math.random() < 0.02) {
                    p.color = colors[Math.floor(Math.random() * colors.length)];
                }

                ctx.fillStyle = p.color;
                
                // Glow effect apply karna
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                // Agle dot ke liye shadow reset karna (Performance ke liye)
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
