<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Page</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
--pink-glow:#ff007f;
--blue-glow:#00d2ff;
--bg-dark:#050505;
}

body{
margin:0;
padding:0;
background:var(--bg-dark);
color:white;
font-family:Montserrat;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
flex-direction:column;
}

#intro-screen{
text-align:center;
}

.shiny-text{
font-family:'Dancing Script',cursive;
font-size:4rem;
text-shadow:0 0 20px #ff007f;
margin-bottom:40px;
}

.play-btn{
background:#ff007f;
color:white;
border:none;
padding:14px 40px;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

#lyrics-screen{
display:none;
width:100%;
height:100%;
justify-content:center;
align-items:center;
}

.lyrics-container{
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
max-width:95%;
}

.element-box{
width:110px;
height:130px;
border:2px solid var(--blue-glow);
border-radius:12px;
position:relative;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 0 15px var(--blue-glow);
animation:pop .4s ease;
}

@keyframes pop{
from{opacity:0;transform:scale(.7)}
to{opacity:1;transform:scale(1)}
}

.atomic-num{
position:absolute;
top:4px;
left:6px;
font-size:11px;
color:#00d2ff;
}

.atomic-mass{
position:absolute;
top:4px;
right:6px;
font-size:11px;
}

.symbol{
font-size:30px;
font-weight:bold;
}

.el-title{
font-size:11px;
}

.word{
font-size:10px;
opacity:.7;
}
</style>
</head>

<body>

<audio id="bg-audio" src="mec.mp3"></audio>

<div id="intro-screen">
<div class="shiny-text">AAP KELIYE EK SURPRISE HAI</div>
<button class="play-btn" id="start-trigger">click here</button>
</div>

<div id="lyrics-screen">
<div class="lyrics-container" id="lyrics-display"></div>
</div>

<script>

const audio=document.getElementById("bg-audio")
const trigger=document.getElementById("start-trigger")
const display=document.getElementById("lyrics-display")

const phrases=[
{time:9.1,items:[
{n:12,m:"24.31",s:"Mg",name:"Magnesium",w:"Main"},
{n:79,m:"196.97",s:"Au",name:"Gold",w:"Avaan"},
{n:92,m:"238.03",s:"U",name:"Uranium",w:"Ud"},
{n:19,m:"39.09",s:"K",name:"Potassium",w:"Ke"},
{n:57,m:"138.91",s:"La",name:"Lanthanum",w:"Le"},
{s:"J",name:"Joule",w:"Jawan"},
{n:11,m:"22.99",s:"Na",name:"Sodium",w:"Nal"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"}
]},

{time:13.9,items:[
{n:12,m:"24.31",s:"Mg",name:"Magnesium",w:"Main"},
{n:79,m:"196.97",s:"Au",name:"Gold",w:"Avaan"},
{n:92,m:"238.03",s:"U",name:"Uranium",w:"Ud"},
{n:19,m:"39.09",s:"K",name:"Potassium",w:"Ke"},
{n:57,m:"138.91",s:"La",name:"Lanthanum",w:"Le"},
{s:"J",name:"Joule",w:"Jawan"},
{n:11,m:"22.99",s:"Na",name:"Sodium",w:"Nal"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"}
]}
]

let index=0

trigger.onclick=()=>{
audio.play()
document.getElementById("intro-screen").style.display="none"
document.getElementById("lyrics-screen").style.display="flex"
requestAnimationFrame(loop)
}

function loop(){

const t=audio.currentTime

if(index<phrases.length && t>=phrases[index].time){
showPhrase(phrases[index])
index++
}

requestAnimationFrame(loop)
}

function showPhrase(p){

fadeClear()

setTimeout(()=>{

p.items.forEach(x=>{

const d=document.createElement("div")
d.className="element-box"

d.innerHTML=`
<div class="atomic-num">${x.n||""}</div>
<div class="atomic-mass">${x.m||""}</div>
<div class="symbol">${x.s}</div>
<div class="el-title">${x.name}</div>
<div class="word">${x.w}</div>
`

display.appendChild(d)

})

},200)

}

function fadeClear(){

const b=document.querySelectorAll(".element-box")

b.forEach(e=>{
e.style.transition=".3s"
e.style.opacity="0"
e.style.filter="blur(6px)"
})

setTimeout(()=>display.innerHTML="",300)

}

</script>

</body>
  </html>
