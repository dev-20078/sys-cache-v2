<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Page</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
--pink-glow:#ff007f;
--blue-glow:#00d2ff;
--bg-dark:#050505;
}

body{
margin:0;
padding:0;
background:var(--bg-dark);
color:#fff;
font-family:Montserrat;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#intro-screen{
text-align:center;
}

.shiny-text{
font-family:'Dancing Script',cursive;
font-size:4rem;
text-shadow:0 0 20px #ff007f;
margin-bottom:40px;
}

.play-btn{
padding:12px 40px;
border:2px solid #ff007f;
background:transparent;
color:white;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

#lyrics-screen{
display:none;
width:100%;
height:100%;
justify-content:center;
align-items:center;
}

.lyrics-container{
display:flex;
flex-wrap:wrap;
gap:14px;
justify-content:center;
max-width:95%;
}

/* periodic tiles */

.element-box{
width:110px;
height:130px;
border:2px solid var(--blue-glow);
border-radius:12px;
position:relative;
box-shadow:0 0 15px var(--blue-glow);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
animation:slideUp .45s ease;
}

@keyframes slideUp{
from{opacity:0;transform:translateY(30px) scale(.9)}
to{opacity:1;transform:translateY(0) scale(1)}
}

.atomic-num{
position:absolute;
top:4px;
left:6px;
font-size:11px;
color:#00d2ff;
}

.atomic-mass{
position:absolute;
top:4px;
right:6px;
font-size:11px;
}

.symbol{
font-size:30px;
font-weight:bold;
}

.el-title{
font-size:11px;
}

.word{
font-size:10px;
opacity:.7;
}

/* rotate screen */

#rotate-screen{
position:fixed;
inset:0;
background:#02030a;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
overflow:hidden;
}

.stars{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(2px 2px at 20% 30%,#fff,transparent),
radial-gradient(2px 2px at 70% 80%,#0ff,transparent),
radial-gradient(2px 2px at 40% 60%,#fff,transparent),
radial-gradient(2px 2px at 90% 10%,#0ff,transparent);
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.4}
to{opacity:1}
}

/* comet */
.comet{
position:absolute;
width:2px;
height:120px;
background:linear-gradient(#fff,transparent);
animation:comet 4s linear infinite;
}

@keyframes comet{
0%{transform:translate(-200px,-200px) rotate(45deg)}
100%{transform:translate(800px,800px) rotate(45deg)}
}

/* phone rotate */

.phone{
width:70px;
height:120px;
border:3px solid #00d2ff;
border-radius:14px;
position:relative;
animation:rotatePhone 2s infinite ease-in-out;
box-shadow:0 0 20px #00d2ff;
}

@keyframes rotatePhone{
0%{transform:rotate(0deg)}
50%{transform:rotate(90deg)}
100%{transform:rotate(0deg)}
}

.rotate-text{
margin-top:25px;
font-size:18px;
letter-spacing:2px;
color:#00d2ff;
text-shadow:0 0 10px #00d2ff;
}
</style>
</head>

<body>

<audio id="bg-audio" src="mec.mp3"></audio>

<div id="intro-screen">
<div class="shiny-text">AAP KELIYE EK SURPRISE HAI</div>
<button class="play-btn" id="start-trigger">click here</button>
</div>

<div id="lyrics-screen">
<div class="lyrics-container" id="lyrics-display"></div>
</div>

<div id="rotate-screen">
<div class="stars"></div>
<div class="comet"></div>
<div class="phone"></div>
<div class="rotate-text">Rotate for best experience</div>
</div>

<script>

const audio=document.getElementById("bg-audio")
const trigger=document.getElementById("start-trigger")
const display=document.getElementById("lyrics-display")
const rotate=document.getElementById("rotate-screen")

/* phrases */
const phrases=[
{time:9.1,items:[
{n:12,m:"24.31",s:"Mg",name:"Magnesium",w:"Main"},
{n:79,m:"196.97",s:"Au",name:"Gold",w:"Avaan"},
{n:92,m:"238.03",s:"U",name:"Uranium",w:"Ud"},
{n:19,m:"39.09",s:"K",name:"Potassium",w:"Ke"},
{n:57,m:"138.91",s:"La",name:"Lanthanum",w:"Le"},
{s:"J",name:"Joule",w:"Jawan"},
{n:11,m:"22.99",s:"Na",name:"Sodium",w:"Nal"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"}
]},
{time:13.9,items:[
{n:12,m:"24.31",s:"Mg",name:"Magnesium",w:"Main"},
{n:79,m:"196.97",s:"Au",name:"Gold",w:"Avaan"},
{n:92,m:"238.03",s:"U",name:"Uranium",w:"Ud"},
{n:19,m:"39.09",s:"K",name:"Potassium",w:"Ke"},
{n:57,m:"138.91",s:"La",name:"Lanthanum",w:"Le"},
{s:"J",name:"Joule",w:"Jawan"},
{n:11,m:"22.99",s:"Na",name:"Sodium",w:"Nal"},
{n:73,m:"180.95",s:"Ta",name:"Tantalum",w:"Tenu"}
]}
/* baaki phrases same rakho (shortened here for space) */
]

let index=0

trigger.onclick=()=>{
audio.play()
document.getElementById("intro-screen").style.display="none"
rotate.style.display="flex"
document.getElementById("lyrics-screen").style.display="flex"
requestAnimationFrame(loop)
}

/* hide rotate at 9.1s */
audio.addEventListener("timeupdate",()=>{
if(audio.currentTime>=9.1){
rotate.style.display="none"
}
})

function loop(){

const t=audio.currentTime

if(index<phrases.length && t>=phrases[index].time){
showPhrase(phrases[index])
index++
}

requestAnimationFrame(loop)
}

function showPhrase(p){

clearBoxes()

setTimeout(()=>{

p.items.forEach(x=>{

const d=document.createElement("div")
d.className="element-box"

d.innerHTML=`
<div class="atomic-num">${x.n||""}</div>
<div class="atomic-mass">${x.m||""}</div>
<div class="symbol">${x.s}</div>
<div class="el-title">${x.name}</div>
<div class="word">${x.w}</div>
`

display.appendChild(d)

})

},200)

}

function clearBoxes(){
const b=document.querySelectorAll(".element-box")

b.forEach(e=>{
e.style.transition=".4s"
e.style.opacity="0"
e.style.filter="blur(6px)"
})

setTimeout(()=>display.innerHTML="",400)
}

</script>
</body>
  </html>
