<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #intro-screen {
            text-align: center;
            transition: opacity 1s ease;
        }

        .stylish-text {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .play-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Poppins', sans-serif;
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        #lyrics-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lyrics-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 80%;
        }

        .element-box {
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px;
            width: 80px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #111;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .el-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: #888;
        }

        .el-symbol {
            font-size: 2.5rem;
            font-weight: 600;
            font-family: 'Cinzel', serif;
        }

        .el-name {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccc;
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #final-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: transparent;
            border: 2px solid #00d2ff;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px #00d2ff, inset 0 0 10px #00d2ff;
            text-shadow: 0 0 5px #00d2ff;
            display: none; 
            opacity: 0;
            transition: opacity 1s ease;
        }

        #final-btn:hover {
            background: #00d2ff;
            color: black;
            box-shadow: 0 0 30px #00d2ff;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" src="Khayaal Talwiinder 320 Kbps_1.mp3"></audio>

    <div id="intro-screen">
        <div class="stylish-text">aapko phool pasand hai?</div>
        <button class="play-btn" onclick="startSurprise()">click hear ha</button>
    </div>

    <div id="lyrics-screen">
        <div class="lyrics-container" id="lyrics-display"></div>
    </div>

    <button id="final-btn" onclick="goToFinalPage()">FINAL PAGE</button>

    <script>
        // Mapped to "Khayaal" by Talwiinder
        const lyricsData = [
            // "Zulfaan de jaal tere tere" (Starts around 13 seconds)
            { time: 13.0, symbol: "Z", number: "ℤ", name: "Integer Math" },
            { time: 13.5, symbol: "D", number: "Δ", name: "Delta" },
            { time: 14.0, symbol: "J", number: "J", name: "Joule" },
            { time: 14.5, symbol: "Te", number: "52", name: "Tellurium" },
            { time: 15.0, symbol: "Te", number: "52", name: "Tellurium" },
            
            // Clear screen
            { time: 16.0, clear: true }, 

            // "Main aawan udd ke lai jaawan naal tainu"
            { time: 16.5, symbol: "M", number: "M", name: "Mass" },
            { time: 17.0, symbol: "U", number: "92", name: "Uranium" },
            { time: 17.5, symbol: "K", number: "19", name: "Potassium" },
            { time: 18.0, symbol: "L", number: "ℒ", name: "Lagrangian" },
            { time: 18.5, symbol: "J", number: "J", name: "Joule" },
            { time: 19.0, symbol: "Na", number: "11", name: "Sodium" },
            { time: 19.5, symbol: "Ta", number: "73", name: "Tantalum" },
            { time: 20.2, symbol: "Ta", number: "73", name: "Tantalum" },

            // Clear screen
            { time: 21.0, clear: true },

            // "Je na tu aayi, khayal aune mainu"
            { time: 21.5, symbol: "Je", number: "J", name: "Joule" },
            { time: 22.0, symbol: "Na", number: "11", name: "Sodium" },
            { time: 22.5, symbol: "Tu", number: "69", name: "Thulium" },
            { time: 23.0, symbol: "K", number: "19", name: "Potassium" },
            { time: 23.5, symbol: "Au", number: "79", name: "Gold" },
            { time: 24.0, symbol: "Me", number: "∞", name: "Infinity" }
        ];

        let currentLyricIndex = 0;
        let animationFrameId;

        function startSurprise() {
            const audio = document.getElementById('bg-audio');
            const introScreen = document.getElementById('intro-screen');
            const lyricsScreen = document.getElementById('lyrics-screen');
            const finalBtn = document.getElementById('final-btn');

            introScreen.style.display = 'none';
            lyricsScreen.style.display = 'flex';

            audio.play();

            // 10 Seconds Logic - Show Final Button
            setTimeout(() => {
                finalBtn.style.display = 'block';
                setTimeout(() => finalBtn.style.opacity = '1', 10);
            }, 10000);

            requestAnimationFrame(syncLyrics);
        }

        function syncLyrics() {
            const audio = document.getElementById('bg-audio');
            const display = document.getElementById('lyrics-display');

            if (currentLyricIndex < lyricsData.length) {
                const currentData = lyricsData[currentLyricIndex];

                if (audio.currentTime >= currentData.time) {
                    
                    if(currentData.clear) {
                        display.innerHTML = ''; 
                    } else {
                        const box = document.createElement('div');
                        box.className = 'element-box';
                        box.innerHTML = `
                            <div class="el-top">
                                <span>${currentData.number || ''}</span>
                            </div>
                            <div class="el-symbol">${currentData.symbol}</div>
                            <div class="el-name">${currentData.name}</div>
                        `;
                        display.appendChild(box);
                    }
                    currentLyricIndex++;
                }
            }
            animationFrameId = requestAnimationFrame(syncLyrics);
        }

        function goToFinalPage() {
            window.location.href = "page9.html"; 
        }
    </script>
</body>
  </html>
