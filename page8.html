<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020205; 
            font-family: 'Cinzel', serif; user-select: none;
        }

        /* --- PHASE 1 --- */
        #surprise-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; color: white;
            transition: opacity 1.5s ease-out;
        }

        .surprise-text {
            font-family: 'Dancing Script', cursive; font-size: 4rem; 
            color: #fff; text-shadow: 0 0 15px #ff99cc, 0 0 30px #ff66b2, 0 0 50px #ff1493;
            margin-bottom: 50px; padding: 0 20px; letter-spacing: 2px;
            animation: fadeInGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes fadeInGlow {
            from { opacity: 0.8; text-shadow: 0 0 15px #ff99cc, 0 0 30px #ff66b2; }
            to { opacity: 1; text-shadow: 0 0 25px #ff99cc, 0 0 50px #ff66b2, 0 0 80px #ff1493; }
        }

        .neon-btn {
            padding: 15px 50px; font-size: 1.5rem; font-weight: bold; font-family: inherit;
            color: #fff; background: transparent; 
            border: 2px solid #00d2ff; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px #00d2ff, inset 0 0 15px #00d2ff;
            text-shadow: 0 0 10px #00d2ff;
            transition: all 0.3s ease; animation: pulseBtn 2s infinite;
        }
        
        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 15px #00d2ff, inset 0 0 15px #00d2ff; }
            50% { transform: scale(1.05); box-shadow: 0 0 30px #00d2ff, inset 0 0 30px #00d2ff; }
            100% { transform: scale(1); box-shadow: 0 0 15px #00d2ff, inset 0 0 15px #00d2ff; }
        }

        /* --- PHASE 2 --- */
        #flower-canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        
        #tap-instruction {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            font-size: 1.5rem; color: #fff; text-shadow: 0 0 15px #ff66b2, 0 0 30px #ff1493;
            animation: pulseHint 1.5s infinite; pointer-events: none; text-align: center; width: 100%;
        }

        #next-phase-btn {
            position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%);
            z-index: 50; display: none; /* STRICTLY HIDDEN IN PHASE 1 */
            border-color: #ff66b2; color: #fff;
            box-shadow: 0 0 15px #ff66b2, inset 0 0 15px #ff66b2;
            text-shadow: 0 0 10px #ff66b2;
            transition: bottom 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* --- PHASE 3 --- */
        #space-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 5; background: #010103; }
        
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; pointer-events: none; }

        #score-board {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px #00d2ff, 0 0 30px #00d2ff;
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 15px; border: 2px solid #00d2ff;
        }

        #walk-btn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); pointer-events: auto;
        }
        #walk-btn:active { background: rgba(0, 210, 255, 0.3); transform: translateX(-50%) scale(0.95); }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.7); font-size: 2rem; text-shadow: 0 0 10px #fff; pointer-events: none; }

        @keyframes pulseHint { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @media (max-width: 768px) {
            .surprise-text { font-size: 3rem; }
            .neon-btn { font-size: 1.1rem; padding: 12px 30px; }
            #score-board { font-size: 1.2rem; }
            #tap-instruction { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="surprise.mp3" loop></audio>

    <div id="surprise-screen">
        <div class="surprise-text">Aap ke liye ek surprise hai...</div>
        <button class="neon-btn" id="click-me-btn">Ise Click Karo ✨</button>
    </div>

    <div id="flower-canvas-container">
        <div id="tap-instruction">TAP THE SCREEN TO GROW FLOWERS 🌸</div>
        <canvas id="interactiveCanvas"></canvas>
        <button class="neon-btn" id="next-phase-btn" style="animation-delay: 0.5s; box-shadow: 0 0 20px #ff66b2, inset 0 0 20px #ff66b2;">Chalo Garden Mein Chalein 🌸</button>
    </div>

    <div id="space-screen"></div>
    <div id="ui-container">
        <div id="score-board">Picked: 0</div>
        <div id="crosshair">+</div>
        <button class="neon-btn" id="walk-btn">HOLD TO WALK</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const surpriseScreen = document.getElementById('surprise-screen');
        const clickMeBtn = document.getElementById('click-me-btn');
        const canvasContainer = document.getElementById('flower-canvas-container');
        const nextPhaseBtn = document.getElementById('next-phase-btn');
        const spaceScreen = document.getElementById('space-screen');
        const uiContainer = document.getElementById('ui-container');
        const walkBtn = document.getElementById('walk-btn');
        const scoreBoard = document.getElementById('score-board');

        // Intense Neon Palette
        const neonColors = [
            { core: '#ffffff', glow: '#FF1493' }, // Intense Neon Pink
            { core: '#ffffff', glow: '#FF69B4' }, // Hot Pink
            { core: '#ffffff', glow: '#FF8C00' }, // Neon Peach/Orange
            { core: '#ffffff', glow: '#00FFFF' }  // Cyan/Neon Blue
        ];

        // --- TRANSITIONS ---
        clickMeBtn.addEventListener('click', () => {
            bgMusic.play().catch(e => console.log(e));
            surpriseScreen.style.opacity = '0';
            setTimeout(() => {
                surpriseScreen.style.display = 'none';
                canvasContainer.style.display = 'block';
                initInteractiveFlowers();
                
                // Show Button safely ONLY in Phase 2 after 7 seconds
                setTimeout(() => { 
                    nextPhaseBtn.style.display = 'block'; 
                    setTimeout(() => { nextPhaseBtn.style.bottom = '40px'; }, 100);
                }, 7000);
            }, 1000);
        });

        nextPhaseBtn.addEventListener('click', () => {
            canvasContainer.style.opacity = '0';
            nextPhaseBtn.style.bottom = '-100px';
            setTimeout(() => {
                canvasContainer.style.display = 'none';
                spaceScreen.style.display = 'block';
                uiContainer.style.display = 'block';
                initInfiniteGarden();
            }, 1000);
        });

        // ==========================================
        // PHASE 2: ULTRA-FAST, MEGA-GLOWING 2D FLOWERS (LAG FIXED)
        // ==========================================
        function initInteractiveFlowers() {
            const canvas = document.getElementById('interactiveCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // PRE-RENDER NEON FLOWERS (Fixes lag on phones!)
            const preRenderedFlowers = [];
            
            neonColors.forEach(theme => {
                const offCanvas = document.createElement('canvas');
                offCanvas.width = 300; offCanvas.height = 300;
                const oCtx = offCanvas.getContext('2d');
                oCtx.translate(150, 150);
                oCtx.globalCompositeOperation = 'lighter'; // Extreme glow blending

                // Draw heavy glowing petals ONCE
                const petals = Math.floor(Math.random() * 4) + 6;
                for(let j=0; j<2; j++) { // Double layer for mega glow
                    for (let i = 0; i < petals; i++) {
                        oCtx.rotate((Math.PI * 2) / petals);
                        oCtx.beginPath(); oCtx.moveTo(0, 0);
                        oCtx.bezierCurveTo(40, -40, 80, -20, 80, 0);
                        oCtx.bezierCurveTo(80, 20, 40, 40, 0, 0);
                        
                        oCtx.fillStyle = theme.core;
                        oCtx.shadowColor = theme.glow;
                        oCtx.shadowBlur = j === 0 ? 30 : 50; // Insane blur
                        oCtx.fill();
                    }
                }
                // Center
                oCtx.beginPath(); oCtx.arc(0, 0, 15, 0, Math.PI * 2);
                oCtx.fillStyle = '#fff'; oCtx.shadowColor = '#FFD700'; oCtx.shadowBlur = 20; oCtx.fill();
                
                preRenderedFlowers.push(offCanvas);
            });

            const flowers = [];

            class FastFlower {
                constructor(x, y) {
                    this.x = x; this.y = y + 250; 
                    this.typeIndex = Math.floor(Math.random() * preRenderedFlowers.length);
                    this.size = 0; this.maxSize = Math.random() * 40 + 60; // Bigger
                    this.stemHeight = 0; this.maxStemHeight = 250;
                    this.sway = Math.random() * 100;
                }

                grow() {
                    if (this.stemHeight < this.maxStemHeight) this.stemHeight += 12; // Faster growth
                    if (this.stemHeight > this.maxStemHeight * 0.5 && this.size < this.maxSize) this.size += 3;
                    this.sway += 0.05;
                }

                draw() {
                    const swayOffset = Math.sin(this.sway) * 20;
                    const currentX = this.x + swayOffset;
                    const currentY = this.y + this.maxStemHeight - this.stemHeight;
                    
                    // Simple fast stem
                    ctx.beginPath(); ctx.moveTo(this.x, this.y + this.maxStemHeight);
                    ctx.quadraticCurveTo(this.x + swayOffset/2, this.y + this.maxStemHeight/2, currentX, currentY);
                    ctx.lineWidth = 5; ctx.strokeStyle = '#0f8a2f'; ctx.stroke(); 

                    if (this.size > 2) {
                        // FAST RENDER: Just copy the pre-rendered glowing image!
                        ctx.drawImage(preRenderedFlowers[this.typeIndex], currentX - this.size/2, currentY - this.size/2, this.size, this.size);
                    }
                }
            }

            for(let i=0; i<6; i++) {
                setTimeout(() => { flowers.push(new FastFlower(Math.random() * (canvas.width - 100) + 50, canvas.height/2 + Math.random() * 150 - 50)); }, i * 400);
            }

            window.addEventListener('click', (e) => { if(canvasContainer.style.display === 'block' && e.target.id !== 'next-phase-btn') flowers.push(new FastFlower(e.clientX, e.clientY - 150)); });
            window.addEventListener('touchstart', (e) => { if(canvasContainer.style.display === 'block' && e.target.id !== 'next-phase-btn') flowers.push(new FastFlower(e.touches[0].clientX, e.touches[0].clientY - 150)); });

            function animate2D() {
                if(canvasContainer.style.display === 'none') return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                flowers.forEach(f => { f.grow(); f.draw(); });
                requestAnimationFrame(animate2D);
            }
            animate2D();
        }

        // ==========================================
        // PHASE 3: TRULY INFINITE 3D GARDEN (HEIGHT FIXED)
        // ==========================================
        function initInfiniteGarden() {
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010103, 0.004); // Dark infinite fog
            scene.background = new THREE.Color(0x010103);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 0); // HEIGHT FIXED: Camera is much higher now!

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            spaceScreen.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            controls.enableZoom = false; controls.enablePan = false;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; controls.minPolarAngle = Math.PI / 3;
            controls.target.set(0, 30, -1); 

            // Ground
            const groundGeo = new THREE.PlaneGeometry(5000, 5000);
            const groundMat = new THREE.MeshBasicMaterial({ color: 0x011101, side: THREE.DoubleSide });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Create Premium Neon Texture for 3D
            function createTexture(colorTheme) {
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.translate(64, 64);
                for (let i = 0; i < 8; i++) {
                    ctx.rotate((Math.PI * 2) / 8);
                    ctx.beginPath(); ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(40, -20, 60, -10, 60, 0);
                    ctx.bezierCurveTo(60, 10, 40, 20, 0, 0);
                    const grad = ctx.createRadialGradient(0, 0, 0, 30, 0, 60);
                    grad.addColorStop(0, colorTheme.core); grad.addColorStop(0.5, colorTheme.glow); grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad; ctx.shadowColor = colorTheme.glow; ctx.shadowBlur = 20; ctx.fill();
                }
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.fill();
                ctx.fillStyle = '#0f8a2f'; ctx.fillRect(-2, 0, 4, 64);
                return new THREE.CanvasTexture(canvas);
            }

            const textures = neonColors.map(c => createTexture(c));
            
            // --- THE INFINITE SHADER TRICK ---
            const material = new THREE.MeshBasicMaterial({ 
                map: textures[0], transparent: true, alphaTest: 0.1, side: THREE.DoubleSide 
            });

            material.onBeforeCompile = (shader) => {
                shader.uniforms.time = { value: 0 };
                shader.uniforms.camPos = { value: new THREE.Vector3() };
                material.userData.shader = shader;
                shader.vertexShader = `
                  uniform float time;
                  uniform vec3 camPos;
                  ${shader.vertexShader}
                `.replace(
                  `#include <project_vertex>`,
                  `
                  vec4 mvPosition = vec4( transformed, 1.0 );
                  #ifdef USE_INSTANCING
                      mat4 im = instanceMatrix;
                      
                      // INFINITE WRAP AROUND CAMERA
                      float fieldSize = 1000.0;
                      float halfSize = 500.0;
                      im[3][0] = mod(im[3][0] - camPos.x + halfSize, fieldSize) - halfSize + camPos.x;
                      im[3][2] = mod(im[3][2] - camPos.z + halfSize, fieldSize) - halfSize + camPos.z;

                      // Wind
                      float wind = sin(time * 2.0 + im[3][0] * 0.05 + im[3][2] * 0.05) * 2.0;
                      mvPosition.x += wind * (position.y / 12.0);

                      mvPosition = im * mvPosition;
                  #endif
                  mvPosition = modelViewMatrix * mvPosition;
                  gl_Position = projectionMatrix * mvPosition;
                  `
                );
            };

            const FLOWER_COUNT = 30000;
            const geometry = new THREE.PlaneGeometry(15, 15);
            geometry.translate(0, 7.5, 0); 
            
            const instancedMesh = new THREE.InstancedMesh(geometry, material, FLOWER_COUNT);
            instancedMesh.frustumCulled = false; // CRUCIAL for infinite shader to work
            const dummy = new THREE.Object3D();
            
            let i = 0;
            const rows = 173; const cols = 173; const spacing = 6; 

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    if (i >= FLOWER_COUNT) break;
                    const x = (c - cols/2) * spacing + (Math.random() * 4 - 2);
                    const z = (r - rows/2) * spacing + (Math.random() * 4 - 2);
                    if (Math.abs(x) < 5 && Math.abs(z) < 5) continue;

                    dummy.position.set(x, 0, z);
                    dummy.rotation.y = Math.random() * Math.PI;
                    // HEIGHT FIXED: Made scale smaller so they stay below camera
                    const scale = Math.random() * 0.4 + 0.4; 
                    dummy.scale.set(scale, scale, scale);
                    dummy.updateMatrix();
                    instancedMesh.setMatrixAt(i, dummy.matrix);
                    i++;
                }
            }
            scene.add(instancedMesh);

            // --- WALKING MECHANICS ---
            let isWalking = false;
            const walkSpeed = 1.5;
            const direction = new THREE.Vector3();

            walkBtn.addEventListener('mousedown', () => isWalking = true);
            walkBtn.addEventListener('mouseup', () => isWalking = false);
            walkBtn.addEventListener('mouseleave', () => isWalking = false);
            walkBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isWalking = true; }, {passive:false});
            walkBtn.addEventListener('touchend', () => isWalking = false);

            // --- PICKING SYSTEM ---
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let pickedCount = 0;

            function pickFlower(event) {
                let clientX = event.clientX; let clientY = event.clientY;
                if(event.changedTouches) { clientX = event.changedTouches[0].clientX; clientY = event.changedTouches[0].clientY; }
                if (event.target === walkBtn) return;

                mouse.x = (clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(instancedMesh);

                if (intersects.length > 0) {
                    const instanceId = intersects[0].instanceId;
                    instancedMesh.getMatrixAt(instanceId, dummy.matrix);
                    dummy.matrix.decompose(dummy.position, dummy.rotation, dummy.scale);
                    
                    if (dummy.scale.x > 0) {
                        dummy.scale.set(0, 0, 0); // Pick it
                        dummy.updateMatrix();
                        instancedMesh.setMatrixAt(instanceId, dummy.matrix);
                        instancedMesh.instanceMatrix.needsUpdate = true;
                        
                        pickedCount++;
                        scoreBoard.innerText = `Picked: ${pickedCount}`;
                        scoreBoard.style.transform = "scale(1.2)";
                        setTimeout(() => scoreBoard.style.transform = "scale(1)", 150);
                    }
                }
            }

            window.addEventListener('click', pickFlower);
            window.addEventListener('touchstart', (e) => { if(e.target !== walkBtn) pickFlower(e); }, {passive: false});

            // --- RENDER LOOP ---
            const clock = new THREE.Clock();

            function animate3D() {
                requestAnimationFrame(animate3D);
                const time = clock.getElapsedTime();
                
                if (isWalking) {
                    camera.getWorldDirection(direction);
                    direction.y = 0; direction.normalize();
                    camera.position.addScaledVector(direction, walkSpeed);
                    controls.target.addScaledVector(direction, walkSpeed);
                }

                if (material.userData.shader) {
                    material.userData.shader.uniforms.time.value = time;
                    material.userData.shader.uniforms.camPos.value.copy(camera.position); // Updates the infinite wrap
                }

                controls.update();
                renderer.render(scene, camera);
            }
            animate3D();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
  </html>
