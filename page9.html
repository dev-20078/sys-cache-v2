<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finale Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@600&display=swap" rel="stylesheet">

<style>
:root {
  --pink: #ff477e;
  --yellow: #ffd166;
  --blue: #118ab2;
  --green: #06d6a0;
  --bg-overlay: rgba(0, 0, 0, 0.6);
}

body {
  margin: 0;
  padding: 0;
  background: url('bday-bg.jpg') no-repeat center center fixed;
  background-size: cover;
  font-family: 'Montserrat', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

.overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg-overlay);
  z-index: -1;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 90%;
  animation: fadeIn 0.5s ease forwards;
}

.active-screen {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.bday-text-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 5px;
  margin-bottom: 20px;
}

.bday-letter {
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem;
  padding: 5px 10px;
  border-radius: 10px;
  background-color: var(--pink);
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  animation: bounceLetter 2s infinite alternate;
  text-transform: uppercase;
}

@keyframes bounceLetter {
  0% { transform: translateY(0px); }
  100% { transform: translateY(-15px); }
}

.gif-sticker {
  width: 220px;
  border-radius: 15px;
  margin: 20px 0;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
}

.btn-container {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

button {
  font-family: 'Fredoka One', cursive;
  font-size: 1.3rem;
  padding: 12px 35px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.btn-yes {
  background: var(--green);
  color: white;
  animation: pulse 1.5s infinite;
}

.btn-yes:hover {
  background: #05b586;
  transform: scale(1.1);
}

.btn-no {
  background: #ff4d4d;
  color: white;
}

.btn-no:hover {
  background: #e60000;
  transform: rotate(-5deg) scale(1.05);
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(6, 214, 160, 0.7); }
  70% { box-shadow: 0 0 0 15px rgba(6, 214, 160, 0); }
  100% { box-shadow: 0 0 0 0 rgba(6, 214, 160, 0); }
}

.big-text {
  font-family: 'Fredoka One', cursive;
  font-size: 2.5rem;
  color: var(--yellow);
  text-shadow: 3px 3px 0px var(--pink);
  margin-bottom: 20px;
}

.password-box {
  background: rgba(0, 0, 0, 0.7);
  padding: 25px;
  border-radius: 20px;
  border: 3px solid var(--pink);
  box-shadow: 0 0 20px var(--pink);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-top: 10px;
}

.pwd-hint {
  font-size: 1.1rem;
  color: var(--yellow);
  font-weight: bold;
}

#secret-code {
  padding: 12px;
  border-radius: 30px;
  border: 2px solid var(--blue);
  font-size: 1.1rem;
  text-align: center;
  width: 80%;
}

.btn-unlock {
  background: var(--pink);
  color: white;
  padding: 10px 25px;
  border-radius: 30px;
  font-size: 1.1rem;
}

.error-msg {
  color: #ff4d4d;
  font-weight: bold;
  display: none;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  75% { transform: translateX(-10px); }
}

.btn-link {
  background: var(--blue);
  color: white;
  text-decoration: none;
  padding: 15px 40px;
  border-radius: 50px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  display: inline-block;
  box-shadow: 0 0 15px var(--blue);
  transition: 0.3s;
}

.btn-link:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px var(--blue);
}

.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(100vh) rotate(720deg); }
}

</style>
</head>

<body>

<div class="overlay"></div>

<audio id="no-audio" src="no-music.mp3"></audio>
<audio id="yes-audio" src="yes-music.mp3"></audio>

<div id="screen-main" class="screen active-screen">
  <div id="bday-text" class="bday-text-container"></div>
  <img src="cute-ask.gif" class="gif-sticker" alt="Cute Sticker">
  <div class="btn-container">
    <button class="btn-yes" onclick="showYesScreen()">YES!</button>
    <button class="btn-no" onclick="showNoScreen()">NO</button>
  </div>
</div>

<div id="screen-no" class="screen">
  <div class="big-text">Why did you do that? 😢</div>
  <img src="sad-cry.gif" class="gif-sticker" alt="Sad Sticker">
  <div class="btn-container">
    <button class="btn-no" onclick="goBack()">GO BACK</button>
  </div>
</div>

<div id="screen-yes" class="screen">
  <div class="big-text">YAY! 🎉 Almost there...</div>
  <img src="cute-ask.gif" class="gif-sticker" alt="Happy Sticker"> 
  
  <div id="password-section" class="password-box">
    <p class="pwd-hint">Secret code dhalo surprise ke liye! 🎁</p>
    <input type="password" id="secret-code" placeholder="Password yahan likho">
    <button class="btn-unlock" onclick="checkPassword()">UNLOCK</button>
    <p id="error-msg" class="error-msg">❌ Access Denied!</p>
  </div>

  <div id="link-section" style="display: none; flex-direction: column; align-items: center; margin-top: 20px;">
    <div class="big-text" style="font-size: 1.8rem;">Click to see your gift! 🎈</div>
    <a href="#" id="final-video-btn" target="_blank" class="btn-link">WATCH VIDEO</a>
  </div>
</div>

<script>
const text = "AAPKE LIYE KUCH SPECIAL HAI READY HO?";
const container = document.getElementById("bday-text");
const colors = ['#ff477e', '#ffd166', '#118ab2', '#06d6a0', '#9d4edd'];

text.split("").forEach((char, index) => {
  if (char === " ") {
    const space = document.createElement("div");
    space.style.width = "15px";
    container.appendChild(space);
  } else {
    const span = document.createElement("span");
    span.innerText = char;
    span.className = "bday-letter";
    span.style.backgroundColor = colors[index % colors.length];
    span.style.animationDelay = `${(index * 0.1) % 1}s`;
    container.appendChild(span);
  }
});

const screenMain = document.getElementById("screen-main");
const screenNo = document.getElementById("screen-no");
const screenYes = document.getElementById("screen-yes");
const audioNo = document.getElementById("no-audio");
const audioYes = document.getElementById("yes-audio");

function stopAllAudio() {
  audioNo.pause(); audioNo.currentTime = 0;
  audioYes.pause(); audioYes.currentTime = 0;
}

function showNoScreen() {
  stopAllAudio();
  audioNo.play();
  screenMain.classList.remove("active-screen");
  screenNo.classList.add("active-screen");
}

function goBack() {
  stopAllAudio();
  screenNo.classList.remove("active-screen");
  screenMain.classList.add("active-screen");
}

function showYesScreen() {
  stopAllAudio();
  audioYes.play();
  screenMain.classList.remove("active-screen");
  screenYes.classList.add("active-screen");
  createConfetti();
}

function checkPassword() {
  const input = document.getElementById("secret-code").value;
  const errorMsg = document.getElementById("error-msg");
  
  // Encrypted password check (bGlsYV9jNzc3 = lila_c777)
  if (btoa(input) === "bGlsYV9jNzc3") {
    document.getElementById("password-section").style.display = "none";
    document.getElementById("link-section").style.display = "flex";
    
    // Encrypted Link Decode hoke button pe attach ho jayega 
    const secureLink = "aHR0cHM6Ly9kcml2ZS5nb29nbGUuY29tL2ZpbGUvZC8xVVFMT25pVElSRmw0SGJGdVhoVThsZFYydDhlZm1uZlQvdmlldz91c3A9ZHJpdmVzZGs=";
    document.getElementById("final-video-btn").href = atob(secureLink);

    createConfetti();
  } else {
    errorMsg.style.display = "block";
    errorMsg.style.animation = 'shake 0.4s ease';
    setTimeout(() => { errorMsg.style.display = "none"; }, 2000);
  }
}

function createConfetti() {
  for (let i = 0; i < 80; i++) {
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
    document.body.appendChild(confetti);
  }
}
</script>

</body>
    </html>
