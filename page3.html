<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maloote</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
text-align:center;
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
color:white;
}

/* title */

.title{
font-size:48px;
font-weight:bold;
color:#ffd700;
letter-spacing:4px;
font-family:Georgia,serif;
}

/* subtitle */

.subtitle{
margin-top:5px;
font-size:18px;
}

/* cake timer */

.timer{

margin-top:40px;
background:#2b1a1a;
padding:30px;
border-radius:20px;
width:260px;
border:4px solid #ffd700;

box-shadow:0 0 25px rgba(255,215,0,0.4);

}

.timer-top{

width:100%;
height:10px;
background:#ff4d4d;
border-radius:10px;

}

/* numbers */

.time{

font-size:32px;
margin-top:15px;
color:white;

}

.red{

}

</style>

</head>

<body>

<div class="title">MALOOTE</div>

<div class="subtitle">
aap zara jaldi aagaye
</div>

<div class="timer">

<div class="timer-top"></div>

<div class="time" id="count"></div>

</div>

<script>

/* SHA256 */

async function sha256(str){

const buf=new TextEncoder().encode(str);

const digest=await crypto.subtle.digest("SHA-256",buf);

return Array.from(new Uint8Array(digest))
.map(b=>b.toString(16).padStart(2,"0"))
.join("");

}

/* target time IST */

const target = new Date("Apr 29, 2026 00:00:00 GMT+0530").getTime();

setInterval(async function(){

const now = new Date().getTime();

const diff = target - now;

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((diff%(1000*60*60))/(1000*60));
let s=Math.floor((diff%(1000*60))/1000);

document.getElementById("count").innerHTML =
"<span class='red'>"+d+"</span>d "+
"<span class='red'>"+h+"</span>h "+
"<span class='red'>"+m+"</span>m "+
"<span class='red'>"+s+"</span>s";

/* hash time unlock */

let hash = await sha256(String(now >= target));

if(hash === "5feceb66ffc86f38d952786c6d696c79c2dbc239dd4e91b46729d73a27fb57e9"){

window.location="page4.html";

}

},1000);

</script>

</body>
</html>
