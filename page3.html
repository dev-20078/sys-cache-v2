<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
text-align:center;
color:white;
overflow:hidden;

/* 🔥 HARD FIX BACKGROUND */
background-image:url("./bg.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* DARK OVERLAY FIXED */
body::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:0;
}

.box{
position:relative;
z-index:2;
}

/* TITLE */
.title{
font-size:42px;
font-weight:900;
background:linear-gradient(45deg,gold,#fff,gold);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 25px gold;
}

/* SUB */
.sub{
margin-top:10px;
font-size:18px;
color:white;
text-shadow:0 0 10px white;
}

/* 🎂 CAKE */
.cake{
margin-top:25px;
display:flex;
flex-direction:column;
align-items:center;
}

/* candles */
.candles{
display:flex;
gap:8px;
margin-bottom:5px;
}

.flame{
width:8px;
height:15px;
background:gold;
border-radius:50%;
box-shadow:0 0 15px gold;
animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

/* cake body */
.cake-body{
background:linear-gradient(45deg,#3a2a1a,#5a3a1f);
padding:20px 25px;
border-radius:15px;
border:2px solid gold;
box-shadow:0 0 20px gold;
}

.cake-body::before{
content:"";
display:block;
width:100%;
height:8px;
background:white;
border-radius:5px;
margin-bottom:10px;
}

/* timer text */
#time{
font-size:18px;
text-shadow:0 0 10px gold;
}

/* button */
#openBtn{
display:none;
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,gold,green);
color:#000;
font-weight:bold;
box-shadow:0 0 15px gold;
}

/* particles */
.particle{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
opacity:0.7;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<div class="box">
<div class="title">MALOOTE</div>
<div class="sub">aap zara jaldi aagaye</div>

<div class="cake">
  <div class="candles">
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
  </div>

  <div class="cake-body">
    <div id="time"></div>
  </div>
</div>

<button id="openBtn" onclick="openPage()">OPEN</button>
</div>

<script>
// target date
var target = new Date("April 29, 2026 00:00:00").getTime();

setInterval(function(){
var now = new Date().getTime();
var diff = target - now;

if(diff <= 0){
document.getElementById("time").innerHTML="It's Time 🎉";
document.getElementById("openBtn").style.display="inline-block";
}else{
var d=Math.floor(diff/(1000*60*60*24));
var h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
var m=Math.floor((diff%(1000*60*60))/(1000*60));
var s=Math.floor((diff%(1000*60))/1000);

document.getElementById("time").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s";
}
},1000);

function openPage(){
window.location.href="page4.html";
}

/* particles */
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
document.body.appendChild(p);
}
</script>

</body>
  </html>
