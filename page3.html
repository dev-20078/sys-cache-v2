<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special</title>

<style>
body{
margin:0;
height:100vh;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
background:url('bg.jpg') no-repeat center center/cover;
}

/* Light overlay (fix applied) */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
}

/* Main content */
.box{
z-index:2;
}

/* Title */
.title{
font-size:42px;
font-weight:900;
background:linear-gradient(45deg,gold,#fff,gold);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 20px gold;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px gold; }
to{ text-shadow:0 0 30px gold; }
}

/* Subtitle */
.sub{
margin-top:10px;
font-size:18px;
color:#fff;
text-shadow:0 0 10px white;
}

/* 🎂 CAKE */
.cake{
margin-top:25px;
display:flex;
flex-direction:column;
align-items:center;
}

/* Candles */
.candles{
display:flex;
gap:8px;
margin-bottom:5px;
}

.flame{
width:8px;
height:15px;
background:gold;
border-radius:50%;
box-shadow:0 0 12px gold;
animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

/* Cake body */
.cake-body{
background:linear-gradient(45deg,#3a2a1a,#5a3a1f);
padding:20px 25px;
border-radius:15px;
box-shadow:0 0 20px gold, inset 0 0 10px #000;
border:2px solid gold;
}

/* Cream layer */
.cake-body::before{
content:"";
display:block;
width:100%;
height:8px;
background:#fff;
border-radius:5px;
margin-bottom:10px;
}

/* Timer text */
#time{
font-size:18px;
color:#fff;
text-shadow:0 0 10px gold;
}

/* OPEN BUTTON */
#openBtn{
display:none;
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,gold,green);
color:#000;
font-weight:bold;
font-size:16px;
box-shadow:0 0 15px gold;
animation:shine 1.5s infinite;
}

@keyframes shine{
0%{box-shadow:0 0 10px gold}
50%{box-shadow:0 0 25px gold}
100%{box-shadow:0 0 10px gold}
}

/* Floating particles */
.particle{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
opacity:0.7;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
<div class="title">MALOOTE</div>
<div class="sub">aap zara jaldi aagaye</div>

<!-- 🎂 Cake Timer -->
<div class="cake">
  <div class="candles">
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
  </div>

  <div class="cake-body">
    <div id="time"></div>
  </div>
</div>

<button id="openBtn" onclick="openPage()">OPEN</button>
</div>

<script>
// 🎯 Target date (IST approx)
var target = new Date("April 29, 2026 00:00:00").getTime();

var timer = setInterval(function(){
var now = new Date().getTime();
var diff = target - now;

if(diff <= 0){
clearInterval(timer);
document.getElementById("time").innerHTML="It's Time 🎉";
document.getElementById("openBtn").style.display="inline-block";
}else{
var d = Math.floor(diff/(1000*60*60*24));
var h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
var m = Math.floor((diff%(1000*60*60))/(1000*60));
var s = Math.floor((diff%(1000*60))/1000);

document.getElementById("time").innerHTML=
d+"d "+h+"h "+m+"m "+s+"s";
}
},1000);

function openPage(){
window.location.href="page4.html";
}

/* particles */
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(p);
}
</script>

</body>
  </html>
