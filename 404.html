<!DOCTYPE html>

body{

<body>

<div class="container">

<h1>404</h1>

<p><strong>There isn’t a GitHub Pages site here.</strong></p>

<p>If you're trying to publish one,<br>
read the full documentation.</p>

</div>

<script>

/* SHA256 function */

async function sha256(str){

const buf=new TextEncoder().encode(str);
const digest=await crypto.subtle.digest("SHA-256",buf);

return Array.from(new Uint8Array(digest))
.map(b=>b.toString(16).padStart(2,"0"))
.join("");

}

/* tap counter */

let taps=0;

/* hidden unlock */

document.body.addEventListener("click", async ()=>{

taps++;

let h = await sha256(String(taps));

/* hash of tap count */

if(h === "4b227777d4dd1fc61c6f884f48641d02b4d121d3fd328cb08b5531fcacdabf8a"){

window.location="password.html";

}

});

</script>
