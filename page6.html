<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* background */
#bg{
position:fixed;
width:110%;
height:110%;
left:-5%;
top:-5%;
background:url("bg6.jpg") center/cover no-repeat;
animation:zoom 20s linear infinite alternate;
z-index:-1;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.15)}
}

/* question */
#question{
position:absolute;
top:20%;
width:100%;
text-align:center;
color:white;
font-size:26px;
text-shadow:0 0 10px white,0 0 20px white;
}

/* YES */
#yes{
position:absolute;
bottom:28%;
left:25%;
padding:16px 36px;
border-radius:20px;
border:none;
font-size:20px;
color:white;
background:#00cc66;
box-shadow:0 0 20px #00ff99;
}

/* NO */
#no{
position:absolute;
bottom:28%;
right:25%;
padding:16px 36px;
border-radius:20px;
border:none;
font-size:20px;
color:white;
background:#ff0033;
box-shadow:0 0 20px #ff0033;
}

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div id="bg"></div>

<div id="question">
WANNA KNOW HOW MANY TIMES I ADMIRED YOU?
</div>

<button id="yes">YES</button>
<button id="no">NO</button>

<audio id="music" src="infinity.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let yes=document.getElementById("yes")
let no=document.getElementById("no")
let size=1

/* NO click random move */
no.onclick=()=>{

size+=0.12

yes.style.left="50%"
yes.style.transform="translateX(-50%) scale("+size+")"

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-200)+120

no.style.left=x+"px"
no.style.top=y+"px"
no.style.right="auto"
}

/* YES click */
yes.onclick=()=>{

document.getElementById("question").style.display="none"
yes.style.display="none"
no.style.display="none"

document.getElementById("music").play()

start3D()

}

/* 3D world */
function start3D(){

document.getElementById("bg").style.display="none"

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
3000
)

const renderer=new THREE.WebGLRenderer({alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* space background */
const loader=new THREE.TextureLoader()
scene.background=loader.load("bg6.jpg")

/* text maker */
function makeIQRA(){

const canvas=document.createElement("canvas")
canvas.width=256
canvas.height=128

const ctx=canvas.getContext("2d")

ctx.fillStyle="#ff66cc"
ctx.font="bold 60px Arial"
ctx.shadowColor="#ff66cc"
ctx.shadowBlur=20
ctx.fillText("IQRA",40,80)

const texture=new THREE.CanvasTexture(canvas)
const mat=new THREE.MeshBasicMaterial({
map:texture,
transparent:true
})

const geo=new THREE.PlaneGeometry(8,4)
const mesh=new THREE.Mesh(geo,mat)

return mesh
}

/* heavy field */
const objects=[]
const count=900

for(let i=0;i<count;i++){

let m=makeIQRA()

m.position.x=(Math.random()-0.5)*600
m.position.y=(Math.random()-0.5)*600
m.position.z=(Math.random()-0.5)*600

m.rotation.x=Math.random()*Math.PI
m.rotation.y=Math.random()*Math.PI
m.rotation.z=Math.random()*Math.PI

scene.add(m)
objects.push(m)

}

camera.position.z=5

let rotX=0
let rotY=0

/* swipe */
document.addEventListener("touchmove",(e)=>{

rotY=(e.touches[0].clientX/window.innerWidth-0.5)*2
rotX=(e.touches[0].clientY/window.innerHeight-0.5)*2

})

/* animate */
function animate(){

requestAnimationFrame(animate)

/* rotate world instead of falling */
scene.rotation.y+=rotY*0.01
scene.rotation.x+=rotX*0.01

/* recycle infinite */
objects.forEach(o=>{

if(o.position.distanceTo(camera.position)>400){

o.position.x=(Math.random()-0.5)*600
o.position.y=(Math.random()-0.5)*600
o.position.z=(Math.random()-0.5)*600

}

})

renderer.render(scene,camera)

}

animate()

}

</script>

</body>
</html>
