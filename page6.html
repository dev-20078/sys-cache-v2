<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reveal Shooter</title>

<style>
body{
margin:0;
overflow:hidden;
background:#070710;
font-family:Arial, sans-serif;
}

#game{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
}

#grid{
position:absolute;
width:100%;
height:100%;
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:repeat(2,1fr);
}

.tile{
background:url('sunny.jpg') center/cover no-repeat;
opacity:0;
transition:1s;
}

.overlay{
position:absolute;
width:100%;
height:100%;
backdrop-filter:blur(18px);
}

.target{
position:absolute;
width:55px;
height:55px;
border-radius:50%;
background:radial-gradient(circle,#ff4d8d,#ff0055);
box-shadow:0 0 25px #ff0055;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

#crosshair{
position:absolute;
width:40px;
height:40px;
border:2px solid white;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
}

#level{
position:absolute;
top:15px;
left:15px;
color:white;
font-size:18px;
}

#progress{
position:absolute;
top:15px;
right:15px;
color:#ff4d8d;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:22px;
}

#next{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:15px 40px;
background:#ff4d8d;
border:none;
color:white;
font-size:18px;
border-radius:40px;
display:none;
box-shadow:0 0 25px #ff4d8d;
}

.particle{
position:absolute;
width:6px;
height:6px;
background:#ff4d8d;
border-radius:50%;
pointer-events:none;
}

</style>
</head>

<body>

<div id="game">

<div id="grid"></div>
<div class="overlay" id="blur"></div>

<div id="crosshair"></div>

<div id="level">Level 1</div>
<div id="progress">0/5</div>

<div id="start">Tap To Start</div>

<button id="next">Next</button>

</div>

<script>

const grid=document.getElementById("grid")
const blur=document.getElementById("blur")
const levelTxt=document.getElementById("level")
const progress=document.getElementById("progress")
const cross=document.getElementById("crosshair")
const start=document.getElementById("start")
const next=document.getElementById("next")

let level=1
let hits=0
let started=false

// create tiles
for(let i=0;i<10;i++){
let t=document.createElement("div")
t.className="tile"
grid.appendChild(t)
}

const tiles=document.querySelectorAll(".tile")

document.addEventListener("mousemove",e=>{
cross.style.left=e.clientX+"px"
cross.style.top=e.clientY+"px"
})

document.addEventListener("touchmove",e=>{
cross.style.left=e.touches[0].clientX+"px"
cross.style.top=e.touches[0].clientY+"px"
})

document.addEventListener("click",shoot)

start.onclick=()=>{
start.style.display="none"
started=true
spawn()
}

function spawn(){

if(!started) return

let t=document.createElement("div")
t.className="target"

t.style.left=Math.random()*90+"%"
t.style.top=(Math.random()*70+15)+"%"

document.body.appendChild(t)

t.onclick=(e)=>{
e.stopPropagation()
hit(t)
}

setTimeout(()=>{
t.remove()
spawn()
},1200-(level*60))
}

function shoot(e){
if(!started) return
createParticles(e.clientX,e.clientY)
}

function hit(t){
t.remove()
hits++

progress.innerText=hits+"/5"

if(hits>=5){
unlock()
}
}

function unlock(){
tiles[level-1].style.opacity=1

hits=0
level++

progress.innerText="0/5"
levelTxt.innerText="Level "+level

blur.style.backdropFilter="blur("+(20-(level*2))+"px)"

if(level>10){
finish()
}
}

function finish(){
blur.style.display="none"
levelTxt.innerText="Face Unlocked"
next.style.display="block"
}

next.onclick=()=>{
window.location.href="page7.html"
}

// particles
function createParticles(x,y){
for(let i=0;i<12;i++){
let p=document.createElement("div")
p.className="particle"
p.style.left=x+"px"
p.style.top=y+"px"
document.body.appendChild(p)

let angle=Math.random()*360
let speed=Math.random()*4+2

let vx=Math.cos(angle)*speed
let vy=Math.sin(angle)*speed

let life=0

let anim=setInterval(()=>{
life++

p.style.left=(p.offsetLeft+vx)+"px"
p.style.top=(p.offsetTop+vy)+"px"
p.style.opacity=1-life/20

if(life>20){
clearInterval(anim)
p.remove()
}

},16)
}
}

</script>

</body>
</html>
