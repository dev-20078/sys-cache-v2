<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 6</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', cursive;
}

body{
overflow:hidden;
}

/* background */
.bg{
position:fixed;
width:100%;
height:100%;
background:url('bg6.jpg') center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* title */
.title{
color:white;
font-size:40px;
text-align:center;
letter-spacing:2px;
text-shadow:0 0 10px white,
0 0 20px white,
0 0 40px pink;
margin-bottom:40px;
}

/* buttons */
.btns{
display:flex;
gap:30px;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.yes{
background:#00ff88;
color:black;
box-shadow:0 0 15px #00ff88,
0 0 40px #00ff88;
}

.no{
background:#ff0040;
color:white;
position:absolute;
box-shadow:0 0 15px red,
0 0 40px red;
}

/* space */
.space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
display:none;
perspective:1000px;
}

/* IQRA */
.iqra{
position:absolute;
color:#ff4fd8;
font-size:22px;
text-shadow:
0 0 5px #ff4fd8,
0 0 10px #ff4fd8,
0 0 20px #ff4fd8,
0 0 40px #ff4fd8;
white-space:nowrap;
}

/* stars */
.star{
position:absolute;
background:white;
border-radius:50%;
box-shadow:0 0 6px white,0 0 20px white;
}

/* comet */
.comet{
position:absolute;
width:3px;
height:120px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
filter:blur(1px);
opacity:.8;
}

/* emoji */
.emoji{
position:absolute;
font-size:22px;
animation:fade 1.2s forwards;
}

@keyframes fade{
0%{opacity:1;transform:translateY(0) scale(1)}
100%{opacity:0;transform:translateY(-40px) scale(1.4)}
}

/* next button */
.next{
position:fixed;
bottom:20px;
left:20px;
padding:12px 30px;
background:#00bfff;
color:white;
border:none;
border-radius:25px;
font-size:18px;
box-shadow:0 0 10px #00bfff,0 0 30px #00bfff;
display:none;
}
</style>
</head>

<body>

<div class="bg" id="bg">
<div class="title">
WANNA KNOW HOW MUCH I ADMIRE YOU
</div>

<div class="btns">
<button class="yes" id="yes">YES</button>
</div>

<button class="no" id="no">NO</button>
</div>

<div class="space" id="space"></div>

<button class="next" id="next">NEXT</button>

<audio id="music" src="infinity.mp3" loop></audio>

<script>

let no=document.getElementById("no")
let yes=document.getElementById("yes")
let scale=1

/* NO button run */
no.addEventListener("click",()=>{
let x=Math.random()*window.innerWidth-100
let y=Math.random()*window.innerHeight-50

no.style.left=x+"px"
no.style.top=y+"px"

scale+=0.2
yes.style.transform=`scale(${scale})`
})

/* YES click */
yes.onclick=()=>{

document.getElementById("bg").style.display="none"
let space=document.getElementById("space")
space.style.display="block"

document.getElementById("music").play()

createStars()
createIQRA()
createComets()

setTimeout(()=>{
document.getElementById("next").style.display="block"
},15000)

}

/* stars */
function createStars(){
for(let i=0;i<200;i++){
let s=document.createElement("div")
s.className="star"
s.style.width=Math.random()*3+"px"
s.style.height=s.style.width
s.style.left=Math.random()*3000+"px"
s.style.top=Math.random()*3000+"px"
space.appendChild(s)
}
}

/* IQRA */
function createIQRA(){
for(let i=0;i<150;i++){
let t=document.createElement("div")
t.className="iqra"
t.innerText="IQRA"
t.style.left=Math.random()*3000+"px"
t.style.top=Math.random()*3000+"px"
space.appendChild(t)
}
}

/* comets */
function createComets(){
setInterval(()=>{
let c=document.createElement("div")
c.className="comet"
c.style.left=Math.random()*window.innerWidth+"px"
c.style.top="-100px"

space.appendChild(c)

let y=window.innerHeight+200
c.animate([
{transform:"translateY(0) rotate(45deg)"},
{transform:`translateY(${y}px) rotate(45deg)`}
],{
duration:4000,
easing:"linear"
})

setTimeout(()=>c.remove(),4000)

},1500)
}

/* drag 3D move */
let posX=0,posY=0
let startX,startY

space.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

space.addEventListener("touchmove",e=>{
let x=e.touches[0].clientX
let y=e.touches[0].clientY

posX+=(x-startX)*0.5
posY+=(y-startY)*0.5

space.style.transform=
`translate(${posX}px,${posY}px)
rotateY(${posX/50}deg)
rotateX(${-posY/50}deg)`

startX=x
startY=y
})

/* emoji tap */
space.addEventListener("click",e=>{

["💖","💕","✨"].forEach(em=>{
let el=document.createElement("div")
el.className="emoji"
el.innerText=em

el.style.left=e.clientX+"px"
el.style.top=e.clientY+"px"

space.appendChild(el)

setTimeout(()=>el.remove(),1200)

})

})

/* next */
document.getElementById("next").onclick=()=>{
window.location.href="page7.html"
}

</script>

</body>
  </html>
