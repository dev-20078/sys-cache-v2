<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Page 6</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{width:100vw;height:100vh;overflow:hidden;background:#000;}

    /* ── LANDING ── */
    #landing{
      position:fixed;inset:0;
      background:url('bg6.jpg') center/cover no-repeat;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:55px;z-index:10;
    }
    #landing::before{
      content:'';position:absolute;inset:0;
      background:rgba(0,0,0,0.5);
    }
    #landing-text{
      position:relative;text-align:center;
      color:#fff;
      font-family:'Cinzel Decorative',cursive;
      font-size:clamp(1.1rem,4.5vw,2rem);
      line-height:1.6;padding:0 24px;
      text-shadow:0 0 8px #fff,0 0 20px #fff,0 0 45px #fff,0 0 80px rgba(255,255,255,0.7);
      animation:pt 2.5s ease-in-out infinite;
    }
    @keyframes pt{
      0%,100%{text-shadow:0 0 8px #fff,0 0 20px #fff,0 0 45px #fff;}
      50%{text-shadow:0 0 18px #fff,0 0 45px #fff,0 0 100px rgba(255,255,255,0.95);}
    }

    .cbtn{
      font-family:'Cinzel Decorative',cursive;
      font-size:1.15rem;font-weight:700;
      width:110px;height:110px;
      border-radius:50%;border:none;
      cursor:pointer;user-select:none;
      -webkit-user-select:none;touch-action:manipulation;
      display:flex;align-items:center;justify-content:center;
      color:#fff;
    }

    #yes-btn{
      position:relative;
      background:radial-gradient(circle,#44ff88,#007733);
      box-shadow:0 0 18px #00ff66,0 0 40px #00ff66,0 0 70px rgba(0,255,100,0.55);
      transform-origin:center;
      transition:box-shadow 0.3s;
      z-index:2;
    }

    #no-btn{
      position:fixed;
      background:radial-gradient(circle,#ff5555,#bb0000);
      box-shadow:0 0 18px #ff2222,0 0 40px #ff2222,0 0 70px rgba(255,0,0,0.55);
      z-index:20;
    }

    /* ── SPACE ── */
    #space{
      position:fixed;inset:0;background:#000;
      display:none;overflow:hidden;cursor:grab;
    }
    #space:active{cursor:grabbing;}
    #space-canvas{position:absolute;inset:0;width:100%;height:100%;}

    .hburst{
      position:fixed;pointer-events:none;font-size:1.6rem;
      animation:hfly 1.1s ease-out forwards;z-index:999;
    }
    @keyframes hfly{
      0%{opacity:1;transform:translateY(0) scale(1);}
      100%{opacity:0;transform:translateY(-90px) scale(1.8);}
    }
  </style>
</head>
<body>

<audio id="bg-music" src="infinity.mp3" loop preload="auto"></audio>

<div id="landing">
  <div id="landing-text">WANNA KNOW HOW MUCH<br>I ADMIRED YOU?</div>
  <div style="position:relative;display:flex;gap:30px;align-items:center;justify-content:center;">
    <button class="cbtn" id="no-btn">NO</button>
    <button class="cbtn" id="yes-btn">YES</button>
  </div>
</div>

<div id="space">
  <canvas id="space-canvas"></canvas>
</div>

<script>
/* ═══════════ LANDING ═══════════ */
const noBtn   = document.getElementById('no-btn');
const yesBtn  = document.getElementById('yes-btn');
const landing = document.getElementById('landing');
const spaceDiv= document.getElementById('space');
const music   = document.getElementById('bg-music');

let yesScale  = 1;
let noBlocked = false;

/* set NO initial position next to YES */
(function(){
  const vw=window.innerWidth,vh=window.innerHeight;
  noBtn.style.left=(vw/2-140)+'px';
  noBtn.style.top =(vh/2- 55)+'px';
})();

function placeNoRandom(){
  const bw=110,vw=window.innerWidth,vh=window.innerHeight;
  const yR=yesBtn.getBoundingClientRect();
  const yCx=yR.left+yR.width/2, yCy=yR.top+yR.height/2;
  let rx,ry,t=0;
  do{
    rx=15+Math.random()*(vw-bw-30);
    ry=15+Math.random()*(vh-bw-30);
    t++;
  }while(t<50&&(Math.abs(rx+bw/2-yCx)<170||Math.abs(ry+bw/2-yCy)<170));
  noBtn.style.left=rx+'px';
  noBtn.style.top =ry+'px';
}

function escapeNo(e){
  if(noBlocked)return;
  if(e&&e.cancelable)e.preventDefault();
  noBlocked=true;
  placeNoRandom();
  yesScale+=0.22;
  yesBtn.style.transform=`scale(${yesScale})`;
  yesBtn.style.boxShadow=
    `0 0 ${18*yesScale}px #00ff66,
     0 0 ${40*yesScale}px #00ff66,
     0 0 ${70*yesScale}px rgba(0,255,100,0.6)`;
  setTimeout(()=>noBlocked=false,380);
}

noBtn.addEventListener('mouseenter',escapeNo);
noBtn.addEventListener('touchstart',escapeNo,{passive:false});

function goYes(){
  music.play().catch(()=>{});
  landing.style.display='none';
  spaceDiv.style.display='block';
  initSpace();
}
yesBtn.addEventListener('click',goYes);
yesBtn.addEventListener('touchend',e=>{e.preventDefault();goYes();},{passive:false});


/* ═══════════ 3D SPACE ═══════════ */
function initSpace(){
  const canvas=document.getElementById('space-canvas');
  const ctx=canvas.getContext('2d');
  let W=canvas.width=window.innerWidth;
  let H=canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  });

  const FOV=600, WORLD=7000;
  let camX=0,camY=0,camZ=0;
  let gyroYaw=0,gyroPitch=0;

  /* STARS - 700, bright */
  const stars=Array.from({length:700},()=>({
    x:(Math.random()-.5)*WORLD*2.2,
    y:(Math.random()-.5)*WORLD*2.2,
    z:50+Math.random()*WORLD,
    r:0.6+Math.random()*2.2,
    tw:Math.random()*Math.PI*2,
    ts:0.02+Math.random()*0.06,
    b:0.65+Math.random()*0.35
  }));

  /* COMETS */
  let comets=[];
  function spawnComet(){
    comets.push({
      x:(Math.random()-.5)*WORLD,
      y:(Math.random()-.5)*WORLD,
      z:600+Math.random()*2800,
      dx:(Math.random()-.5)*32,
      dy:(Math.random()-.5)*16+4,
      life:1,len:20+Math.random()*25
    });
  }
  for(let i=0;i<6;i++)spawnComet();
  setInterval(spawnComet,1100);

  /* IQRA - 500 texts, fill whole space */
  const iqras=Array.from({length:500},()=>({
    x:(Math.random()-.5)*WORLD*2.8,
    y:(Math.random()-.5)*WORLD*2.8,
    z:80+Math.random()*WORLD*1.8,
    rot:Math.random()*Math.PI*2,
    rs:(Math.random()-.5)*0.014,
    pulse:Math.random()*Math.PI*2,
    ps:0.02+Math.random()*0.035,
    base:14+Math.random()*30,
    big:Math.random()<0.05
  }));

  /* TOUCH DRAG */
  let drag=null;
  canvas.addEventListener('mousedown',e=>drag={x:e.clientX,y:e.clientY});
  canvas.addEventListener('mousemove',e=>{
    if(!drag)return;
    camX-=(e.clientX-drag.x)*2.5;camY-=(e.clientY-drag.y)*2.5;
    drag={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener('mouseup',()=>drag=null);
  canvas.addEventListener('mouseleave',()=>drag=null);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drag={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:false});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();if(!drag)return;
    camX-=(e.touches[0].clientX-drag.x)*2.5;camY-=(e.touches[0].clientY-drag.y)*2.5;
    drag={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:false});
  canvas.addEventListener('touchend',()=>drag=null);

  /* PINCH ZOOM */
  let lp=null;
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===2)
      lp=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&lp){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      camZ-=(d-lp)*5;lp=d;
    }
  },{passive:true});
  canvas.addEventListener('touchend',()=>lp=null);

  /* GYROSCOPE */
  if(window.DeviceOrientationEvent)
    window.addEventListener('deviceorientation',e=>{
      if(e.gamma!==null)gyroYaw=e.gamma*0.55;
      if(e.beta !==null)gyroPitch=(e.beta-45)*0.55;
    });

  /* TAP SPARKLES */
  function sparkle(cx,cy){
    ['💖','✨','💫','🌸','💕','🩷','⭐'].forEach((em,i)=>{
      const h=document.createElement('div');
      h.className='hburst';h.textContent=em;
      h.style.left=(cx+(Math.random()-.5)*80)+'px';
      h.style.top =(cy+(Math.random()-.5)*80)+'px';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),1200);
    });
  }
  canvas.addEventListener('click',e=>sparkle(e.clientX,e.clientY));
  canvas.addEventListener('touchend',e=>{const t=e.changedTouches[0];sparkle(t.clientX,t.clientY);});

  /* PROJECT */
  function proj(wx,wy,wz){
    const rx=wx-camX+Math.sin(gyroYaw  *0.0175)*350;
    const ry=wy-camY+Math.sin(gyroPitch*0.0175)*350;
    const rz=wz-camZ;
    if(rz<=10)return null;
    const s=FOV/rz;
    return{sx:W/2+rx*s,sy:H/2+ry*s,sc:s,d:rz};
  }

  let ft=0;

  function draw(){
    ft+=0.005;
    camX+=Math.sin(ft*0.7)*0.45+gyroYaw*0.07;
    camY+=Math.cos(ft*0.55)*0.38+gyroPitch*0.07;

    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    /* STARS */
    stars.forEach(s=>{
      s.tw+=s.ts;
      const p=proj(s.x,s.y,s.z);
      if(!p||p.sx<-5||p.sx>W+5||p.sy<-5||p.sy>H+5)return;
      const al=(0.45+0.55*Math.sin(s.tw))*s.b;
      const r=Math.max(s.r*Math.min(p.sc*0.6,2.5),0.8);
      /* glow halo */
      const gr=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*4);
      gr.addColorStop(0,`rgba(255,255,255,${al})`);
      gr.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(p.sx,p.sy,r*4,0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
      /* core */
      ctx.beginPath();ctx.arc(p.sx,p.sy,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${Math.min(al*1.4,1)})`;ctx.fill();
    });

    /* COMETS */
    comets=comets.filter(c=>c.life>0);
    comets.forEach(c=>{
      const p =proj(c.x,c.y,c.z);
      const p2=proj(c.x-c.dx*c.len,c.y-c.dy*c.len,c.z);
      c.x+=c.dx;c.y+=c.dy;c.life-=0.01;
      if(!p||!p2)return;
      const lw=Math.max(3*p.sc*0.5,2);
      const gr=ctx.createLinearGradient(p2.sx,p2.sy,p.sx,p.sy);
      gr.addColorStop(0,'rgba(180,210,255,0)');
      gr.addColorStop(0.5,`rgba(210,230,255,${c.life*0.55})`);
      gr.addColorStop(1,`rgba(255,255,255,${c.life})`);
      ctx.beginPath();ctx.moveTo(p2.sx,p2.sy);ctx.lineTo(p.sx,p.sy);
      ctx.strokeStyle=gr;ctx.lineWidth=lw;ctx.stroke();
      /* head glow */
      const hg=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,lw*4);
      hg.addColorStop(0,`rgba(255,255,255,${c.life})`);
      hg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(p.sx,p.sy,lw*4,0,Math.PI*2);
      ctx.fillStyle=hg;ctx.fill();
    });

    /* IQRA - depth sorted */
    const vis=[];
    iqras.forEach(q=>{
      q.rot+=q.rs;q.pulse+=q.ps;
      const p=proj(q.x,q.y,q.z);
      if(!p)return;
      if(p.sx<-350||p.sx>W+350||p.sy<-350||p.sy>H+350)return;
      vis.push({q,p});
    });
    vis.sort((a,b)=>b.p.d-a.p.d);

    vis.forEach(({q,p})=>{
      const glow=0.5+0.5*Math.sin(q.pulse);
      let fs=(q.big?q.base*2.8:q.base)*p.sc*0.32;
      if(fs<5)return;
      if(fs>130)fs=130;
      ctx.save();
      ctx.translate(p.sx,p.sy);
      ctx.rotate(q.rot);
      ctx.font=`${fs}px 'Cinzel Decorative',cursive`;
      ctx.textAlign='center';ctx.textBaseline='middle';

      /* outer glow */
      ctx.shadowColor='#ff69b4';
      ctx.shadowBlur=q.big?fs*2:fs*1.2;
      const a=0.55+0.45*glow;
      ctx.fillStyle=`rgba(255,${120+Math.floor(80*glow)},${185+Math.floor(55*glow)},${a})`;
      ctx.fillText('IQRA',0,0);

      /* inner bright */
      ctx.shadowBlur=fs*0.35;
      ctx.fillStyle=`rgba(255,210,235,${0.35+0.45*glow})`;
      ctx.fillText('IQRA',0,0);
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
