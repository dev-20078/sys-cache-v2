<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:black;
}

/* BACKGROUND */
#bg{
position:fixed;
width:110%;
height:110%;
left:-5%;
top:-5%;
background:url("bg6.jpg") center/cover no-repeat;
animation:zoom 18s linear infinite alternate;
z-index:-1;
}

@keyframes zoom{
0%{transform:scale(1)}
100%{transform:scale(1.15)}
}

/* QUESTION */
#question{
position:absolute;
top:18%;
width:100%;
text-align:center;
color:white;
font-size:28px;
padding:0 20px;
text-shadow:
0 0 10px white,
0 0 20px white,
0 0 30px white;
}

/* YES BUTTON */
#yes{
position:absolute;
bottom:28%;
left:25%;
padding:18px 40px;
border:none;
border-radius:20px;
font-size:20px;
color:white;
background:linear-gradient(45deg,#00cc66,#00ff99);
box-shadow:
0 0 10px #00ff99,
0 0 20px #00ff99,
0 0 30px #00ff99;
transition:.25s;
}

/* NO BUTTON */
#no{
position:absolute;
bottom:28%;
right:25%;
padding:18px 40px;
border:none;
border-radius:20px;
font-size:20px;
color:white;
background:linear-gradient(45deg,#ff0033,#ff4d6d);
box-shadow:
0 0 10px #ff0033,
0 0 20px #ff0033,
0 0 30px #ff0033;
}

/* NEXT */
#next{
position:absolute;
bottom:20px;
left:20px;
display:none;
padding:12px 22px;
border:none;
border-radius:12px;
background:#00bfff;
color:white;
box-shadow:0 0 15px #00bfff;
}

/* INFINITY */
#infinity{
display:none;
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.iqra{
position:absolute;
color:#ff66cc;
font-size:26px;
opacity:.85;
text-shadow:
0 0 10px #ff66cc,
0 0 20px #ff66cc;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="question">
WANNA KNOW HOW MANY TIMES I ADMIRED YOU?
</div>

<button id="yes">YES</button>
<button id="no">NO</button>

<button id="next">NEXT</button>

<div id="infinity"></div>

<audio id="music" src="infinity.mp3" loop></audio>

<script>

let yes=document.getElementById("yes")
let no=document.getElementById("no")
let next=document.getElementById("next")

let size=1

/* NO RANDOM MOVE */
no.onclick=()=>{

size+=0.12
yes.style.transform="scale("+size+")"

let x=Math.random()*(window.innerWidth-140)
let y=Math.random()*(window.innerHeight-220)+120

no.style.left=x+"px"
no.style.top=y+"px"

}

/* YES CLICK */
yes.onclick=()=>{

document.getElementById("question").style.display="none"
yes.style.display="none"
no.style.display="none"

startInfinity()
startMusic()

setTimeout(()=>{
next.style.display="block"
},15000)

}

/* MUSIC */
function startMusic(){

let m=document.getElementById("music")
m.volume=0
m.play()

let v=0

let fade=setInterval(()=>{

v+=0.05
m.volume=v

if(v>=1) clearInterval(fade)

},200)

}

/* INFINITY TEXT */
function startInfinity(){

let box=document.getElementById("infinity")
box.style.display="block"

for(let i=0;i<80;i++){

let t=document.createElement("div")

t.className="iqra"
t.innerText="IQRA"

t.style.left=Math.random()*100+"%"
t.style.top=(Math.random()*120)+"vh"

t.style.animationDuration=(8+Math.random()*10)+"s"

box.appendChild(t)

}

}

</script>

</body>
  </html>
