<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* background */
#bg{
position:fixed;
width:110%;
height:110%;
left:-5%;
top:-5%;
background:url("bg6.jpg") center/cover no-repeat;
animation:zoom 20s linear infinite alternate;
z-index:-1;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.15)}
}

/* question */
#question{
position:absolute;
top:20%;
width:100%;
text-align:center;
color:white;
font-size:26px;
text-shadow:0 0 10px white,0 0 20px white;
}

/* YES */
#yes{
position:absolute;
bottom:28%;
left:25%;
padding:16px 36px;
border-radius:20px;
border:none;
font-size:20px;
color:white;
background:#00cc66;
box-shadow:0 0 20px #00ff99;
}

/* NO */
#no{
position:absolute;
bottom:28%;
right:25%;
padding:16px 36px;
border-radius:20px;
border:none;
font-size:20px;
color:white;
background:#ff0033;
box-shadow:0 0 20px #ff0033;
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="question">
WANNA KNOW HOW MANY TIMES I ADMIRED YOU?
</div>

<button id="yes">YES</button>
<button id="no">NO</button>

<audio id="music" src="infinity.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let yes=document.getElementById("yes")
let no=document.getElementById("no")
let size=1

/* NO click */
no.onclick=()=>{

size+=0.15
yes.style.transform="scale("+size+")"
yes.style.left="50%"
yes.style.transform="translateX(-50%) scale("+size+")"

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-200)+100

no.style.left=x+"px"
no.style.top=y+"px"
no.style.right="auto"
}

/* YES click */
yes.onclick=()=>{

document.getElementById("question").style.display="none"
yes.style.display="none"
no.style.display="none"
document.getElementById("bg").style.display="none"

start3D()
document.getElementById("music").play()

}

/* 3D infinity */
function start3D(){

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

const renderer=new THREE.WebGLRenderer({alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

/* text sprite */
function makeText(){

const canvas=document.createElement("canvas")
canvas.width=256
canvas.height=128

const ctx=canvas.getContext("2d")
ctx.fillStyle="#ff66cc"
ctx.font="bold 60px Arial"
ctx.shadowColor="#ff66cc"
ctx.shadowBlur=20
ctx.fillText("IQRA",40,80)

const texture=new THREE.CanvasTexture(canvas)

const mat=new THREE.SpriteMaterial({map:texture})
const sprite=new THREE.Sprite(mat)

sprite.scale.set(6,3,1)

return sprite
}

/* create many */
for(let i=0;i<400;i++){

let s=makeText()

s.position.x=(Math.random()-0.5)*200
s.position.y=(Math.random()-0.5)*200
s.position.z=(Math.random()-0.5)*400

scene.add(s)

}

camera.position.z=5

let moveX=0
let moveY=0

/* swipe control */
document.addEventListener("touchmove",(e)=>{

moveX=(e.touches[0].clientX/window.innerWidth-0.5)*2
moveY=(e.touches[0].clientY/window.innerHeight-0.5)*2

})

/* animation */
function animate(){

requestAnimationFrame(animate)

/* auto forward */
camera.position.z-=0.5

camera.rotation.y+=moveX*0.01
camera.rotation.x+=moveY*0.01

renderer.render(scene,camera)

}

animate()

}

</script>

</body>
</html>
