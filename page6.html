<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Reveal Shooter</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0f0f17;
font-family:Arial;
}

#game{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
}

#face{
position:absolute;
width:100%;
height:100%;
background:url('sunny.jpg') center/cover no-repeat;
filter:blur(20px);
transition:1s;
}

.piece{
position:absolute;
background:url('sunny.jpg') center/cover no-repeat;
opacity:0;
transition:.6s;
}

.target{
position:absolute;
width:60px;
height:60px;
background:radial-gradient(circle,#ff4d6d,#ff1744);
border-radius:50%;
box-shadow:0 0 20px #ff1744;
animation:float 3s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

#gun{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:40px;
}

#level{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:18px;
}

#nextBtn{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:15px 40px;
font-size:18px;
background:#ff4d6d;
border:none;
color:white;
border-radius:30px;
display:none;
box-shadow:0 0 20px #ff4d6d;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:22px;
}
</style>
</head>

<body>

<div id="game">

<div id="face"></div>

<div id="level">Level 1</div>

<div id="gun">🔫</div>

<div id="start">Tap To Start</div>

<button id="nextBtn">Next</button>

</div>

<script>

let level=1
let hits=0
let started=false

const start=document.getElementById("start")
const levelTxt=document.getElementById("level")
const nextBtn=document.getElementById("nextBtn")

document.body.addEventListener("click",startGame)

function startGame(){
if(started) return
started=true
start.style.display="none"
spawnTarget()
}

function spawnTarget(){

let t=document.createElement("div")
t.className="target"

t.style.left=Math.random()*90+"%"
t.style.top=Math.random()*80+"%"

document.getElementById("game").appendChild(t)

t.onclick=()=>{
t.remove()
hit()
spawnTarget()
}

setTimeout(()=>{
if(t) t.remove()
spawnTarget()
},2000)
}

function hit(){
hits++

if(hits>=6){
level++
hits=0
revealPiece()
levelTxt.innerText="Level "+level
}

if(level>10){
finishGame()
}
}

function revealPiece(){

let blur=20-(level*2)
document.getElementById("face").style.filter="blur("+blur+"px)"

}

function finishGame(){
document.getElementById("face").style.filter="blur(0px)"
nextBtn.style.display="block"
levelTxt.innerText="Face Unlocked"
}

nextBtn.onclick=()=>{
window.location.href="page7.html"
}

</script>

</body>
</html>
