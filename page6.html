<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Page 6</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:100vw;height:100vh;overflow:hidden;background:#000;}

#landing{
position:fixed;inset:0;
background:url('bg6.jpg') center/cover no-repeat;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:55px;
z-index:10;
}

#landing::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

#landing-text{
position:relative;
text-align:center;
color:#fff;
font-family:'Cinzel Decorative',cursive;
font-size:clamp(1.1rem,4.5vw,2rem);
line-height:1.6;
padding:0 24px;
text-shadow:
0 0 8px #fff,
0 0 20px #fff,
0 0 45px #fff,
0 0 80px rgba(255,255,255,0.7);
}

.cbtn{
font-family:'Cinzel Decorative',cursive;
font-size:1.15rem;
font-weight:700;
width:110px;
height:110px;
border-radius:50%;
border:none;
cursor:pointer;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
}

#yes-btn{
background:radial-gradient(circle,#44ff88,#007733);
box-shadow:
0 0 18px #00ff66,
0 0 40px #00ff66,
0 0 70px rgba(0,255,100,0.55);
transition:.25s;
}

#no-btn{
position:fixed;
background:radial-gradient(circle,#ff5555,#bb0000);
box-shadow:
0 0 18px #ff2222,
0 0 40px #ff2222,
0 0 70px rgba(255,0,0,0.55);
}

#space{
position:fixed;
inset:0;
background:#000;
display:none;
overflow:hidden;
}

#space-canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
}
</style>
</head>

<body>

<audio id="bg-music" src="infinity.mp3" loop preload="auto"></audio>

<div id="landing">
<div id="landing-text">
WANNA KNOW HOW MUCH<br>I ADMIRED YOU?
</div>

<div style="display:flex;gap:30px">
<button class="cbtn" id="no-btn">NO</button>
<button class="cbtn" id="yes-btn">YES</button>
</div>
</div>

<div id="space">
<canvas id="space-canvas"></canvas>
</div>

<script>

const noBtn=document.getElementById('no-btn');
const yesBtn=document.getElementById('yes-btn');
const landing=document.getElementById('landing');
const space=document.getElementById('space');
const music=document.getElementById('bg-music');

let scale=1;

function moveNo(){
const x=Math.random()*(innerWidth-120);
const y=Math.random()*(innerHeight-120);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

scale+=0.18;
yesBtn.style.transform=`scale(${scale})`;
}

noBtn.addEventListener("click",moveNo);
noBtn.addEventListener("touchstart",moveNo);

yesBtn.onclick=()=>{
music.currentTime=0;
music.volume=1;
music.play();

landing.style.display="none";
space.style.display="block";

init();
};

function init(){

const canvas=document.getElementById("space-canvas");
const ctx=canvas.getContext("2d");

let W=canvas.width=innerWidth;
let H=canvas.height=innerHeight;

window.onresize=()=>{
W=canvas.width=innerWidth;
H=canvas.height=innerHeight;
};

const FOV=600;
const WORLD=7000;

let camX=0;
let camY=0;
let camZ=0;

const stars=Array.from({length:700},()=>({
x:(Math.random()-.5)*WORLD*2,
y:(Math.random()-.5)*WORLD*2,
z:Math.random()*WORLD,
r:Math.random()*2,
c:Math.random()
}));

const iqra=Array.from({length:500},()=>({
x:(Math.random()-.5)*WORLD*2,
y:(Math.random()-.5)*WORLD*2,
z:Math.random()*WORLD,
rot:Math.random()*Math.PI,
rs:(Math.random()-.5)*.01,
size:14+Math.random()*28
}));

let comets=[];

function spawn(){
comets.push({
x:(Math.random()-.5)*WORLD,
y:(Math.random()-.5)*WORLD,
z:1000+Math.random()*2000,
dx:(Math.random()-.5)*25,
dy:(Math.random()-.5)*15,
life:1
});
}
setInterval(spawn,900);

function proj(x,y,z){
const rz=z-camZ;
if(rz<=10) return null;
const s=FOV/rz;
return{
x:W/2+(x-camX)*s,
y:H/2+(y-camY)*s,
s,
d:rz
};
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.35)";
ctx.fillRect(0,0,W,H);

stars.forEach(s=>{
const p=proj(s.x,s.y,s.z);
if(!p)return;

let col;
if(s.c<.33) col="255,255,255";
else if(s.c<.66) col="120,170,255";
else col="255,120,120";

const r=Math.max(1.2*p.s,1);

const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*5);
g.addColorStop(0,`rgba(${col},1)`);
g.addColorStop(1,"rgba(0,0,0,0)");

ctx.beginPath();
ctx.arc(p.x,p.y,r*5,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();
});

comets=comets.filter(c=>c.life>0);

comets.forEach(c=>{
const p=proj(c.x,c.y,c.z);
if(!p)return;

c.x+=c.dx;
c.y+=c.dy;
c.life-=.01;

const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,40);
g.addColorStop(0,"rgba(255,255,255,1)");
g.addColorStop(.5,"rgba(120,180,255,.7)");
g.addColorStop(1,"rgba(0,0,0,0)");

ctx.beginPath();
ctx.arc(p.x,p.y,40,0,Math.PI*2);
ctx.fillStyle=g;
ctx.fill();
});

iqra.forEach(q=>{

if(q.z-camZ<-200) q.z+=WORLD;
if(q.z-camZ>WORLD) q.z-=WORLD;

const p=proj(q.x,q.y,q.z);
if(!p)return;

ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(q.rot);

const fs=q.size*p.s*.35;

ctx.font=`${fs}px Cinzel Decorative`;

ctx.shadowColor="#ff4fd8";
ctx.shadowBlur=fs*1.5;

ctx.fillStyle="#ff69b4";
ctx.fillText("IQRA",0,0);

ctx.restore();
});

requestAnimationFrame(draw);
}

draw();
}
</script>

</body>
  </html>
