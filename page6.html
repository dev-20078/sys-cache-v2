<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save Me Game</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

canvas{
display:block;
}

#rules{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("bg6.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

#rules h1{
font-size:26px;
}

#save{
font-size:32px;
font-weight:bold;
color:#ff4081;
text-shadow:0 0 10px white;
margin-top:20px;
}

#nextBtn{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00bfff,#4da6ff);
color:white;
box-shadow:0 0 15px #00bfff;
}

#score{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:28px;
text-shadow:0 0 5px black;
}
</style>
</head>

<body>

<div id="rules" onclick="startGame()">
<h1>GAME RULES</h1>
<p>Tap to fly</p>
<p>Avoid enemies</p>
<p>Reach score 10</p>
<p>Don't crash</p>

<div id="save">PLEASE SAVE ME</div>
</div>

<div id="score">0</div>

<button id="nextBtn" onclick="next()">NEXT</button>

<canvas id="game"></canvas>

<audio id="jump" src="jump.mp3"></audio>
<audio id="hit" src="hit.mp3"></audio>
<audio id="fly" src="fly.mp3"></audio>
<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="over" src="gameover.mp3"></audio>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let birdImg=new Image();
birdImg.src="bird.png";

let enemies=[
"enemy1.jpg",
"enemy2.jpg",
"enemy3.jpg",
"enemy4.jpg",
"enemy5.jpg"
];

let bird={
x:80,
y:300,
w:60,
h:60,
velocity:0
};

let gravity=0.8;
let jump=-12;

let pipes=[];
let gap=230;
let speed=5;

let score=0;
let started=false;
let gameOver=false;

function startGame(){
document.getElementById("rules").style.display="none";
document.getElementById("bgm").play();
started=true;
loop();
}

function spawn(){

let img=new Image();
img.src=enemies[Math.floor(Math.random()*enemies.length)];

let topHeight=Math.random()*300+100;

pipes.push({
x:canvas.width,
top:topHeight,
img:img
});
}

setInterval(spawn,1400);

function loop(){

if(!started || gameOver) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

bird.velocity+=gravity;
bird.y+=bird.velocity;

ctx.drawImage(birdImg,bird.x,bird.y,bird.w,bird.h);

pipes.forEach((p,i)=>{

p.x-=speed;

ctx.drawImage(p.img,p.x,0,80,p.top);

ctx.drawImage(
p.img,
p.x,
p.top+gap,
80,
canvas.height
);

if(
bird.x < p.x+80 &&
bird.x+bird.w > p.x &&
(
bird.y < p.top ||
bird.y+bird.h > p.top+gap
)
){
hit();
}

if(p.x+80<0){
pipes.splice(i,1);
score++;
document.getElementById("score").innerText=score;

if(score>=10){
win();
}
}

});

if(bird.y<0 || bird.y>canvas.height){
hit();
}

requestAnimationFrame(loop);
}

function hit(){
if(gameOver) return;

gameOver=true;
document.getElementById("hit").play();
document.getElementById("over").play();
document.getElementById("bgm").pause();

setTimeout(()=>{
location.reload();
},1500);
}

function win(){
gameOver=true;
document.getElementById("bgm").pause();
document.getElementById("nextBtn").style.display="block";
}

function next(){
window.location.href="page7.html";
}

document.addEventListener("click",()=>{

if(!started) return;

bird.velocity=jump;

document.getElementById("jump").play();
document.getElementById("fly").play();

});

</script>

</body>
  </html>
